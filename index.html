// ---- Rollup period helpers ----
function getRollupPeriodDates(period,refDate){
  const d=new Date(refDate+'T12:00:00');
  const tk=todayKey();
  if(period==='daily')return refDate<=tk?[refDate]:[];
  if(period==='weekly'){
    const dow=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-((dow+6)%7));
    const days=[];for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);const dk=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');if(dk<=tk)days.push(dk);}
    return days;
  }
  if(period==='monthly'){
    const y=d.getFullYear(),m=d.getMonth();const dim=new Date(y,m+1,0).getDate();
    const days=[];for(let i=1;i<=dim;i++){const dk=y+'-'+String(m+1).padStart(2,'0')+'-'+String(i).padStart(2,'0');if(dk<=tk)days.push(dk);}
    return days;
  }
  return[];
}
function rollupPeriodLabel(period,refDate){
  if(period==='daily'){return refDate===todayKey()?'Today':fmtDN(refDate)+', '+fmtS(refDate);}
  if(period==='weekly'){const dates=getRollupPeriodDates('weekly',refDate);return'Week of '+fmtS(dates[0]);}
  if(period==='monthly'){const[y,m]=refDate.split('-');return new Date(+y,+m-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});}
  return'';
}
window.setRollupPeriod=function(p){st.rollupPeriod=p;render();};
function adjRollupByPeriod(n){
  const period=st.rollupPeriod||'monthly';const ref=st.rollupDate||todayKey();
  const d=new Date(ref+'T12:00:00');
  if(period==='daily')d.setDate(d.getDate()+n);
  else if(period==='weekly')d.setDate(d.getDate()+n*7);
  else if(period==='monthly')d.setMonth(d.getMonth()+n);
  st.rollupDate=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  render();
}
function aggregatePeriodStats(bid,dates){
  const brf=bid===st.branch?st.briefings:st.branchBriefings[bid]||{};
  let tA=0,tM=0,tLate=0,tOut=0,tFin=0,tRun=0,tLocs=0,tMR=0,sfVals=[],revTotal=0,daysWithData=0,tSpoils=0,tShrink=0;
  // Count ALL business days in the date window, not just days with data.
  // This is the denominator for per-day rates and must match what the baseline uses.
  const bizDays=dates.filter(dk=>{const[y,m,d]=dk.split('-').map(Number);return isWorkDay(y,m,d);}).length;
  dates.forEach(dk=>{
    const b=brf[dk];if(!b||!b.routes)return;
    daysWithData++;
    const[y2,mo2,dd2]=dk.split('-').map(Number);
    const isBiz=isWorkDay(y2,mo2,dd2);
    const s=bStats(b);
    tA+=s.totalAssets;tM+=s.totalMissed;tLate+=s.late;
    const uncovered=(b.routes||[]).filter(r=>ABSENCE.includes(r.status)&&r.driverType==="assigned"&&r.status!=="off").length;
    tOut+=uncovered;
    tFin+=s.finished;tRun+=s.runningCount;tLocs+=s.totalLocs;tMR+=s.totalMissedRestocks||0;
    if(isBiz){
      tSpoils+=s.totalSpoils||0;tShrink+=s.totalShrink||0;
      if(b.revenue||b.routes)revTotal+=getBranchDayRevenue(bid,dk);
    }
    if(s.avgSafety!==null)sfVals.push(s.avgSafety);
  });
  const otPct=tA>0?Math.round(((tA-tM)/tA)*1000)/10:null;
  const avgSafety=sfVals.length?Math.round(sfVals.reduce((a,b)=>a+b,0)/sfVals.length*100)/100:null;
  return{tA,tM,tLate,tOut,tFin,tRun,tLocs,tMR,otPct,avgSafety,revTotal,daysWithData,bizDays,totalSpoils:tSpoils,totalShrink:tShrink};
}

// Build a per-day baseline for a branch by averaging the prior N same-type periods.
// All per-day figures use BUSINESS DAYS as the denominator.
// For monthly periods, prior months are capped to the same NUMBER OF BUSINESS DAYS
// as the current period — so June (7 biz days) compares against May 1–9, Apr 1–9, etc.
// with exactly 7 business days each. Calendar-day matching was wrong because weekends
// shift the biz-day count unpredictably.
function getBranchBaseline(bid,period,refDate,lookback=4,currentBizDays=null){
  const brf=bid===st.branch?st.briefings:st.branchBriefings[bid]||{};
  const samples=[];
  for(let i=1;i<=lookback;i++){
    const d=new Date(refDate+'T12:00:00');
    if(period==='daily')d.setDate(d.getDate()-i*7);
    else if(period==='weekly')d.setDate(d.getDate()-i*7);
    else if(period==='monthly')d.setMonth(d.getMonth()-i);
    const pk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    let pdates=getRollupPeriodDates(period,pk);
    // For monthly: walk the prior month forward day-by-day and stop once we've
    // accumulated the same number of business days as the current period.
    if(period==='monthly'&&currentBizDays!==null&&currentBizDays>0){
      const[py,pm]=pk.split('-');
      let bizCount=0;let capDate=null;
      const dim=new Date(+py,+pm,0).getDate();
      for(let dd=1;dd<=dim;dd++){
        const dk2=`${py}-${pm}-${String(dd).padStart(2,'0')}`;
        if(isWorkDay(+py,+pm,dd)){
          bizCount++;
          if(bizCount===currentBizDays){capDate=dk2;break;}
        }
      }
      if(capDate)pdates=pdates.filter(dk2=>dk2<=capDate);
    }
    const hasData=pdates.some(dk2=>brf[dk2]&&brf[dk2].routes);
    if(!hasData)continue;
    let pA=0,pM=0,pSpoils=0,pShrink=0,pRev=0,pMR=0,pBizDays=0;
    pdates.forEach(dk2=>{
      const b=brf[dk2];if(!b||!b.routes)return;
      const[y2,mo2,dd2]=dk2.split('-').map(Number);
      if(!isWorkDay(y2,mo2,dd2))return;
      pBizDays++;
      const s=bStats(b);
      pA+=s.totalAssets;pM+=s.totalMissed;pSpoils+=s.totalSpoils;
      pShrink+=Math.abs(s.totalShrink);pMR+=s.totalMissedRestocks||0;
      pRev+=getBranchDayRevenue(bid,dk2);
    });
    if(pBizDays>0)samples.push({days:pBizDays,tA:pA,tM:pM,spoils:pSpoils,shrink:pShrink,rev:pRev,mr:pMR});
  }
  if(!samples.length)return null;
  const n=samples.length;
  const avg=f=>samples.reduce((a,s)=>a+f(s),0)/n;
  const totA=samples.reduce((a,s)=>a+s.tA,0);
  const totM=samples.reduce((a,s)=>a+s.tM,0);
  // For spoils/shrink, only average over samples that actually have data > $0.
  // Months where nobody filled in spoils shouldn't dilute the baseline to near-zero.
  const spoilsSamples=samples.filter(s=>s.spoils>0);
  const shrinkSamples=samples.filter(s=>s.shrink>0);
  const avgOver=(arr,f)=>arr.length?arr.reduce((a,s)=>a+f(s),0)/arr.length:0;
  return{
    missPerDay:avg(s=>s.tM/Math.max(s.days,1)),
    missRate:avg(s=>s.tA>0?s.tM/s.tA:0),
    avgOtPct:totA>0?Math.round(((totA-totM)/totA)*1000)/10:null,
    spoilsPerDay:avgOver(spoilsSamples,s=>s.spoils/Math.max(s.days,1)),
    spoilsSampleCount:spoilsSamples.length,
    shrinkPerDay:avgOver(shrinkSamples,s=>s.shrink/Math.max(s.days,1)),
    shrinkSampleCount:shrinkSamples.length,
    revPerDay:avg(s=>s.rev/Math.max(s.days,1)),
    mrPerDay:avg(s=>s.mr/Math.max(s.days,1)),
    sampleCount:n,
  };
}

// Derives a single plain-language "key insight" for a branch card in the rollup.
// Rather than a priority waterfall that always returns the first hit, we SCORE every
// signal and surface the highest-scoring one — so each branch gets its actual standout.
// `vari` is the budget variance % (or null). `baseline` is from getBranchBaseline() or null.
function branchInsight(s,period,vari,baseline,isPartial){
  const span=period==='daily'?'today':period==='weekly'?'this week':'this month';
  // "through yesterday" qualifier shown when we've excluded today from the window
  const thru=isPartial?' (through yesterday)':'';
  const days=Math.max(s.bizDays||s.daysWithData,1); // business days only for per-day rates
  const dev=(cur,base)=>base>0?Math.round((cur-base)/base*100):null;

  const curSpoilsPerDay=s.totalSpoils!=null?s.totalSpoils/days:0;
  const curShrinkPerDay=s.totalShrink!=null?Math.abs(s.totalShrink)/days:0;
  const curRevPerDay=s.revTotal>0?s.revTotal/days:0;
  const curMRPerDay=s.tMR/days;

  // Require at least 2 prior months with actual spoils/shrink data before comparing.
  const baselineOk=baseline&&baseline.sampleCount>=2;
  const spoilsDev=baselineOk&&(baseline.spoilsSampleCount||0)>=2&&baseline.spoilsPerDay>50?dev(curSpoilsPerDay,baseline.spoilsPerDay):null;
  const shrinkDev=baselineOk&&(baseline.shrinkSampleCount||0)>=2&&baseline.shrinkPerDay>50?dev(curShrinkPerDay,baseline.shrinkPerDay):null;
  const revDev=baselineOk&&baseline.revPerDay>0?dev(curRevPerDay,baseline.revPerDay):null;
  const mrDev=baselineOk&&baseline.mrPerDay>0.5?dev(curMRPerDay,baseline.mrPerDay):null;

  // Build a scored candidate list — each has { score, level, icon, text }.
  // Higher score = more actionable / severe. We return the winner.
  const candidates=[];
  const add=(score,level,icon,text)=>candidates.push({score,level,icon,text});

  // ── Safety (absolute — never relative, always the highest stakes) ──
  if(s.avgSafety!==null){
    if(s.avgSafety<80) add(100,'danger','ti-shield-off',
      `Safety averaging ${s.avgSafety} ${span} — dangerously below 85. Immediate coaching needed.`);
    else if(s.avgSafety<85) add(80,'danger','ti-shield-off',
      `Safety averaging ${s.avgSafety} ${span} — below the 85 threshold. Coach drivers before it compounds.`);
    else if(s.avgSafety>=98) add(15,'ok','ti-shield-check',
      `Safety at ${s.avgSafety} ${span} — best-in-class.`);
  }

  // ── Uncovered routes (no relief) ──
  if(s.tOut>0) add(90,'danger','ti-user-x',
    `${s.tOut} route${s.tOut===1?'':'s'} ran uncovered ${span} with no relief assigned.`);

  // ── Waste: spoils % change vs baseline (business-day baseline, same methodology as on-time) ──
  // Only fire when baseline is meaningful (>$10/day) so noise days don't distort.
  // Score based on severity of the percentage increase.
  if(spoilsDev!==null&&baseline.spoilsPerDay>10){
    if(spoilsDev>=100) add(75,'danger','ti-trash',
      `Spoils up ${spoilsDev}% vs baseline ${span} ($${Math.round(curSpoilsPerDay)}/day vs $${Math.round(baseline.spoilsPerDay)}/day normal). Check product rotation and order quantities.`);
    else if(spoilsDev>=50) add(50,'warn','ti-trash',
      `Spoils up ${spoilsDev}% vs baseline ${span} ($${Math.round(curSpoilsPerDay)}/day vs $${Math.round(baseline.spoilsPerDay)}/day normal).`);
    else if(spoilsDev>=25) add(25,'warn','ti-trash',
      `Spoils slightly elevated — up ${spoilsDev}% vs baseline ${span}.`);
  }

  // ── Waste: shrink % change vs baseline ──
  if(shrinkDev!==null&&baseline.shrinkPerDay>10){
    if(shrinkDev>=100) add(72,'danger','ti-alert-triangle',
      `Shrink up ${shrinkDev}% vs baseline ${span} ($${Math.round(curShrinkPerDay)}/day vs $${Math.round(baseline.shrinkPerDay)}/day normal). Review routes for discrepancies.`);
    else if(shrinkDev>=50) add(48,'warn','ti-alert-triangle',
      `Shrink up ${shrinkDev}% vs baseline ${span} ($${Math.round(curShrinkPerDay)}/day vs $${Math.round(baseline.shrinkPerDay)}/day normal).`);
    else if(shrinkDev>=25) add(23,'warn','ti-alert-triangle',
      `Shrink slightly elevated — up ${shrinkDev}% vs baseline ${span}.`);
  }

  // ── On-time % variance vs baseline (absolute drop in percentage points) ──
  // Use point-drop (not % change) so "98% → 91%" reads as "-7 pts" not "7% worse"
  const curOt=s.otPct;  // already a percentage like 97.2
  const baseOt=baseline?baseline.avgOtPct:null;
  const otDrop=curOt!==null&&baseOt!==null?Math.round((curOt-baseOt)*10)/10:null; // negative = worse
  if(curOt!==null){
    if(otDrop!==null&&otDrop<=-5) add(70,'danger','ti-trending-down',
      `On-time ${span} is ${curOt}% — ${Math.abs(otDrop)} pts below the recent ${baseOt}% baseline. Something's off, check route loads and start times.`);
    else if(otDrop!==null&&otDrop<=-2) add(40,'warn','ti-alert-circle',
      `On-time slipped to ${curOt}% ${span} (baseline ${baseOt}%). Small drop but worth watching.`);
    else if(otDrop===null&&curOt<95) add(50,'warn','ti-alert-circle',
      `On-time at ${curOt}% ${span} — below the 95% target. No baseline yet to gauge trend.`);
    else if(otDrop===null&&curOt<90) add(65,'danger','ti-alert-circle',
      `On-time at ${curOt}% ${span} — well below 95% target. Investigate route loads and attendance.`);
    else if(otDrop!==null&&otDrop>=3&&curOt>=97) add(18,'ok','ti-trending-up',
      `On-time up ${otDrop} pts vs baseline — ${curOt}% ${span}.`);
  }

  // ── Revenue vs baseline — only meaningful with ≥3 completed days (avoids Mon/Tue false alarms) ──
  const revCmpOk=period==='daily'||(days>=3);
  if(revDev!==null&&curRevPerDay>0&&revCmpOk){
    if(revDev<=-20) add(65,'danger','ti-trending-down',
      `Revenue ${Math.abs(revDev)}% below recent baseline${thru} (${fmtMoneyAbbr(s.revTotal)} vs expected ~${fmtMoneyAbbr(baseline.revPerDay*days)}). Dig into which routes are light.`);
    else if(revDev<=-10) add(40,'warn','ti-trending-down',
      `Revenue tracking ${Math.abs(revDev)}% under recent baseline${thru}.`);
    else if(revDev>=15) add(20,'ok','ti-trending-up',
      `Revenue ${revDev}% above recent baseline${thru} (${fmtMoneyAbbr(s.revTotal)}).`);
  }

  // ── Budget variance — same ≥3 day gate for weekly/monthly periods ──
  if(vari!==null&&(period==='daily'||days>=3)){
    if(vari<=-15&&revDev===null) add(45,'warn','ti-trending-down',
      `Revenue ${Math.abs(vari)}% under budget target${thru}. No prior baseline to confirm if this is new.`);
    else if(vari<=-10) add(20,'warn','ti-trending-down',
      `${Math.abs(vari)}% under budget${thru}${revDev!==null&&revDev<-5?` and ${Math.abs(revDev)}% below baseline`:''}.`);
    else if(vari>=15) add(18,'ok','ti-trophy',
      `${vari}% over budget target${thru}${revDev!==null&&revDev>=10?` and ${revDev}% above baseline`:''}.`);
  }

  // ── Missed restocks ──
  if(mrDev!==null&&mrDev>=60&&curMRPerDay>=1) add(25,'warn','ti-package-off',
    `Missed restocks ${mrDev}% above normal ${span}. Empty machines quietly bleed revenue.`);
  else if(mrDev===null&&s.tMR>=4) add(22,'warn','ti-package-off',
    `${s.tMR} missed restocks ${span} — empty machines lose sales even on serviced routes.`);

  // ── Late starts (lowest score — only wins if nothing else stands out) ──
  if(s.tLate>0) add(10,'warn','ti-clock-exclamation',
    `${s.tLate} late start${s.tLate===1?'':'s'} ${span}. Service held${s.otPct!==null?' at '+s.otPct+'%':''}, but watch the trend.`);

  // ── All clean: surface the best positive ──
  if(!candidates.some(c=>c.level!=='ok')){
    if(s.otPct!==null&&s.otPct>=98&&s.tM===0) add(12,'ok','ti-circle-check',
      `Zero misses ${span} at ${s.otPct}% on-time${baseline?' — consistent with recent norms':''}.`);
    if(s.daysWithData>0&&!candidates.length) add(5,'ok','ti-circle-check',
      `No flags ${span} — service, safety, and attendance all clean.`);
  }

  if(!candidates.length)return null;
  // Return highest-scored candidate
  candidates.sort((a,b)=>b.score-a.score);
  return candidates[0];
}

function renderRollup(){
  const period=st.rollupPeriod||'daily';
  const dk=st.rollupDate||todayKey();
  const dates=getRollupPeriodDates(period,dk);
  const isCurrentPeriod=dates.includes(todayKey());
  const btnStyle='padding:6px 10px;border:0.5px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text);font-size:16px;min-height:36px';

  // For insight calculations, exclude today — routes are still running so revenue,
  // spoils, and missed counts are incomplete and will skew every comparison.
  // Daily view looking at today is the exception: we show what we have but flag it.
  const yk=(()=>{const y=new Date();y.setDate(y.getDate()-1);return y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');})();
  const insightDates=period==='daily'?dates:dates.filter(d=>d<=yk);
  const insightIsPartial=isCurrentPeriod&&period!=='daily'&&insightDates.length<dates.length;
  const branchStats=BRANCH_IDS.map(bid=>{
    const stats=aggregatePeriodStats(bid,dates);
    // Separate stats for insights — capped at yesterday so today's in-flight data doesn't skew
    const iStats=insightDates.length>0?aggregatePeriodStats(bid,insightDates):stats;
    const brf=bid===st.branch?st.briefings:st.branchBriefings[bid]||{};
    const todayB=brf[dk];
    return{bid,stats,iStats,checkInStatus:todayB&&todayB.checkInStatus||'not_started',hasData:stats.daysWithData>0};
  });
  const hasAny=branchStats.some(x=>x.hasData);
  const act=branchStats.filter(x=>x.hasData);
  const cTA=act.reduce((a,x)=>a+x.stats.tA,0),cTM=act.reduce((a,x)=>a+x.stats.tM,0);
  const cOT=cTA>0?Math.round(((cTA-cTM)/cTA)*100):null;
  const sfAll=act.map(x=>x.stats.avgSafety).filter(v=>v!==null);
  const cSf=sfAll.length?Math.round(sfAll.reduce((a,b)=>a+b,0)/sfAll.length*10)/10:null;
  const cFin=act.reduce((a,x)=>a+x.stats.tFin,0),cRun=act.reduce((a,x)=>a+x.stats.tRun,0);
  const cLate=act.reduce((a,x)=>a+x.stats.tLate,0),cOut=act.reduce((a,x)=>a+x.stats.tOut,0);
  const cLocs=act.reduce((a,x)=>a+x.stats.tLocs,0),cMR=act.reduce((a,x)=>a+x.stats.tMR,0);
  const cRev=act.reduce((a,x)=>a+x.stats.revTotal,0);
  const periodToggle=`<div class="toggle-row" style="margin-bottom:16px">
    <button class="toggle-btn${period==='daily'?' t-on':''}" onclick="setRollupPeriod('daily')"><i class="ti ti-calendar-day" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>Daily</button>
    <button class="toggle-btn${period==='weekly'?' t-on':''}" onclick="setRollupPeriod('weekly')"><i class="ti ti-calendar-week" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>Weekly</button>
    <button class="toggle-btn${period==='monthly'?' t-on':''}" onclick="setRollupPeriod('monthly')"><i class="ti ti-calendar-month" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>Monthly</button>
  </div>`;
  const currentLabel=period==='daily'?fmtS(dk):period==='weekly'?'This week':'This month';
  return`<div class="app-header">
    <div><div class="app-title" style="color:var(--brand)">All Branches</div>
    <div class="app-sub">${rollupPeriodLabel(period,dk)} ${syncPill()}</div></div>
    <div style="display:flex;align-items:center;gap:4px">
      <button onclick="adjRollupByPeriod(-1)" style="${btnStyle}"><i class="ti ti-chevron-left"></i></button>
      ${!isCurrentPeriod?`<button onclick="st.rollupDate=todayKey();render()" style="padding:6px 8px;border:0.5px solid var(--blue);border-radius:var(--radius-md);background:var(--info-bg);color:var(--info-text);font-size:11px;font-weight:500;white-space:nowrap;min-height:36px">Current</button>`:`<span class="date-badge">${currentLabel}</span>`}
      <button onclick="adjRollupByPeriod(1)" style="${btnStyle}"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>
  ${periodToggle}
  ${!hasAny?`<div class="empty-state"><i class="ti ti-building-community"></i><div class="empty-state-title">No data for this ${period==='daily'?'date':period}</div><div class="empty-state-sub">Navigate to a ${period==='daily'?'date':period} where briefings have been entered.</div></div>`:`
  <span class="section-lbl">All Branches Combined</span>
  <div class="card" style="margin-bottom:16px">
    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:10px">
      <div class="kpi"><div class="kpi-lbl">On-Time</div><div class="kpi-val ${cOT===null?'':(cOT>=95?'kv-s':cOT>=85?'kv-w':'kv-d')}">${cOT===null?'—':cOT+'%'}</div></div>
      <div class="kpi"><div class="kpi-lbl">Avg Safety</div><div class="kpi-val ${cSf===null?'':(cSf>=95?'kv-s':cSf>=85?'kv-w':'kv-d')}">${cSf===null?'—':cSf}</div></div>
      <div class="kpi"><div class="kpi-lbl">Revenue</div><div class="kpi-val" style="font-size:${cRev>0?'20':'24'}px;color:${cRev>0?'var(--brand)':'var(--text-2)'}">${cRev>0?fmtMoneyAbbr(cRev):'—'}</div></div>
      <div class="kpi"><div class="kpi-lbl">Missed Svc</div><div class="kpi-val ${cTM===0?'kv-s':cTM<=5?'kv-w':'kv-d'}">${cTM}</div></div>
      <div class="kpi"><div class="kpi-lbl">Late</div><div class="kpi-val ${cLate===0?'kv-s':'kv-w'}">${cLate}</div></div>
      <div class="kpi"><div class="kpi-lbl">Out</div><div class="kpi-val">${cOut}</div></div>
    </div>
    <div style="display:flex;gap:10px;font-size:12px;color:var(--text-2);border-top:0.5px solid var(--border);padding-top:8px;flex-wrap:wrap;align-items:center">
      ${cTA>0?`<span><strong style="color:var(--text)">${cTA}</strong> assets</span>`:''}
      ${cLocs>0?`<span>· <strong style="color:var(--text)">${cLocs}</strong> locs</span>`:''}
      ${cMR>0?`<span>· <strong style="color:var(--warn-text)">${cMR}</strong> missed restocks</span>`:''}
      <span style="margin-left:auto">${act.length}/${BRANCH_IDS.length} branches reporting</span>
    </div>
  </div>
  <span class="section-lbl">By Branch</span>
  ${branchStats.map(({bid,stats:s,iStats,checkInStatus,hasData})=>{
    const isActive=bid===st.branch;
    const cardStyle='cursor:pointer;'+(isActive?'border-color:var(--brand);':'')+'margin-bottom:10px';

    const insLine=ins?(()=>{const[bg,bd,tx]=insColors[ins.level];return`<div style="margin-top:10px;background:${bg};border:0.5px solid ${bd};border-radius:var(--radius-md);padding:8px 10px;display:flex;gap:8px;align-items:flex-start">

      <span style="font-size:12px;line-height:1.45;color:${tx}"><strong style="text-transform:uppercase;letter-spacing:.04em;font-size:10px;display:block;margin-bottom:1px;opacity:.85">Key insight</strong>${ins.text}</span>
    </div>`;})():'';
    return`<div class="plan-card" style="${cardStyle}" onclick="switchBranch('${bid}');switchTab('today')">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">

        ${period==='daily'?`<span class="status-badge ${BSBADGE[checkInStatus]}"><i class="ti ${RSI[checkInStatus]}" style="font-size:11px"></i> ${RSL[checkInStatus]}</span>`:`<span style="font-size:11px;color:var(--text-2)">${s.daysWithData} day${s.daysWithData===1?'':'s'} of data</span>`}
      </div>

        <div class="kpi"><div class="kpi-lbl">On-Time</div><div class="kpi-val" style="font-size:18px;color:${s.otPct===null?'inherit':s.otPct>=95?'var(--ok-text)':s.otPct>=85?'var(--warn-text)':'var(--danger-text)'}"> ${s.otPct===null?'—':s.otPct+'%'}</div></div>
        <div class="kpi"><div class="kpi-lbl">Safety</div><div class="kpi-val" style="font-size:18px;color:${s.avgSafety===null?'inherit':s.avgSafety>=95?'var(--ok-text)':s.avgSafety>=85?'var(--warn-text)':'var(--danger-text)'}"> ${s.avgSafety===null?'—':s.avgSafety}</div></div>
        <div class="kpi"><div class="kpi-lbl">Revenue</div><div class="kpi-val" style="font-size:${s.revTotal>0?'16':'18'}px;color:${s.revTotal>0?'var(--brand)':'var(--text-2)'}"> ${s.revTotal>0?fmtMoneyAbbr(s.revTotal):'—'}</div></div>
        <div class="kpi"><div class="kpi-lbl">Missed</div><div class="kpi-val" style="font-size:18px;color:${s.tM===0?'var(--ok-text)':s.tM<=2?'var(--warn-text)':'var(--danger-text)'}"> ${s.tM}</div></div>

// ---- Budget helpers ----
const BUDGET_KEY="dfw_budgets_v1";
const BUDGET_COLLECTION="dfw_budgets";

function loadBudgets(){try{const r=localStorage.getItem(BUDGET_KEY);if(r)st.budgets=JSON.parse(r)||{};}catch(e){st.budgets={};}}
function persistBudgets(){try{localStorage.setItem(BUDGET_KEY,JSON.stringify(st.budgets));}catch(e){}}
async function writeBudget(bid,mk,cats){
  st.budgets[bid]=st.budgets[bid]||{};
  st.budgets[bid][mk]=typeof cats==='object'?cats:{vending:cats,market:0,ocs:0};
  persistBudgets();
  if(!fb.modules||!fb.db||st.syncStatus!=="live"){
    showToast("Budget saved locally — not synced (Firebase not connected)");
    return;
  }
  const{doc,setDoc}=fb.modules;
  try{
    await setDoc(doc(fb.db,BUDGET_COLLECTION,"all_budgets"),st.budgets,{merge:true});
    showToast("Budget saved & synced ✓");
  }catch(e){
    console.error("Budget write failed",e);
    showToast("Budget saved locally — sync error: "+e.code);
  }
}
function getBudgetCats(bid,mk){
  const raw=st.budgets[bid]&&st.budgets[bid][mk];
  if(!raw)return{vending:0,market:0,ocs:0,total:0};
  if(typeof raw==='number')return{vending:raw,market:0,ocs:0,total:raw};
  const v=Number(raw.vending)||0,m=Number(raw.market)||0,o=Number(raw.ocs)||0;
  return{vending:v,market:m,ocs:o,total:v+m+o};
}
function subBudgets(){
  if(!fb.modules||!fb.db)return;
  const{doc,onSnapshot}=fb.modules;
  if(fb.unsubBudgets)fb.unsubBudgets();
  fb.unsubBudgets=onSnapshot(doc(fb.db,BUDGET_COLLECTION,"all_budgets"),(snap)=>{
    if(snap.exists()){
      const data=snap.data();
      Object.entries(data).forEach(([bid,months])=>{
        if(typeof months==="object"){
          st.budgets[bid]=st.budgets[bid]||{};
          Object.assign(st.budgets[bid],months);
        }
      });
      persistBudgets();
      render();
    }
  },(err)=>{console.error("Budget sync error",err);});
}

function getHolidays(year){
  // Fixed holidays
  const fixed=[
    `${year}-01-01`, // New Year's Day
    `${year}-07-04`, // Independence Day
    `${year}-12-25`, // Christmas
  ];
  // Memorial Day — last Monday of May
  const memDay=new Date(year,4,31);while(memDay.getDay()!==1)memDay.setDate(memDay.getDate()-1);
  fixed.push(memDay.getFullYear()+"-"+String(memDay.getMonth()+1).padStart(2,"0")+"-"+String(memDay.getDate()).padStart(2,"0"));
  // Labor Day — first Monday of September
  const labDay=new Date(year,8,1);while(labDay.getDay()!==1)labDay.setDate(labDay.getDate()+1);
  fixed.push(labDay.getFullYear()+"-"+String(labDay.getMonth()+1).padStart(2,"0")+"-"+String(labDay.getDate()).padStart(2,"0"));
  // Thanksgiving — fourth Thursday of November
  let thCount=0;const tg=new Date(year,10,1);while(thCount<4){if(tg.getDay()===4)thCount++;if(thCount<4)tg.setDate(tg.getDate()+1);}
  const tgKey=tg.getFullYear()+"-"+String(tg.getMonth()+1).padStart(2,"0")+"-"+String(tg.getDate()).padStart(2,"0");
  fixed.push(tgKey);
  // Black Friday — day after Thanksgiving
  const bf=new Date(tg);bf.setDate(bf.getDate()+1);
  fixed.push(bf.getFullYear()+"-"+String(bf.getMonth()+1).padStart(2,"0")+"-"+String(bf.getDate()).padStart(2,"0"));
  return new Set(fixed);
}

function isWorkDay(year,month,day){
  const date=new Date(year,month-1,day);
  const dow=date.getDay();
  if(dow===0||dow===6)return false;
  const dk=year+"-"+String(month).padStart(2,"0")+"-"+String(day).padStart(2,"0");
  const holidays=getHolidays(year);
  return!holidays.has(dk);
}

function workDaysInMonth(year,month){
  let count=0;const days=new Date(year,month,0).getDate();
  for(let d=1;d<=days;d++){if(isWorkDay(year,month,d))count++;}
  return count;
}
function workDaysThroughDate(year,month,day){
  let count=0;
  for(let d=1;d<=day;d++){if(isWorkDay(year,month,d))count++;}
  return count;
}
function monthKey(dateKey){const[y,m]=dateKey.split("-");return`${y}-${m}`;}
function monthLabel(mk){const[y,m]=mk.split("-");return new Date(+y,+m-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});}

function getBranchMonthRevenue(bid,mk){
  const brf=bid===st.branch?st.briefings:st.branchBriefings[bid]||{};
  const tk=todayKey();
  let total=0;
  Object.entries(brf).forEach(([dk,b])=>{
    if(!dk.startsWith(mk)||dk>tk)return;
    total+=getBranchDayRevenue(bid,dk);
  });
  return total;
}
function getBranchDayRevenue(bid,dk){
  const brf=bid===st.branch?st.briefings:st.branchBriefings[bid]||{};
  const b=brf[dk];if(!b)return 0;
  // Sum per-route revenue
  const routeTotal=b.routes?b.routes.reduce((a,r)=>{
    if(!r.revenue)return a;
    return a+parseMoney(r.revenue.vending)+parseMoney(r.revenue.market)+parseMoney(r.revenue.ocs);
  },0):0;
  // Sum overflow routes (imported routes not in the daily list)
  const overflowTotal=b.revenueOverflow?Object.values(b.revenueOverflow).reduce((a,r)=>{
    return a+parseMoney(r.vending)+parseMoney(r.market)+parseMoney(r.ocs);
  },0):0;
  const combinedRouteTotal=routeTotal+overflowTotal;
  if(combinedRouteTotal>0)return combinedRouteTotal;
  // Fall back to briefing-level revenue for legacy data
  if(b.revenue)return parseMoney(b.revenue.vending)+parseMoney(b.revenue.market)+parseMoney(b.revenue.ocs);
  return 0;
}

window.saveBudget=async function(){
  const gv=id=>{const el=document.getElementById(id);return el?parseFloat(el.value.replace(/[^0-9.]/g,""))||0:0;};

  const mk=monthKey(todayKey());
  await writeBudget(st.branch,mk,{vending:v,market:m,ocs:o});
  render();
};

function renderBudget(){
  const bid=st.branch;
  const mk=st.budgetMonth||monthKey(todayKey());
  const isCurrentMonth=mk===monthKey(todayKey());
  const[y,m]=mk.split("-");const today=new Date();
  // Yesterday's date key
  const yest=new Date(today);yest.setDate(yest.getDate()-1);
  const yesterdayKey=yest.getFullYear()+"-"+String(yest.getMonth()+1).padStart(2,"0")+"-"+String(yest.getDate()).padStart(2,"0");
  const yesterdayInMonth=yesterdayKey.startsWith(mk);

  const totalWorkDays=workDaysInMonth(+y,+m);
  const daysInMonth=new Date(+y,+m,0).getDate();
  const holidays=getHolidays(+y);
  // Count weekend+holiday days
  let totalOffDays=0;
  for(let d=1;d<=daysInMonth;d++){
    const dow=new Date(+y,+m-1,d).getDay();
    const dk2=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    if(dow===0||dow===6||holidays.has(dk2))totalOffDays++;
  }

  // Detect if the month is completely over
  const lastDayOfMonth=`${y}-${String(m).padStart(2,"0")}-${String(daysInMonth).padStart(2,"0")}`;
  const monthClosed=yesterdayKey>lastDayOfMonth;

  // For closed months use all days; for current month pace through yesterday
  const paceDay=monthClosed?daysInMonth:Math.min(yest.getDate(),daysInMonth);
  const workDaysThroughYesterday=monthClosed?totalWorkDays:(yesterdayInMonth?workDaysThroughDate(+y,+m,paceDay):totalWorkDays);
  // Count off days through paceDay
  let offDaysThroughYesterday=0;
  for(let d=1;d<=daysInMonth;d++){
    const dk2=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    if(!monthClosed&&dk2>yesterdayKey)break;
    const dow=new Date(+y,+m-1,d).getDay();
    if(dow===0||dow===6||holidays.has(dk2))offDaysThroughYesterday++;
  }

  const budgetCats=getBudgetCats(bid,mk);
  const monthlyBudget=budgetCats.total;

  // 92% of budget across work days, 8% across weekends/holidays
  const WORKDAY_SPLIT=0.92;const OFFDAY_SPLIT=0.08;
  const workdayBudget=monthlyBudget*WORKDAY_SPLIT;
  const offdayBudget=monthlyBudget*OFFDAY_SPLIT;
  const dailyWorkdayTarget=monthlyBudget>0&&totalWorkDays>0?workdayBudget/totalWorkDays:0;
  const dailyOffdayTarget=monthlyBudget>0&&totalOffDays>0?offdayBudget/totalOffDays:0;
  const dailyTarget=dailyWorkdayTarget; // shown in KPI tile (workday target)

  // MTD target = sum of per-day targets through yesterday
  const mtdTarget=dailyWorkdayTarget*workDaysThroughYesterday + dailyOffdayTarget*offDaysThroughYesterday;

  // MTD actual through yesterday
  const mtdActual=getBranchMonthRevenue(bid,mk);
  const pct=mtdTarget>0?Math.round(mtdActual/mtdTarget*100):null;
  const monthPct=monthlyBudget>0?Math.round(mtdActual/monthlyBudget*100):null;

  // Project month-end — for closed months trend = actual (final result)
  const totalTargetThroughYesterday=mtdTarget;
  const projected=monthClosed?mtdActual:(totalTargetThroughYesterday>0?(mtdActual/totalTargetThroughYesterday)*monthlyBudget:0);

  // Yesterday's revenue
  const yesterdayActual=getBranchDayRevenue(bid,yesterdayKey);
  const yesterdayIsWeekend=!isWorkDay(yest.getFullYear(),yest.getMonth()+1,yest.getDate());
  const yesterdayTarget=yesterdayIsWeekend?dailyOffdayTarget:dailyWorkdayTarget;
  const yesterdayCls=yesterdayTarget>0?(yesterdayActual>=yesterdayTarget*0.95?"kv-s":yesterdayActual>=yesterdayTarget*0.8?"kv-w":"kv-d"):"";
  const pctCls=pct===null?"":pct>=95?"kv-s":pct>=80?"kv-w":"kv-d";
  const projCls=monthlyBudget>0?(projected>=monthlyBudget?"kv-s":projected>=monthlyBudget*0.9?"kv-w":"kv-d"):"";
  const remainingWorkDays=totalWorkDays-workDaysThroughYesterday;
  // Count remaining off days after yesterday so we can subtract their expected contribution
  let remainingOffDays=0;
  for(let d=1;d<=daysInMonth;d++){
    const dk2=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    if(dk2<=yesterdayKey)continue;
    const dow=new Date(+y,+m-1,d).getDay();
    if(dow===0||dow===6||holidays.has(dk2))remainingOffDays++;
  }
  // Required workday rate = 91% of remaining budget / remaining workdays
  const requiredWorkdayRate=remainingWorkDays>0?(monthlyBudget-mtdActual)*WORKDAY_SPLIT/remainingWorkDays:0;

  // Build calendar — show revenue on ALL days, color vs appropriate target
  let calRows="";let weekCells=[];
  const startDow=new Date(+y,+m-1,1).getDay();
  for(let i=0;i<startDow;i++)weekCells.push(`<td></td>`);
  for(let d=1;d<=daysInMonth;d++){
    const dk=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dow=new Date(+y,+m-1,d).getDay();
    const isWknd=dow===0||dow===6;
    const isHoliday=holidays.has(dk);
    const isOff=isWknd||isHoliday;
    const isPast=dk<=yesterdayKey;const isToday2=dk===todayKey();
    const rev=getBranchDayRevenue(bid,dk);
    const dayTarget=isOff?dailyOffdayTarget:dailyWorkdayTarget;
    const hasBudget=monthlyBudget>0;
    let bg="";
    if(hasBudget&&isPast&&rev>0){
      if(rev>=dayTarget*0.95)bg="var(--ok-bg)";
      else if(rev>=dayTarget*0.8)bg="var(--warn-bg)";
      else bg="var(--danger-bg)";
    } else if(hasBudget&&isPast&&!isOff){
      bg="var(--bg-2)"; // workday with no revenue
    }
    const revTxt=isPast&&rev>0?`<div style="font-size:9px;color:var(--text-2);margin-top:1px">${fmtMoney(rev)}</div>`:"";
    const holidayDot=isHoliday&&!isWknd?`<div style="font-size:8px;color:var(--text-3);margin-top:1px">●</div>`:"";
    const border=isToday2?"2px solid var(--brand)":"0.5px solid var(--border)";
    weekCells.push(`<td style="padding:3px 2px;text-align:center;vertical-align:top">
      <div style="background:${bg||"transparent"};border:${border};border-radius:6px;padding:4px 2px;min-height:36px;opacity:${isOff?0.7:1}">
        <div style="font-size:11px;font-weight:${isToday2?"700":"400"};color:${isToday2?"var(--brand)":isOff?"var(--text-3)":"var(--text)"}">${d}</div>
        ${revTxt}${holidayDot}
      </div>
    </td>`);
    if(weekCells.length===7||(d===daysInMonth)){
      while(weekCells.length<7)weekCells.push(`<td></td>`);
      calRows+=`<tr>${weekCells.join("")}</tr>`;weekCells=[];
    }
  }

  return`<div class="app-header">
    <div style="display:flex;align-items:center;gap:10px"><img src="icon.png" class="app-logo" alt=""><div>
      <div class="app-title">Budget</div>
      <div class="app-sub">${activeBranch().label} · ${monthLabel(mk)} ${syncPill()}</div>
    </div></div>
    <div style="display:flex;align-items:center;gap:4px">
      <button onclick="(()=>{const d=new Date(${+y},${+m-2},1);st.budgetMonth=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');render();})()" style="padding:6px 10px;border:1px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text);font-size:16px;min-height:36px;display:flex;align-items:center;justify-content:center"><i class="ti ti-chevron-left"></i></button>
      ${!isCurrentMonth?`<button onclick="st.budgetMonth=null;render()" style="padding:6px 8px;border:1px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text-2);font-size:11px;font-weight:500;min-height:36px">This month</button>`:`<span class="date-badge">${monthLabel(mk)}</span>`}
      <button onclick="(()=>{const d=new Date(${+y},${+m},1);st.budgetMonth=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');render();})()" style="padding:6px 10px;border:1px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text);font-size:16px;min-height:36px;display:flex;align-items:center;justify-content:center"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>

  <div class="kpi-grid" style="grid-template-columns:repeat(2,minmax(0,1fr))">
    <div class="kpi"><div class="kpi-lbl">Monthly Target</div><div class="kpi-val" style="font-size:18px">${monthlyBudget>0?fmtMoneyAbbr(monthlyBudget):"Not set"}</div>
      ${monthlyBudget>0?`<div style="font-size:10px;color:var(--text-2);margin-top:3px;line-height:1.5">${budgetCats.vending>0?`V:${fmtMoney(budgetCats.vending)} `:""}${budgetCats.market>0?`M:${fmtMoney(budgetCats.market)} `:""}${budgetCats.ocs>0?`O:${fmtMoney(budgetCats.ocs)}`:""}`.trim()+`</div>`:""}
    </div>
    <div class="kpi"><div class="kpi-lbl">Daily Target</div><div class="kpi-val" style="font-size:18px">${dailyWorkdayTarget>0?fmtMoneyAbbr(dailyWorkdayTarget):"—"}</div><div style="font-size:10px;color:var(--text-2);margin-top:2px">${totalWorkDays} work days · 92/8 split</div></div>
    <div class="kpi"><div class="kpi-lbl">Yesterday's Revenue</div><div class="kpi-val ${yesterdayCls}">${yesterdayActual>0?fmtMoney(yesterdayActual):yesterdayIsWeekend?"Weekend":"—"}</div><div style="font-size:10px;color:var(--text-2);margin-top:2px">${fmtS(yesterdayKey)}</div></div>
    <div class="kpi"><div class="kpi-lbl">MTD Actual</div><div class="kpi-val ${pctCls}">${fmtMoneyAbbr(mtdActual)}</div>${mtdTarget>0?`<div style="font-size:10px;color:var(--text-2);margin-top:2px">vs ${fmtMoneyAbbr(mtdTarget)} target</div>`:""}</div>

      <div style="position:absolute;top:0;left:0;height:100%;width:${Math.min(monthPct||0,100)}%;background:${(monthPct||0)>=100?"var(--ok-line)":(monthPct||0)>=90?"var(--warn-line)":"var(--danger-line)"};border-radius:7px;transition:width .4s"></div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="display:flex;gap:10px;font-size:10px;color:var(--text-2)">
        <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:10px;height:4px;border-radius:2px;background:${(monthPct||0)>=100?"var(--ok-line)":(monthPct||0)>=90?"var(--warn-line)":"var(--danger-line)"}"></span>Actual</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:10px;height:8px;border-radius:2px;background:${projCls==="kv-s"?"rgba(99,153,34,.3)":projCls==="kv-w"?"rgba(239,159,39,.3)":"rgba(226,75,74,.3)"}"></span>Trend</span>
      </div>
      <span style="font-size:10px;color:var(--text-2)">Work day ${workDaysThroughYesterday} of ${totalWorkDays}</span>
    </div>

    <!-- To hit target / final result -->
    <div style="background:var(--bg-2);border-radius:var(--radius-md);padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
      ${monthClosed
        ?`<div style="font-size:11px;color:var(--text-2)">Month closed — final result <span style="font-weight:700;color:var(--text)">${monthPct}% of target</span></div>`
        :`<div style="font-size:11px;color:var(--text-2)"><span style="font-weight:700;color:var(--text)">${remainingWorkDays>0?fmtMoneyAbbr(requiredWorkdayRate)+"/day":"—"}</span> needed to hit target</div>`}
      <div style="font-size:11px;color:var(--text-3)">${monthClosed?"":""+remainingWorkDays+" work days left"}</div>
    </div>

    ${!monthClosed&&pct!==null&&projected>0&&Math.round(projected/monthlyBudget*100)<100?`<div style="margin-top:10px;padding:8px;background:var(--danger-bg);border-radius:var(--radius-md);font-size:12px;color:var(--danger-text)"><i class="ti ti-trending-down" style="vertical-align:-2px;margin-right:4px"></i>Behind pace by ${fmtMoney(mtdTarget-mtdActual)}</div>`:""}
    ${!monthClosed&&projected>0&&Math.round(projected/monthlyBudget*100)>=100&&Math.round(projected/monthlyBudget*100)<110?`<div style="margin-top:10px;padding:8px;background:var(--ok-bg);border-radius:var(--radius-md);font-size:12px;color:var(--ok-text)"><i class="ti ti-trending-up" style="vertical-align:-2px;margin-right:4px"></i>On track — pacing to hit target</div>`:""}
    ${!monthClosed&&projected>0&&Math.round(projected/monthlyBudget*100)>=110?`<div style="margin-top:10px;padding:8px;background:var(--ok-bg);border-radius:var(--radius-md);font-size:12px;color:var(--ok-text)"><i class="ti ti-trophy" style="vertical-align:-2px;margin-right:4px"></i>Ahead of pace by ${fmtMoney(mtdActual-mtdTarget)}</div>`:""}
    ${monthClosed&&monthPct!==null&&monthPct>=100?`<div style="margin-top:10px;padding:8px;background:var(--ok-bg);border-radius:var(--radius-md);font-size:12px;color:var(--ok-text)"><i class="ti ti-trophy" style="vertical-align:-2px;margin-right:4px"></i>Target hit — finished at ${monthPct}% (${fmtMoney(mtdActual-monthlyBudget)} over)</div>`:""}
    ${monthClosed&&monthPct!==null&&monthPct<100?`<div style="margin-top:10px;padding:8px;background:var(--danger-bg);border-radius:var(--radius-md);font-size:12px;color:var(--danger-text)"><i class="ti ti-flag" style="vertical-align:-2px;margin-right:4px"></i>Missed target by ${fmtMoney(monthlyBudget-mtdActual)}</div>`:""}
  </div>

  <span class="section-lbl">${monthLabel(mk)}</span>
  ${monthlyBudget>0?`
  <div class="chart-card" style="margin-bottom:12px">
    <div class="chart-title">Daily Revenue vs Target</div>

  </div>
  <div class="chart-card" style="margin-bottom:12px">
    <div class="chart-title">Cumulative MTD Variance</div>

    <div class="chart-wrap"><canvas id="chart-budget-cumulative"></canvas></div>
  </div>
  <div class="chart-card" style="margin-bottom:12px">
    <div class="chart-title">Daily Variance %</div>
    <div class="chart-sub">% over/under daily target — green above, red below</div>
    <div class="chart-wrap"><canvas id="chart-budget-variance"></canvas></div>
  </div>`:""}
  <div style="overflow-x:auto;margin-bottom:14px">
    <table style="width:100%;border-collapse:collapse">
      <thead><tr>${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<th style="font-size:10px;color:var(--text-2);padding:4px 2px;text-align:center;font-weight:500">${d}</th>`).join("")}</tr></thead>
      <tbody>${calRows}</tbody>
    </table>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;font-size:10px;color:var(--text-2)">
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--ok-bg);border-radius:2px;vertical-align:-1px;margin-right:3px"></span>≥95% of target</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--warn-bg);border-radius:2px;vertical-align:-1px;margin-right:3px"></span>80–94%</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--danger-bg);border-radius:2px;vertical-align:-1px;margin-right:3px"></span>Below 80% or no entry</span>
    </div>
  </div>`:""}

  <span class="section-lbl">Set ${monthLabel(mk)} budget</span>
  <div class="card">
    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:10px">
      <div class="field" style="margin-bottom:0">
        <label class="field-lbl">🎰 Vending</label>
        <input id="budget-vending" type="number" min="0" step="100" value="${budgetCats.vending||""}" placeholder="0">
      </div>
      <div class="field" style="margin-bottom:0">
        <label class="field-lbl">🏪 Market</label>
        <input id="budget-market" type="number" min="0" step="100" value="${budgetCats.market||""}" placeholder="0">
      </div>
      <div class="field" style="margin-bottom:0">
        <label class="field-lbl">☕ OCS</label>
        <input id="budget-ocs" type="number" min="0" step="100" value="${budgetCats.ocs||""}" placeholder="0">
      </div>
    </div>
    ${monthlyBudget>0?`<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-bottom:10px;padding:8px;background:var(--bg-2);border-radius:var(--radius-md);font-size:11px;text-align:center">
      <div><div style="color:var(--text-2)">Workday target</div><div style="font-weight:500;color:var(--text)">${dailyWorkdayTarget>0?fmtMoneyAbbr(dailyWorkdayTarget):"—"}</div></div>
      <div><div style="color:var(--text-2)">Weekend target</div><div style="font-weight:500;color:var(--text)">${dailyOffdayTarget>0?fmtMoneyAbbr(dailyOffdayTarget):"—"}</div></div>
      <div><div style="color:var(--text-2)">Split</div><div style="font-weight:500;color:var(--text)">91% / 9%</div></div>
    </div>`:""}
    <button class="btn-primary" onclick="saveBudget()"><i class="ti ti-device-floppy"></i> Save Budget — Total ${monthlyBudget>0?fmtMoney(monthlyBudget+((parseFloat(document.getElementById("budget-vending")?.value)||0)-(budgetCats.vending||0))+((parseFloat(document.getElementById("budget-market")?.value)||0)-(budgetCats.market||0))+((parseFloat(document.getElementById("budget-ocs")?.value)||0)-(budgetCats.ocs||0))):"—"}/mo</button>
  </div>
  <div class="footer-note">Pacing calculated through yesterday — today's entries show once the day closes.</div>`;
}

  st.branchBriefings[st.branch]=st.briefings;
  let body="";

  else if(st.tab==="history")body=renderHistory();
  else if(st.tab==="trends")body=renderTrends();
  else if(st.tab==="drivers")body=renderDrivers();
  else if(st.tab==="budget")body=renderBudget();
  else if(st.tab==="rollup")body=renderRollup();

function drawBudgetChart(){
  destroyCharts();
  const bid=st.branch;const mk=st.budgetMonth||monthKey(todayKey());
  const[y,m]=mk.split("-");
  const budgetCats=getBudgetCats(bid,mk);
  const monthlyBudget=budgetCats.total;
  if(!monthlyBudget)return;
  const totalWorkDays=workDaysInMonth(+y,+m);
  const daysInMonth=new Date(+y,+m,0).getDate();
  const holidays=getHolidays(+y);
  // Count off days for 9% split
  let totalOffDays=0;
  for(let d=1;d<=daysInMonth;d++){const dow=new Date(+y,+m-1,d).getDay();const dk2=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;if(dow===0||dow===6||holidays.has(dk2))totalOffDays++;}
  const dailyWorkdayTarget=totalWorkDays>0?(monthlyBudget*0.92)/totalWorkDays:0;
  const dailyOffdayTarget=totalOffDays>0?(monthlyBudget*0.08)/totalOffDays:0;
  const yest=new Date();yest.setDate(yest.getDate()-1);
  const yesterdayKey=yest.getFullYear()+"-"+String(yest.getMonth()+1).padStart(2,"0")+"-"+String(yest.getDate()).padStart(2,"0");
  const tc=getComputedStyle(document.documentElement).getPropertyValue("--text-2").trim()||"#888";
  const gc="rgba(128,128,128,.12)";
  const commonOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#191917",titleColor:"#fff",bodyColor:"#fff",padding:8}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{display:false}}}};

  // Build per-day data arrays — ALL days, not just workdays
  const labels=[],revData=[],varData=[],varColors=[],targetLine=[];
  let cumVar=0;const cumData=[];
  for(let d=1;d<=daysInMonth;d++){
    const dk=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    if(dk>yesterdayKey)break;
    const dow=new Date(+y,+m-1,d).getDay();
    const isOff=dow===0||dow===6||holidays.has(dk);
    const dayTarget=isOff?dailyOffdayTarget:dailyWorkdayTarget;
    const rev=getBranchDayRevenue(bid,dk);
    const dollarVar=rev-dayTarget;
    const vari=dayTarget>0?Math.round(dollarVar/dayTarget*100):0;
    cumVar+=dollarVar;
    labels.push(String(d));
    revData.push(Math.round(rev));

function getDriverStats(bid,days){
  const brf=bid===st.branch?st.briefings:st.branchBriefings[bid]||{};
  const cutoff=days>0?(()=>{const d=new Date();d.setDate(d.getDate()-days);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");})():null;
  const drivers={};
  const tk=todayKey();
  Object.entries(brf).forEach(([dk,b])=>{
    if(!b||!b.routes)return;
    if(cutoff&&dk<cutoff)return;
    if(dk>tk)return;
    b.routes.forEach(r=>{
      const key=r.assignedDriver||r.driver||r.id;
      if(!drivers[key])drivers[key]={name:key,route:r.id,days:0,assetsTotal:0,missedTotal:0,lateCount:0,safetyScores:[],absenceDays:0};
      const d=drivers[key];
      d.days++;
      if(ABSENCE.includes(r.status)){d.absenceDays++;return;}
      d.assetsTotal+=(parseInt(r.assets)||0);
      d.missedTotal+=(parseInt(r.missed)||0);
      if(r.status==="no")d.lateCount++;
      if(r.safetyScore!==""&&r.safetyScore!==null&&r.safetyScore!==undefined){
        const sc=parseFloat(r.safetyScore);if(!isNaN(sc)&&sc>0)d.safetyScores.push(sc);
      }
    });
  });
  return Object.values(drivers).map(d=>{
    const activeDays=d.days-d.absenceDays;
    const otPct=d.assetsTotal>0?Math.round(((d.assetsTotal-d.missedTotal)/d.assetsTotal)*1000)/10:null;
    const avgSafety=d.safetyScores.length?Math.round(d.safetyScores.reduce((a,b)=>a+b,0)/d.safetyScores.length*100)/100:null;
    const lateRate=activeDays>0?Math.round(d.lateCount/activeDays*100):0;
    const avgMissed=activeDays>0?Math.round(d.missedTotal/activeDays*10)/10:0;
    // Trend: compare last half vs first half of period
    return{...d,activeDays,otPct,avgSafety,lateRate,avgMissed};
  }).filter(d=>d.days>0).sort((a,b)=>{
    // Sort: drivers with data first, by OT% desc
    if(a.otPct===null&&b.otPct!==null)return 1;
    if(a.otPct!==null&&b.otPct===null)return -1;
    if(a.otPct===null&&b.otPct===null)return 0;
    return b.otPct-a.otPct;
  });
}

function driverGrade(otPct,avgSafety,lateRate,avgMissed){
  if(otPct===null)return{label:"N/A",cls:"",bg:""};
  let score=0;
  if(otPct>=98)score+=3;else if(otPct>=95)score+=2;else if(otPct>=90)score+=1;
  if(avgSafety!==null){if(avgSafety>=95)score+=2;else if(avgSafety>=85)score+=1;}
  if(lateRate===0)score+=2;else if(lateRate<=10)score+=1;
  if(avgMissed===0)score+=1;
  if(score>=7)return{label:"A",cls:"kv-s",bg:"var(--ok-bg)"};
  if(score>=5)return{label:"B",cls:"",bg:"var(--bg-2)"};
  if(score>=3)return{label:"C",cls:"kv-w",bg:"var(--warn-bg)"};
  return{label:"D",cls:"kv-d",bg:"var(--danger-bg)"};
}

window.setDriverRange=function(n){st.driverRange=n;render();};

function renderDrivers(){
  const range=st.driverRange||30;
  const sort=st.driverSort||"ot";
  let drivers=getDriverStats(st.branch,range);
  if(sort==="safety")drivers.sort((a,b)=>{if(a.avgSafety===null)return 1;if(b.avgSafety===null)return-1;return b.avgSafety-a.avgSafety;});
  else if(sort==="missed")drivers.sort((a,b)=>b.avgMissed-a.avgMissed);
  else if(sort==="late")drivers.sort((a,b)=>b.lateRate-a.lateRate);
  const rangeLabel={30:"Last 30 days",60:"Last 60 days",90:"Last 90 days",0:"All time"}[range]||"";
  const avgOT=drivers.filter(d=>d.otPct!==null);
  const branchOT=avgOT.length?Math.round(avgOT.reduce((a,d)=>a+d.otPct,0)/avgOT.length*10)/10:null;
  const branchSf=drivers.filter(d=>d.avgSafety!==null);
  const avgSf=branchSf.length?Math.round(branchSf.reduce((a,d)=>a+d.avgSafety,0)/branchSf.length*10)/10:null;

  let html2='<div class="app-header"><div style="display:flex;align-items:center;gap:10px"><img src="icon.png" class="app-logo" alt=""><div>';
  html2+='<div class="app-title">Driver Scorecards</div>';
  html2+='<div class="app-sub">'+activeBranch().label+' &middot; '+rangeLabel+'</div></div></div></div>';
  html2+='<div class="range-toggle" style="margin-bottom:8px">';
  [{v:30,l:"30d"},{v:60,l:"60d"},{v:90,l:"90d"},{v:0,l:"All"}].forEach(function(r2){
    html2+='<button class="range-btn'+(range===r2.v?' on':'')+'" onclick="setDriverRange('+r2.v+')">'+r2.l+'</button>';
  });
  html2+='</div><div style="display:flex;gap:6px;margin-bottom:16px;font-size:11px">';
  html2+='<span style="color:var(--text-2);padding:6px 4px;align-self:center">Sort:</span>';
  [{k:"ot",l:"On-Time"},{k:"safety",l:"Safety"},{k:"missed",l:"Missed"},{k:"late",l:"Late"}].forEach(function(s){
    html2+='<button class="range-btn'+(sort===s.k?' on':'')+'" onclick="setDriverSort(\''+ s.k +'\')" style="flex:1">'+s.l+'</button>';
  });
  html2+='</div>';

  if(drivers.length===0){
    html2+='<div class="empty-state"><i class="ti ti-users"></i><div class="empty-state-title">No driver data yet</div><div class="empty-state-sub">Data appears once briefings are saved with route info.</div></div>';
  } else {
    html2+='<div class="kpi-grid" style="grid-template-columns:repeat(2,minmax(0,1fr));margin-bottom:16px">';
    html2+='<div class="kpi"><div class="kpi-lbl">Branch On-Time</div><div class="kpi-val '+(branchOT===null?"":(branchOT>=95?"kv-s":branchOT>=85?"kv-w":"kv-d"))+'">'+(branchOT===null?"&mdash;":branchOT+"%")+'</div></div>';
    html2+='<div class="kpi"><div class="kpi-lbl">Branch Safety</div><div class="kpi-val '+(avgSf===null?"":(avgSf>=95?"kv-s":avgSf>=85?"kv-w":"kv-d"))+'">'+(avgSf===null?"&mdash;":avgSf)+'</div></div></div>';
    drivers.forEach(function(d){
      const grade=driverGrade(d.otPct,d.avgSafety,d.lateRate,d.avgMissed);
      const otCls=d.otPct===null?"":(d.otPct>=95?"kv-s":d.otPct>=85?"kv-w":"kv-d");
      const sfCls=d.avgSafety===null?"":(d.avgSafety>=95?"kv-s":d.avgSafety>=85?"kv-w":"kv-d");
      const flags=[];
      if(d.otPct!==null&&d.otPct<90)flags.push("Low on-time");
      if(d.avgSafety!==null&&d.avgSafety<85)flags.push("Safety concern");
      if(d.lateRate>20)flags.push("Frequently late");
      if(d.avgMissed>1)flags.push("High missed avg");
      const gradeColor=grade.cls==="kv-s"?"var(--ok-text)":grade.cls==="kv-w"?"var(--warn-text)":grade.cls==="kv-d"?"var(--danger-text)":"var(--text)";
      html2+='<div class="card" style="margin-bottom:10px">';
      html2+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
      html2+='<div><div style="font-size:15px;font-weight:600">'+esc(d.name)+'</div>';
      html2+='<div style="font-size:11px;color:var(--text-2);margin-top:2px">'+d.route+' &middot; '+d.activeDays+' active day'+(d.activeDays===1?"":"s")+'</div></div>';
      html2+='<div style="text-align:center;background:'+grade.bg+';border-radius:10px;padding:6px 14px;min-width:52px">';
      html2+='<div style="font-size:22px;font-weight:700;color:'+gradeColor+';line-height:1">'+grade.label+'</div>';
      html2+='<div style="font-size:9px;color:var(--text-2);margin-top:2px">GRADE</div></div></div>';
      html2+='<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-bottom:'+(flags.length?'10':'0')+'px">';
      html2+='<div class="kpi" style="padding:8px 4px"><div class="kpi-lbl">On-Time</div><div class="kpi-val '+otCls+'" style="font-size:17px">'+(d.otPct===null?"&mdash;":d.otPct+"%")+'</div></div>';
      html2+='<div class="kpi" style="padding:8px 4px"><div class="kpi-lbl">Safety</div><div class="kpi-val '+sfCls+'" style="font-size:17px">'+(d.avgSafety===null?"&mdash;":d.avgSafety)+'</div></div>';
      html2+='<div class="kpi" style="padding:8px 4px"><div class="kpi-lbl">Late Rate</div><div class="kpi-val '+(d.lateRate===0?"kv-s":d.lateRate<=10?"kv-w":"kv-d")+'" style="font-size:17px">'+d.lateRate+'%</div></div>';
      html2+='<div class="kpi" style="padding:8px 4px"><div class="kpi-lbl">Avg Missed</div><div class="kpi-val '+(d.avgMissed===0?"kv-s":d.avgMissed<=0.5?"kv-w":"kv-d")+'" style="font-size:17px">'+d.avgMissed+'</div></div></div>';
      if(flags.length){
        html2+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
        flags.forEach(function(f){html2+='<span style="font-size:10px;padding:2px 8px;border-radius:12px;background:var(--danger-bg);color:var(--danger-text);font-weight:500">&#9888; '+f+'</span>';});
        html2+='</div>';
      }
      html2+='</div>';
    });
  }
  return html2 + renderAttendanceSection();
}

window.saveNotifThresholds=async function(){
  const cfg=notifCfg();
  cfg.safetyThreshold=parseInt(document.getElementById("notif-safety")?.value)||85;
  cfg.missedThreshold=parseInt(document.getElementById("notif-missed")?.value)||3;
  cfg.lateNotif=document.getElementById("notif-late")?.checked||false;
  cfg.ncnsNotif=document.getElementById("notif-ncns")?.checked||true;
  st.notifSettings=cfg;
  saveNotifSettings();
  // Save subscription to Firebase so manager can be targeted
  if(cfg.enabled&&cfg.playerId&&st.syncStatus==="live"&&fb.modules){
    const{doc,setDoc}=fb.modules;
    try{await setDoc(doc(fb.db,NOTIF_COLLECTION,cfg.playerId),{name:st.managerName||"Unknown",playerId:cfg.playerId,thresholds:{safety:cfg.safetyThreshold,missed:cfg.missedThreshold,late:cfg.lateNotif,ncns:cfg.ncnsNotif},branch:st.branch,updatedAt:new Date().toISOString()});}
    catch(e){console.error("Notif save failed",e);}
  }

};

window.enableNotifications=async function(){
  const appId=document.getElementById("onesignal-app-id")?.value.trim();
  if(!appId){showToast("Enter your OneSignal App ID first");return;}
  const cfg=notifCfg();cfg.oneSignalAppId=appId;
  st.notifSettings=cfg;saveNotifSettings();
  try{
    await OneSignal.init({appId});
    const permission=await OneSignal.Notifications.requestPermission();
    if(permission){
      const playerId=await OneSignal.User.PushSubscription.id;
      cfg.enabled=true;cfg.playerId=playerId||"";
      st.notifSettings=cfg;saveNotifSettings();
      showToast("Notifications enabled!");render();
    }else{showToast("Permission denied — enable in browser settings");}
  }catch(e){showToast("OneSignal not loaded yet — paste App ID and try again");}
};

// Check thresholds when a briefing is published and send notifications
async function checkAndNotify(briefing){
  if(!briefing||st.syncStatus!=="live"||!fb.modules)return;
  const cfg=notifCfg();
  if(!cfg.oneSignalAppId)return;
  const flags=[];
  briefing.routes.forEach(r=>{
    if(cfg.ncnsNotif&&r.status==="ncns")flags.push(`NCNS: ${r.assignedDriver} on ${r.id}`);
    if(cfg.lateNotif&&r.status==="no")flags.push(`Late: ${r.driver||r.assignedDriver} on ${r.id}`);
    if(r.safetyScore!==""&&r.safetyScore!==null&&parseFloat(r.safetyScore)<cfg.safetyThreshold)flags.push(`Safety ${r.safetyScore} — ${r.driver||r.assignedDriver} (${r.id})`);
    if((parseInt(r.missed)||0)>=cfg.missedThreshold)flags.push(`${r.missed} missed — ${r.driver||r.assignedDriver} (${r.id})`);
  });
  if(!flags.length)return;
  // Get all subscribed managers from Firebase
  const{collection,getDocs}=fb.modules;
  try{
    const snap=await getDocs(collection(fb.db,NOTIF_COLLECTION));
    const playerIds=[];
    snap.forEach(doc=>{
      const data=doc.data();
      if(data.playerId&&data.playerId!==cfg.playerId)playerIds.push(data.playerId);
    });
    if(!playerIds.length)return;
    // Send via OneSignal REST API
    const msg=`${activeBranch().label} · ${fmtS(briefing.date)}\n${flags.slice(0,3).join("\n")}${flags.length>3?`\n+${flags.length-3} more`:""}`;
    await fetch("https://onesignal.com/api/v1/notifications",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Basic ${cfg.oneSignalAppId}`},
      body:JSON.stringify({app_id:cfg.oneSignalAppId,include_player_ids:playerIds,headings:{en:`${activeBranch().label} Briefing Alert`},contents:{en:msg}})
    });
  }catch(e){console.error("Notification send failed",e);}
}

}

    const angle=big
      ?(Math.random()*Math.PI*2)
      :(Math.random()*Math.PI-Math.PI/2)*0.7;
    const speed=(big?6:5)+Math.random()*(big?10:6);
    particles.push({
      x:cx,y:big?canvas.height*0.45:canvas.height*0.5,
      vx:Math.cos(angle)*speed*(Math.random()*.6+.7),
      vy:Math.sin(angle)*speed-( big?2:3),
      r:big?(3+Math.random()*4):(2+Math.random()*3),
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      rot:Math.random()*360,
      rotV:(Math.random()-0.5)*8,
      shape:Math.random()>.4?'rect':'circle',
      w:big?(6+Math.random()*6):(4+Math.random()*5),
      h:big?(3+Math.random()*3):(2+Math.random()*3),
      alpha:1,life:1,decay:big?.012+Math.random()*.008:.018+Math.random()*.012
    });
  }

  let frame;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    particles.forEach(p=>{
      p.vy+=0.22;p.vx*=0.99;p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;p.life-=p.decay;p.alpha=Math.max(0,p.life);
      if(p.alpha<=0)return;
      alive=true;
      ctx.save();ctx.globalAlpha=p.alpha;ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
      else{ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);}
      ctx.restore();
    });
    if(alive)frame=requestAnimationFrame(draw);
    else{canvas.remove();}
  }
  draw();

  // Also show a brief emoji burst for big celebrations
  if(big){
    const burst=document.createElement('div');
    burst.style.cssText='position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:52px;z-index:1000;pointer-events:none;animation:burstAnim .7s ease-out forwards';
    burst.textContent='🎉';
    document.body.appendChild(burst);
    if(!document.getElementById('burst-style')){
      const s=document.createElement('style');
      s.id='burst-style';
      s.textContent='@keyframes burstAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}40%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}';
      document.head.appendChild(s);
    }
    setTimeout(()=>burst.remove(),900);
  }
}

function showCongrats(b){
  const existing=document.getElementById('congrats-modal');
  if(existing)existing.remove();

  const cleanRoutes=b.routes.filter(r=>r.status!=='off'&&r.routeStatus==='finished'&&(parseInt(r.missed)||0)===0);
  const totalAssets=cleanRoutes.reduce((a,r)=>a+(parseInt(r.assets)||0),0);

  const modal=document.createElement('div');
  modal.id='congrats-modal';
  modal.style.cssText='position:fixed;inset:0;z-index:998;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);animation:fadeInBg .25s ease';
  modal.innerHTML=`
    <div style="background:var(--bg);border-radius:22px;padding:32px 24px;text-align:center;max-width:320px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.3);animation:popIn .4s cubic-bezier(.34,1.56,.64,1)">
      <div style="font-size:52px;margin-bottom:12px">🏆</div>
      <div style="font-size:20px;font-weight:800;color:var(--brand);margin-bottom:6px;letter-spacing:-.3px">Perfect Day!</div>
      <div style="font-size:14px;color:var(--text-2);line-height:1.6;margin-bottom:20px">
        All ${cleanRoutes.length} routes finished<br>with <strong style="color:var(--ok-text)">0 missed services</strong>${totalAssets>0?`<br><span style="font-size:13px">${totalAssets} assets served clean</span>`:''}
      </div>
      <button onclick="document.getElementById('congrats-modal').remove()" style="background:var(--brand);color:#fff;border:none;border-radius:14px;padding:13px 32px;font-size:15px;font-weight:700;cursor:pointer;width:100%;box-shadow:0 2px 8px rgba(214,62,14,.3)">Let's go! 🎯</button>
    </div>`;
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});

  if(!document.getElementById('modal-style')){
    const s=document.createElement('style');s.id='modal-style';
    s.textContent='@keyframes fadeInBg{from{opacity:0}to{opacity:1}}@keyframes popIn{0%{opacity:0;transform:scale(.7) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}';
    document.head.appendChild(s);
  }
  document.body.appendChild(modal);
}
const _origSetRS=window.setRS;
window.setRS=function(i,s){
  _origSetRS(i,s);
  if(s==='finished'){
    setTimeout(()=>haptic('success'),50);
    const b=ensureToday();
    const r=b.routes[i];
    const assets=parseInt(r.assets)||0;
    const missed=parseInt(r.missed)||0;
    if(assets>0&&missed===0){
      const otherRoutes=b.routes.filter((_,idx)=>idx!==i&&_.status!=='off');
      const allWillBeClean=otherRoutes.every(rt=>rt.routeStatus==='finished'&&(parseInt(rt.missed)||0)===0);
      if(allWillBeClean&&otherRoutes.length>0){
        setTimeout(()=>{launchConfetti(true);showCongrats(b);},150);
        setTimeout(()=>haptic('success'),350);
      } else {
        setTimeout(()=>launchConfetti(false),80);
      }
    }
  } else {
    setTimeout(()=>haptic('light'),30);
  }
};

// Swipe between tabs — only fires on very clean horizontal swipes, cancels on any vertical movement
(function(){
  const TAB_ORDER=["today","history","trends","drivers","budget","rollup","settings"];
  let sx=0,sy=0,st2=0,cancelled=false;
  document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;st2=Date.now();cancelled=false;},{passive:true});
  document.addEventListener('touchmove',e=>{if(!cancelled&&Math.abs(e.touches[0].clientY-sy)>8)cancelled=true;},{passive:true});
  document.addEventListener('touchend',e=>{
    if(cancelled)return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=Math.abs(e.changedTouches[0].clientY-sy);
    if(Date.now()-st2<300&&Math.abs(dx)>80&&dy<20){
      const cur=TAB_ORDER.indexOf(st.tab);if(cur===-1)return;
      const next=dx<0?Math.min(cur+1,TAB_ORDER.length-1):Math.max(cur-1,0);
      if(next!==cur){haptic('light');switchTab(TAB_ORDER[next]);}
    }
  },{passive:true});
})();

// Pull to refresh
(function(){
  const indicator=document.createElement('div');
  indicator.className='pull-indicator';
  indicator.innerHTML='<i class="ti ti-refresh" style="font-size:14px"></i> Refreshing…';
  document.body.appendChild(indicator);
  let pullStart=0,pulling=false;
  document.addEventListener('touchstart',e=>{
    if(window.scrollY===0)pullStart=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!pullStart)return;
    const dy=e.touches[0].clientY-pullStart;
    if(dy>60&&!pulling){pulling=true;indicator.classList.add('visible');}
  },{passive:true});
  document.addEventListener('touchend',()=>{
    if(pulling){
      pulling=false;pullStart=0;
      if(st.syncStatus==='live'&&fb.modules)subAll();
      setTimeout(()=>indicator.classList.remove('visible'),800);
    }else{pullStart=0;}
  },{passive:true});
})();

// Keyboard shortcuts (desktop)
document.addEventListener('keydown',e=>{
  // Don't fire when typing in an input
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  const TAB_KEYS={t:'today',h:'history',n:'trends',d:'drivers',b:'budget',r:'rollup',s:'settings'};
  if(TAB_KEYS[e.key]){switchTab(TAB_KEYS[e.key]);return;}
  if(st.tab==='today'&&st.todayView==='entry'){
    if(e.key==='ArrowLeft'){prevDay();return;}
    if(e.key==='ArrowRight'){nextDay();return;}
    if(e.key==='Escape'){st.openIdx=null;render();return;}
    // Tab through routes: enter opens next, escape closes
    if(e.key==='Enter'&&st.openIdx===null){
      const b=ensureToday();const first=b.routes.findIndex(r=>r.routeStatus!=='finished');
      if(first>=0){window.toggleRoute(first);}return;
    }
  }
});

// Flush any pending Firestore write before the app is hidden or closed,
// so the last edit isn't lost inside the 700ms debounce window.
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')flushWrite();});
window.addEventListener('pagehide',()=>{flushWrite();});

loadLocal();loadBudgets();loadNotifSettings();render();initFirebase();
</script>
