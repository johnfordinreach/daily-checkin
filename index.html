function getDriverStats(bid,days){
  const brf=bid===st.branch?st.briefings:st.branchBriefings[bid]||{};
  const cutoff=days>0?(()=>{const d=new Date();d.setDate(d.getDate()-days);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");})():null;
  const drivers={};
  const tk=todayKey();
  Object.entries(brf).forEach(([dk,b])=>{
    if(!b||!b.routes)return;
    if(cutoff&&dk<cutoff)return;
    if(dk>tk)return;
    b.routes.forEach(r=>{
      if(r.isAdHoc)return; // ad-hoc routes excluded from driver scorecards
      const name=r.assignedDriver||r.driver;
      if(!name||!name.trim())return; // skip routes with no named driver
      const key=name;
      if(!drivers[key])drivers[key]={name:key,route:r.id,days:0,assetsTotal:0,missedTotal:0,lateCount:0,safetyScores:[],absenceDays:0,unexcusedDays:0,revenueTotal:0,revDays:0,revWorkdays:0,revOffdays:0};
      const d=drivers[key];
      d.days++;
      if(ABSENCE.includes(r.status)){
        d.absenceDays++;
        // Only callout and NCNS count against the grade — PTO is excused
        if(r.status==="callout"||r.status==="ncns")d.unexcusedDays++;
        return;
      }
      d.assetsTotal+=(parseInt(r.assets)||0);
      d.missedTotal+=(parseInt(r.missed)||0);
      if(r.status==="no")d.lateCount++;
      if(r.safetyScore!==""&&r.safetyScore!==null&&r.safetyScore!==undefined){
        const sc=parseFloat(r.safetyScore);if(!isNaN(sc)&&sc>0)d.safetyScores.push(sc);
      }
      if(r.revenue){
        const rv=parseMoney(r.revenue.vending)+parseMoney(r.revenue.market)+parseMoney(r.revenue.ocs);
        if(rv>0){
          d.revenueTotal+=rv;d.revDays++;
          const dow=new Date(dk+"T12:00:00").getDay();
          if(dow===0||dow===6)d.revOffdays++;else d.revWorkdays++;
        }
      }
    });
  });
  return Object.values(drivers).map(d=>{
    const activeDays=d.days-d.absenceDays;
    const otPct=d.assetsTotal>0?Math.round(((d.assetsTotal-d.missedTotal)/d.assetsTotal)*1000)/10:null;
    const avgSafety=d.safetyScores.length?Math.round(d.safetyScores.reduce((a,b)=>a+b,0)/d.safetyScores.length*100)/100:null;
    const lateRate=activeDays>0?Math.round(d.lateCount/activeDays*100):0;
    const avgMissed=activeDays>0?Math.round(d.missedTotal/activeDays*10)/10:0;
    // Trend: compare last half vs first half of period
    const avgRevenue=d.revDays>0?Math.round(d.revenueTotal/d.revDays):0;
    const avgDayType=d.revOffdays>d.revWorkdays?"off":"workday";
    return{...d,activeDays,otPct,avgSafety,lateRate,avgMissed,avgRevenue,avgDayType,unexcusedDays:d.unexcusedDays||0};
  }).filter(d=>d.days>0).sort((a,b)=>{
    // Sort: drivers with data first, by OT% desc
    if(a.otPct===null&&b.otPct!==null)return 1;
    if(a.otPct!==null&&b.otPct===null)return -1;
    if(a.otPct===null&&b.otPct===null)return 0;
    return b.otPct-a.otPct;
  });
}

// Daily revenue target per route: $1M/year split 92/8 workday/weekend
const ROUTE_ANNUAL_TARGET=1000000;
const ROUTE_WORKDAY_TARGET=Math.round(ROUTE_ANNUAL_TARGET*0.92/260); // ~$3,538
const ROUTE_OFFDAY_TARGET=Math.round(ROUTE_ANNUAL_TARGET*0.08/105);  // ~$762

function driverGrade(otPct,avgSafety,lateRate,avgMissed,absenceDays,activeDays,avgRevenue,avgDayType,unexcusedDays){
  if(otPct===null&&avgSafety===null)return{label:"N/A",cls:"",bg:""};
  let score=0;

  // On-Time (max 3pts)
  if(otPct!==null){
    if(otPct>=98)score+=3;else if(otPct>=95)score+=2;else if(otPct>=90)score+=1;
  }

  // Safety (max 2pts)
  if(avgSafety!==null){
    if(avgSafety>=95)score+=2;else if(avgSafety>=85)score+=1;
  }

  // Late Rate (max 1, min -1)
  if(lateRate===0)score+=1;
  else if(lateRate>10)score-=1;

  // Absences — Callout/NCNS only, PTO excused — scaled to annualized rate
  // >3/year = neutral, >6/year = -2
  const unexcused=unexcusedDays||0;
  const totalDays=(activeDays||(absenceDays||0)>0?activeDays+(absenceDays||0):1)||(1);
  const annualizedRate=unexcused/totalDays*365;
  if(unexcused===0)score+=2;
  else if(annualizedRate<=3)score+=2;
  else if(annualizedRate<=6)score+=0;
  else score-=2;

  // Revenue vs daily target (max 2, min -1)
  if(avgRevenue>0){
    const target=avgDayType==="off"?ROUTE_OFFDAY_TARGET:ROUTE_WORKDAY_TARGET;
    const pct=avgRevenue/target*100;
    if(pct>=110)score+=2;
    else if(pct>=90)score+=1;
    else if(pct<75)score-=1;
  }

  // Grade thresholds (max possible ~9)
  if(score>=8)return{label:"A",cls:"kv-s",bg:"var(--ok-bg)"};
  if(score>=6)return{label:"B",cls:"",bg:"var(--bg-2)"};
  if(score>=4)return{label:"C",cls:"kv-w",bg:"var(--warn-bg)"};
  return{label:"D",cls:"kv-d",bg:"var(--danger-bg)"};
}

function renderDrivers(){
  const range=st.driverRange||30;

  else if(sort==="missed")drivers.sort((a,b)=>b.avgMissed-a.avgMissed);
  else if(sort==="late")drivers.sort((a,b)=>b.lateRate-a.lateRate);
  else if(sort==="revenue")drivers.sort((a,b)=>b.avgRevenue-a.avgRevenue);
  const rangeLabel={30:"Last 30 days",60:"Last 60 days",90:"Last 90 days",0:"All time"}[range]||"";
  const avgOT=drivers.filter(d=>d.otPct!==null);
  const branchOT=avgOT.length?Math.round(avgOT.reduce((a,d)=>a+d.otPct,0)/avgOT.length*10)/10:null;
  const branchSf=drivers.filter(d=>d.avgSafety!==null);
  const avgSf=branchSf.length?Math.round(branchSf.reduce((a,d)=>a+d.avgSafety,0)/branchSf.length*10)/10:null;

  let html2='<div class="app-header"><div style="display:flex;align-items:center;gap:10px"><img src="icon.png" class="app-logo" alt=""><div>';
  html2+='<div class="app-title">Driver Scorecards</div>';

  [{v:30,l:"30d"},{v:60,l:"60d"},{v:90,l:"90d"},{v:0,l:"All"}].forEach(function(r2){
    html2+='<button class="range-btn'+(range===r2.v?' on':'')+'" onclick="setDriverRange('+r2.v+')">'+r2.l+'</button>';
  });
  html2+='</div><div style="display:flex;gap:6px;margin-bottom:16px;font-size:11px">';

const NOTIF_KEY="dfw_notif_v1";
const NOTIF_COLLECTION="dfw_notif_subs";

function loadNotifSettings(){

}
function saveNotifSettings(){
  try{localStorage.setItem(NOTIF_KEY,JSON.stringify(st.notifSettings));}catch(e){}
}

function getNotifDefaults(){
  return{
    enabled:false,
    safetyThreshold:85,
    missedThreshold:3,
    lateNotif:false,
    ncnsNotif:true,
    oneSignalAppId:"",
    playerId:"",
    managerName:st.managerName||""
  };
}
function notifCfg(){return{...getNotifDefaults(),...(st.notifSettings||{})};}

window.saveNotifThresholds=async function(){
  const cfg=notifCfg();
  cfg.safetyThreshold=parseInt(document.getElementById("notif-safety")?.value)||85;
  cfg.missedThreshold=parseInt(document.getElementById("notif-missed")?.value)||3;
  cfg.lateNotif=document.getElementById("notif-late")?.checked||false;
  cfg.ncnsNotif=document.getElementById("notif-ncns")?.checked||true;
  st.notifSettings=cfg;
  saveNotifSettings();
  // Save subscription to Firebase so manager can be targeted
  if(cfg.enabled&&cfg.playerId&&st.syncStatus==="live"&&fb.modules){
    const{doc,setDoc}=fb.modules;
    try{await setDoc(doc(fb.db,NOTIF_COLLECTION,cfg.playerId),{name:st.managerName||"Unknown",playerId:cfg.playerId,thresholds:{safety:cfg.safetyThreshold,missed:cfg.missedThreshold,late:cfg.lateNotif,ncns:cfg.ncnsNotif},branch:st.branch,updatedAt:new Date().toISOString()});}
    catch(e){console.error("Notif save failed",e);}
  }
  showToast("Notification settings saved");render();
};

window.enableNotifications=async function(){
  const appId=document.getElementById("onesignal-app-id")?.value.trim();
  if(!appId){showToast("Enter your OneSignal App ID first");return;}
  const cfg=notifCfg();cfg.oneSignalAppId=appId;
  st.notifSettings=cfg;saveNotifSettings();
  try{
    await OneSignal.init({appId});
    const permission=await OneSignal.Notifications.requestPermission();
    if(permission){
      const playerId=await OneSignal.User.PushSubscription.id;
      cfg.enabled=true;cfg.playerId=playerId||"";
      st.notifSettings=cfg;saveNotifSettings();
      showToast("Notifications enabled!");render();
    }else{showToast("Permission denied — enable in browser settings");}
  }catch(e){showToast("OneSignal not loaded yet — paste App ID and try again");}
};

// Check thresholds when a briefing is published and send notifications
async function checkAndNotify(briefing){
  if(!briefing||st.syncStatus!=="live"||!fb.modules)return;
  const cfg=notifCfg();
  if(!cfg.oneSignalAppId)return;
  const flags=[];
  briefing.routes.forEach(r=>{
    if(cfg.ncnsNotif&&r.status==="ncns")flags.push(`NCNS: ${r.assignedDriver} on ${r.id}`);
    if(cfg.lateNotif&&r.status==="no")flags.push(`Late: ${r.driver||r.assignedDriver} on ${r.id}`);
    if(r.safetyScore!==""&&r.safetyScore!==null&&parseFloat(r.safetyScore)<cfg.safetyThreshold)flags.push(`Safety ${r.safetyScore} — ${r.driver||r.assignedDriver} (${r.id})`);
    if((parseInt(r.missed)||0)>=cfg.missedThreshold)flags.push(`${r.missed} missed — ${r.driver||r.assignedDriver} (${r.id})`);
  });
  if(!flags.length)return;
  // Get all subscribed managers from Firebase
  const{collection,getDocs}=fb.modules;
  try{
    const snap=await getDocs(collection(fb.db,NOTIF_COLLECTION));
    const playerIds=[];
    snap.forEach(doc=>{
      const data=doc.data();
      if(data.playerId&&data.playerId!==cfg.playerId)playerIds.push(data.playerId);
    });
    if(!playerIds.length)return;
    // Send via OneSignal REST API
    const msg=`${activeBranch().label} · ${fmtS(briefing.date)}\n${flags.slice(0,3).join("\n")}${flags.length>3?`\n+${flags.length-3} more`:""}`;
    await fetch("https://onesignal.com/api/v1/notifications",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Basic ${cfg.oneSignalAppId}`},
      body:JSON.stringify({app_id:cfg.oneSignalAppId,include_player_ids:playerIds,headings:{en:`${activeBranch().label} Briefing Alert`},contents:{en:msg}})
    });
  }catch(e){console.error("Notification send failed",e);}
}

// ---- Celebration animations ----
function launchConfetti(big){
  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999';
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  const COLORS=big
    ?['#D63E0E','#639922','#378ADD','#EF9F27','#E24B4A','#b0a9f5','#ffffff','#FFD700']
    :['#D63E0E','#639922','#EF9F27','#ffffff'];

  const count=big?140:55;
  const particles=[];
  const cx=canvas.width/2;

  for(let i=0;i<count;i++){
    const angle=big
      ?(Math.random()*Math.PI*2)
      :(Math.random()*Math.PI-Math.PI/2)*0.7;
    const speed=(big?6:5)+Math.random()*(big?10:6);
    particles.push({
      x:cx,y:big?canvas.height*0.45:canvas.height*0.5,
      vx:Math.cos(angle)*speed*(Math.random()*.6+.7),
      vy:Math.sin(angle)*speed-( big?2:3),
      r:big?(3+Math.random()*4):(2+Math.random()*3),
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      rot:Math.random()*360,
      rotV:(Math.random()-0.5)*8,
      shape:Math.random()>.4?'rect':'circle',
      w:big?(6+Math.random()*6):(4+Math.random()*5),
      h:big?(3+Math.random()*3):(2+Math.random()*3),
      alpha:1,life:1,decay:big?.012+Math.random()*.008:.018+Math.random()*.012
    });
  }

  let frame;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    particles.forEach(p=>{
      p.vy+=0.22;p.vx*=0.99;p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;p.life-=p.decay;p.alpha=Math.max(0,p.life);
      if(p.alpha<=0)return;
      alive=true;
      ctx.save();ctx.globalAlpha=p.alpha;ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
      else{ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);}
      ctx.restore();
    });
    if(alive)frame=requestAnimationFrame(draw);
    else{canvas.remove();}
  }
  draw();

  // Also show a brief emoji burst for big celebrations
  if(big){
    const burst=document.createElement('div');
    burst.style.cssText='position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:52px;z-index:1000;pointer-events:none;animation:burstAnim .7s ease-out forwards';
    burst.textContent='🎉';
    document.body.appendChild(burst);
    if(!document.getElementById('burst-style')){
      const s=document.createElement('style');
      s.id='burst-style';
      s.textContent='@keyframes burstAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}40%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}';
      document.head.appendChild(s);
    }
    setTimeout(()=>burst.remove(),900);
  }
}

const _origSetRS=window.setRS;
window.setRS=function(i,s){

    if(assets>0&&missed===0){
      const otherRoutes=b.routes.filter((_,idx)=>idx!==i&&_.status!=='off');
      const allWillBeClean=otherRoutes.every(rt=>rt.routeStatus==='finished'&&(parseInt(rt.missed)||0)===0);
      if(allWillBeClean&&otherRoutes.length>0){
        setTimeout(()=>{launchConfetti(true);showCongrats(b);},150);
        setTimeout(()=>haptic('success'),350);
      } else {
        setTimeout(()=>launchConfetti(false),80);
      }
    }
  } else {
    setTimeout(()=>haptic('light'),30);
  }
};

// Swipe between tabs — only fires on very clean horizontal swipes, cancels on any vertical movement
(function(){
  const TAB_ORDER=["today","history","trends","drivers","budget","rollup","settings"];
  let sx=0,sy=0,st2=0,cancelled=false;
  document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;st2=Date.now();cancelled=false;},{passive:true});
  document.addEventListener('touchmove',e=>{if(!cancelled&&Math.abs(e.touches[0].clientY-sy)>8)cancelled=true;},{passive:true});
  document.addEventListener('touchend',e=>{
    if(cancelled)return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=Math.abs(e.changedTouches[0].clientY-sy);
    if(Date.now()-st2<300&&Math.abs(dx)>80&&dy<20){
      const cur=TAB_ORDER.indexOf(st.tab);if(cur===-1)return;
      const next=dx<0?Math.min(cur+1,TAB_ORDER.length-1):Math.max(cur-1,0);
      if(next!==cur){haptic('light');switchTab(TAB_ORDER[next]);}
    }
  },{passive:true});
})();

// Pull to refresh
(function(){
  const indicator=document.createElement('div');
  indicator.className='pull-indicator';
  indicator.innerHTML='<i class="ti ti-refresh" style="font-size:14px"></i> Refreshing…';
  document.body.appendChild(indicator);
  let pullStart=0,pulling=false;
  document.addEventListener('touchstart',e=>{
    if(window.scrollY===0)pullStart=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!pullStart)return;
    const dy=e.touches[0].clientY-pullStart;
    if(dy>60&&!pulling){pulling=true;indicator.classList.add('visible');}
  },{passive:true});
  document.addEventListener('touchend',()=>{
    if(pulling){
      pulling=false;pullStart=0;
      if(st.syncStatus==='live'&&fb.modules)subAll();
      setTimeout(()=>indicator.classList.remove('visible'),800);
    }else{pullStart=0;}
  },{passive:true});
})();

// Keyboard shortcuts (desktop)
document.addEventListener('keydown',e=>{
  // Don't fire when typing in an input
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  const TAB_KEYS={t:'today',h:'history',n:'trends',d:'drivers',b:'budget',r:'rollup',s:'settings'};
  if(TAB_KEYS[e.key]){switchTab(TAB_KEYS[e.key]);return;}
  if(st.tab==='today'&&st.todayView==='entry'){
    if(e.key==='ArrowLeft'){prevDay();return;}
    if(e.key==='ArrowRight'){nextDay();return;}
    if(e.key==='Escape'){st.openIdx=null;render();return;}
    // Tab through routes: enter opens next, escape closes
    if(e.key==='Enter'&&st.openIdx===null){
      const b=ensureToday();const first=b.routes.findIndex(r=>r.routeStatus!=='finished');
      if(first>=0){window.toggleRoute(first);}return;
    }
  }
});

// ---- Auto-finish all routes at end of day ----
function autoFinishDay(){
  const tk=todayKey();
  let anyChange=false;
  BRANCH_IDS.forEach(bid=>{
    const brf=st.branchBriefings[bid]||{};
    const b=brf[tk];
    if(!b||!b.routes)return;
    b.routes.forEach(r=>{
      if(r.status!=='off'&&r.routeStatus!=='finished'){
        r.routeStatus='finished';
        anyChange=true;
      }
    });
    if(anyChange){
      try{localStorage.setItem(BRANCHES[bid].storeKey,JSON.stringify(brf));}catch(e){}
      if(st.syncStatus==='live'&&fb.modules&&fb.db)writeB(b,bid).catch(()=>{});
    }
  });
  if(anyChange){
    if(st.branch)st.briefings=st.branchBriefings[st.branch]||{};
    render();
    showToast('Day ended — all routes marked finished');
  }
  // Schedule next midnight check
  scheduleMidnightFinish();
}

function scheduleMidnightFinish(){
  const now=new Date();
  const midnight=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,5); // 12:00:05 AM
  const msUntilMidnight=midnight-now;
  setTimeout(autoFinishDay, msUntilMidnight);
}

scheduleMidnightFinish();

loadLocal();loadBudgets();loadNotifSettings();render();initFirebase();
</script>
