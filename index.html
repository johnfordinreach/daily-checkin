// ---- Yesterday's Recap Card ----
window.dismissRecap=function(){st.recapDismissed=todayKey();render();};

function renderRecapCard(){
  // Don't show if dismissed today
  if(st.recapDismissed===todayKey())return"";

  // Get yesterday's briefing
  const yest=new Date();yest.setDate(yest.getDate()-1);
  const yk=yest.getFullYear()+"-"+String(yest.getMonth()+1).padStart(2,"0")+"-"+String(yest.getDate()).padStart(2,"0");
  const yb=st.briefings[yk];
  if(!yb||!yb.routes)return"";

  // Thresholds
  const SPOILS_THRESH=350;
  const SHRINK_THRESH=1500;
  const RESTOCKS_THRESH=3;
  const SAFETY_THRESH=85;

  const flags=[];

  yb.routes.forEach(r=>{
    if(r.status==="off")return;
    const name=r.driver||r.assignedDriver||r.id;
    const route=r.id;

    // Spoils
    const spoils=parseFloat(r.spoils)||0;
    if(spoils>SPOILS_THRESH){
      flags.push({level:"warn",icon:"ti-trash",label:"High Spoils",detail:`${esc(name)} (${route})`,value:`$${spoils.toFixed(2)}`,sub:"exceeds $"+SPOILS_THRESH+" threshold"});
    }

    // Shrink — flag both directions
    const shrink=parseFloat(r.shrink)||0;
    if(Math.abs(shrink)>SHRINK_THRESH){
      const isNeg=shrink<0;
      flags.push({level:"danger",icon:"ti-alert-triangle",label:isNeg?"Negative Shrink ⚠":"High Shrink",detail:`${esc(name)} (${route})`,value:(isNeg?"-":"")+"$"+Math.abs(shrink).toFixed(2),sub:isNeg?"Possible data error or return — verify immediately":"exceeds $"+SHRINK_THRESH+" threshold"});
    }

    // Safety
    const safety=r.safetyScore!==""&&r.safetyScore!=null?parseFloat(r.safetyScore):null;
    if(safety!==null&&safety<SAFETY_THRESH){
      flags.push({level:"danger",icon:"ti-shield-off",label:"Low Safety Score",detail:`${esc(name)} (${route})`,value:String(safety),sub:"below "+SAFETY_THRESH+" threshold"});
    }

    // Missed restocks
    const restocks=parseInt(r.missedRestocks)||0;
    if(restocks>=RESTOCKS_THRESH){
      flags.push({level:"warn",icon:"ti-package-off",label:"Missed Restocks",detail:`${esc(name)} (${route})`,value:restocks+" restocks",sub:"meets or exceeds "+RESTOCKS_THRESH+" threshold"});
    }
  });

  // Also check overflow spoils/shrink
  if(yb.spoilsShrinkOverflow){
    Object.entries(yb.spoilsShrinkOverflow).forEach(([routeId,data])=>{
      const spoils=parseFloat(data.spoils)||0;
      const shrink=parseFloat(data.shrink)||0;
      if(spoils>SPOILS_THRESH)flags.push({level:"warn",icon:"ti-trash",label:"High Spoils",detail:`${routeId} (unlisted route)`,value:`$${spoils.toFixed(2)}`,sub:"exceeds $"+SPOILS_THRESH+" threshold"});
      if(Math.abs(shrink)>SHRINK_THRESH){
        const isNeg=shrink<0;
        flags.push({level:"danger",icon:"ti-alert-triangle",label:isNeg?"Negative Shrink ⚠":"High Shrink",detail:`${routeId} (unlisted route)`,value:(isNeg?"-":"")+"$"+Math.abs(shrink).toFixed(2),sub:isNeg?"Possible data error or return — verify immediately":"exceeds $"+SHRINK_THRESH+" threshold"});
      }
    });
  }

  if(!flags.length)return"";

  const dayLabel=yest.toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});

  return`<div style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:6px">
        <i class="ti ti-clipboard-list" style="color:var(--warn-text);font-size:16px"></i>
        <span style="font-size:12px;font-weight:700;color:var(--warn-text);text-transform:uppercase;letter-spacing:.06em">Yesterday's Recap</span>
        <span style="font-size:11px;color:var(--text-2)">${dayLabel}</span>
      </div>
      <button onclick="dismissRecap()" style="font-size:11px;color:var(--text-3);padding:3px 8px;border:1px solid var(--border);border-radius:20px;background:var(--bg-2);font-weight:500">Dismiss</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${flags.map(f=>`<div style="background:${f.level==="danger"?"var(--danger-bg)":"var(--warn-bg)"};border:1px solid ${f.level==="danger"?"var(--danger-border)":"var(--warn-border)"};border-radius:var(--radius-lg);padding:11px 14px;display:flex;align-items:center;gap:12px">
        <i class="ti ${f.icon}" style="font-size:20px;color:${f.level==="danger"?"var(--danger-text)":"var(--warn-text)"};flex-shrink:0"></i>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:700;color:${f.level==="danger"?"var(--danger-text)":"var(--warn-text)"};text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">${f.label}</div>
          <div style="font-size:13px;font-weight:600;color:var(--text)">${f.detail}</div>
          <div style="font-size:11px;color:var(--text-2);margin-top:2px">${f.sub}</div>
        </div>
        <div style="font-size:16px;font-weight:800;color:${f.level==="danger"?"var(--danger-text)":"var(--warn-text)"};flex-shrink:0;text-align:right">${f.value}</div>
      </div>`).join("")}
    </div>
  </div>`;
}

// ---- Render entry ----
function renderEntry(){
  const b=ensureToday();const sk=selKey();const isToday=sk===todayKey();
  const s=bStats(b);
  const finished=b.routes.filter(r=>!r.isAdHoc&&r.routeStatus==="finished").length;
  const inProg=b.routes.filter(r=>!r.isAdHoc&&r.routeStatus==="in_progress").length;
  const notStart=b.routes.filter(r=>!r.isAdHoc&&r.routeStatus==="not_started"&&r.status!=="off").length;
  const total=b.routes.filter(r=>!r.isAdHoc&&r.status!=="off").length;
  const migrationBanner=`<div style="background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:14px;font-size:12px;color:var(--warn-text);line-height:1.6;display:flex;align-items:flex-start;gap:8px"><i class="ti ti-alert-circle" style="font-size:16px;flex-shrink:0;margin-top:1px"></i><span>Please migrate to the new link at <a href="https://inreach-checkin.github.io/daily-checkin/" target="_blank" style="color:var(--warn-text);font-weight:700;text-decoration:underline">https://inreach-checkin.github.io/daily-checkin/</a></span></div>`;
  return`${migrationBanner}<div class="app-header"><div style="display:flex;align-items:center;gap:10px"><img src="icon.png" class="app-logo" alt=""><div><div class="app-title">${activeBranch().label} Daily Check-in</div><div class="app-sub">${isToday?"Today":fmtDN(sk)+", "+fmtS(sk)} ${syncPill()}</div></div></div>
  <div style="display:flex;align-items:center;gap:4px">
    <button onclick="prevDay()" style="padding:6px 10px;border:0.5px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text);font-size:16px;min-height:36px;display:flex;align-items:center;justify-content:center"><i class="ti ti-chevron-left" style="font-size:16px"></i></button>
    <span class="date-badge" style="font-weight:500;cursor:${!isToday?'pointer':''}" onclick="${!isToday?'jumpToday()':''}" title="${!isToday?'Tap to go to today':''}">${fmtS(sk)}${isToday?' ·  Today':''}</span>
    <button onclick="nextDay()" style="padding:6px 10px;border:0.5px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text);font-size:16px;min-height:36px;display:flex;align-items:center;justify-content:center"><i class="ti ti-chevron-right" style="font-size:16px"></i></button>
  </div></div>
  ${branchPill()}
  ${(()=>{
    // Progress ring — routes finished / total
    const pct=total>0?finished/total:0;
    const R=30,C=2*Math.PI*R;
    const dash=C*pct,gap=C-dash;
    const ringColor=pct===1?'var(--ok-line)':pct>0?'var(--warn-line)':'var(--border-2)';
    return`<div style="display:flex;gap:12px;margin-bottom:16px;align-items:stretch">
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);padding:10px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0">
        <svg width="72" height="72" viewBox="0 0 72 72" style="transform:rotate(-90deg)">
          <circle cx="36" cy="36" r="${R}" fill="none" stroke="var(--bg-3)" stroke-width="7"/>
          <circle cx="36" cy="36" r="${R}" fill="none" stroke="${ringColor}" stroke-width="7" stroke-linecap="round" stroke-dasharray="${dash} ${gap}" style="transition:stroke-dasharray .6s cubic-bezier(.2,.8,.3,1)"/>
        </svg>
        <div style="position:absolute;width:72px;height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none">
          <div style="font-size:17px;font-weight:800;letter-spacing:-.5px;line-height:1">${finished}<span style="font-size:11px;font-weight:600;color:var(--text-3)">/${total}</span></div>
          <div style="font-size:8px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px">routes</div>
        </div>
      </div>
      <div class="status-bar" style="margin-bottom:0;flex:1">
        <div class="sb-item"><div class="sb-num" style="color:var(--ok-text)">${finished}</div><div class="sb-lbl">Done</div></div>
        <div class="sb-item" style="border-left:0.5px solid var(--border);border-right:0.5px solid var(--border)"><div class="sb-num" style="color:var(--warn-text)">${inProg}</div><div class="sb-lbl">In Prog</div></div>
        <div class="sb-item" style="border-right:0.5px solid var(--border)"><div class="sb-num" style="color:var(--text-2)">${notStart}</div><div class="sb-lbl">Pending</div></div>
        <div class="sb-item"><div class="sb-num" style="color:${s.totalMissed>0?'var(--danger-text)':'var(--text-2)'}">${s.totalMissed}</div><div class="sb-lbl">Missed</div></div>
      </div>
    </div>`;
  })()}
  ${stepperHTML(b.checkInStatus,true)}
  ${isToday&&b.checkInStatus==="not_started"?renderRecapCard():""}
  <div class="section">
    <span class="section-lbl">Coverage notes (optional)</span>
    <div class="card"><div class="field"><label class="field-lbl">Free-form coverage notes</label><textarea id="f-coverage" oninput="onFI()" placeholder="e.g. Mike-assist 793, Rich-assist 709...">${esc(b.plan.coverageNotes)}</textarea></div></div>
  </div>
  ${isWeekend(selKey())?`<div class="info-box" style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;margin-bottom:14px"><span><i class="ti ti-calendar-off" style="vertical-align:-2px;margin-right:4px"></i>Weekend — mark routes not running today.</span><button class="btn-sec" style="flex-shrink:0;font-size:12px;padding:6px 10px;min-height:auto" onclick="markAllOff()">Mark all off</button></div>`:""}
  <div class="section">
    <span class="section-lbl">Routes — tap to expand</span>
    ${(()=>{
      const active=b.routes.map((r,i)=>({r,i})).filter(({r})=>!r.isAdHoc&&r.routeStatus!=="finished");
      const finished=b.routes.map((r,i)=>({r,i})).filter(({r})=>!r.isAdHoc&&r.routeStatus==="finished");
      const showFinished=st.showFinishedRoutes;
      return`
        ${active.length===0?`<div style="padding:12px;text-align:center;font-size:13px;color:var(--text-2)"><i class="ti ti-circle-check" style="color:var(--ok-text);font-size:18px;vertical-align:-3px;margin-right:6px"></i>All routes finished</div>`
          :active.map(({r,i})=>renderRoute(r,i)).join("")}
        ${finished.length>0?`
          <button onclick="st.showFinishedRoutes=!st.showFinishedRoutes;render()" style="width:100%;padding:10px;border:0.5px solid var(--border);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text-2);font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:${showFinished?'8':'0'}px;cursor:pointer">
            <i class="ti ti-circle-check" style="color:var(--ok-text);font-size:14px"></i>
            ${finished.length} finished route${finished.length===1?'':'s'}

  </div>

  ${b.published?`<div style="margin-top:8px"><button class="btn-sec" style="width:100%" onclick="viewSum()">View published briefing →</button></div>`:""}
  <div class="footer-note">${st.syncStatus==="live"?"Changes sync live to all managers.":"Set up Firebase in Settings for live sync."}</div>`;
}

// ---- Render summary ----
function renderSum(b,opts={}){
  const s=bStats(b);const showH=opts.showHeader!==false;
  const dates=sortedDates();const idx=dates.indexOf(b.date);
  const prevKey=idx>=0&&idx<dates.length-1?dates[idx+1]:null;
  const prev=prevKey?bStats(st.briefings[prevKey]):null;
  function delta(cur,p,inv){if(p==null||cur==null)return"";const d=Math.round((cur-p)*100)/100;if(d===0)return"";const g=inv?d<0:d>0;return`<div class="kpi-delta ${g?"kv-s":"kv-d"}">${d>0?"▲":"▼"} ${Math.abs(d)} vs prev</div>`;}
  const flagBits=[];
  b.routes.filter(r=>r.status==="no").forEach(r=>flagBits.push(`${esc(r.id)} (${esc(r.driver)}) — late`));
  b.routes.filter(r=>(parseInt(r.missed)||0)>0).forEach(r=>flagBits.push(`${esc(r.id)} (${esc(r.driver)}) — ${r.missed} missed`));
  const ptoN=b.routes.filter(r=>r.status==="pto").map(r=>esc(r.assignedDriver));
  const coN=b.routes.filter(r=>r.status==="callout").map(r=>esc(r.assignedDriver));
  const ncN=b.routes.filter(r=>r.status==="ncns").map(r=>esc(r.assignedDriver));
  const reliefB=b.routes.filter(r=>r.driverType!=="assigned"&&r.driver).map(r=>`${esc(r.driver)} → ${esc(r.id)} (${TL[r.driverType]})`);
  const pt=b.publishedAt?new Date(b.publishedAt).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}):"";

  return`${showH?`<div class="app-header"><div style="display:flex;align-items:center;gap:10px"><img src="icon.png" class="app-logo" alt=""><div><div class="app-title">${activeBranch().label} Daily Check-in</div><div class="app-sub">${opts.isToday?(selKey()===todayKey()?"Today":fmtDN(selKey())+", "+fmtS(selKey()))+" ":fmtS(b.date)+" "}${opts.isToday?syncPill():""}</div></div></div>
  ${opts.isToday?`<div style="display:flex;align-items:center;gap:4px">
    <button onclick="prevDay()" style="padding:6px 10px;border:0.5px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text);font-size:16px;min-height:36px;display:flex;align-items:center;justify-content:center"><i class="ti ti-chevron-left" style="font-size:16px"></i></button>
    <span class="date-badge" style="font-weight:500;cursor:${selKey()!==todayKey()?'pointer':''}" onclick="${selKey()!==todayKey()?'jumpToday()':''}">${fmtS(selKey())}${selKey()===todayKey()?' · Today':''}</span>
    <button onclick="nextDay()" style="padding:6px 10px;border:0.5px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text);font-size:16px;min-height:36px;display:flex;align-items:center;justify-content:center"><i class="ti ti-chevron-right" style="font-size:16px"></i></button>
  </div>`:`<span class="date-badge">${fmtS(b.date)}</span>`}
  </div>`:""}
  ${opts.isToday?`${branchPill()}`:""}
  ${stepperHTML(b.checkInStatus,!!opts.isToday)}
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-lbl">On-Time Delivery</div><div class="kpi-val ${s.otPct===null?"":(s.otPct>=95?"kv-s":s.otPct>=85?"kv-w":"kv-d")}">${s.otPct===null?"—":s.otPct+"%"}</div>${prev?delta(s.otPct,prev.otPct,false):""}</div>
    <div class="kpi"><div class="kpi-lbl">Avg Safety Score</div><div class="kpi-val ${s.avgSafety===null?"":(s.avgSafety>=95?"kv-s":s.avgSafety>=85?"kv-w":"kv-d")}">${s.avgSafety===null?"—":s.avgSafety}</div>${prev?delta(s.avgSafety,prev.avgSafety,false):""}</div>
    <div class="kpi"><div class="kpi-lbl">Routes Finished</div><div class="kpi-val ${s.finished===s.runningCount?"kv-s":s.finished>0?"kv-w":"kv-d"}">${s.finished}/${s.runningCount}</div></div>
    <div class="kpi"><div class="kpi-lbl">Missed Services</div><div class="kpi-val ${s.totalMissed===0?"kv-s":s.totalMissed<=2?"kv-w":"kv-d"}">${s.totalMissed}</div>${prev?delta(s.totalMissed,prev.totalMissed,true):""}</div>
    <div class="kpi"><div class="kpi-lbl">Services Pushed</div><div class="kpi-val ${s.pushed===0?"kv-s":"kv-w"}">${s.pushed}</div>${prev?delta(s.pushed,prev.pushed,true):""}</div>
    <div class="kpi"><div class="kpi-lbl">Assets Scheduled</div><div class="kpi-val">${s.totalAssets||"—"}</div></div>
    <div class="kpi"><div class="kpi-lbl">Locations Scheduled</div><div class="kpi-val">${s.totalLocs||"—"}</div></div>
    <div class="kpi"><div class="kpi-lbl">Active Routes</div><div class="kpi-val">${s.active}</div></div>
  </div>
  ${flagBits.length?`<div class="alert-box"><div class="alert-title"><i class="ti ti-alert-triangle"></i> Flags</div>${flagBits.map(f=>`<div class="alert-item">• ${f}</div>`).join("")}</div>`:`<div class="ok-box"><i class="ti ti-circle-check"></i> No flags — clean day</div>`}
  ${s.hasTotes?`<div class="totes-card"><span class="section-lbl">Totes taken (routes)</span><div class="totes-grid">
    <div class="tote-cell"><div class="tote-val">${s.totes.candy}</div><div class="tote-lbl">🍬 Candy</div></div>
    <div class="tote-cell"><div class="tote-val">${s.totes.freezer}</div><div class="tote-lbl">🧊 Freezer</div></div>
    <div class="tote-cell"><div class="tote-val">${s.totes.cooler}</div><div class="tote-lbl">❄️ Cooler</div></div>
    <div class="tote-cell"><div class="tote-val">${s.totes.dock}</div><div class="tote-lbl">📦 Dock</div></div>
  </div></div>`:""}
  ${(ptoN.length||coN.length||ncN.length||reliefB.length||b.plan.coverageNotes)?`<div class="plan-card"><span class="section-lbl" style="margin-bottom:10px">Plan</span>
    ${ptoN.length?`<div class="plan-row"><span class="plan-lbl">PTO</span><span class="plan-val">${ptoN.map(n=>`<span class="pill p-pto">${n}</span>`).join("")}</span></div>`:""}
    ${coN.length?`<div class="plan-row"><span class="plan-lbl">Call Out</span><span class="plan-val">${coN.map(n=>`<span class="pill p-callout">${n}</span>`).join("")}</span></div>`:""}
    ${ncN.length?`<div class="plan-row"><span class="plan-lbl">NCNS</span><span class="plan-val">${ncN.map(n=>`<span class="pill p-ncns">${n}</span>`).join("")}</span></div>`:""}
    ${reliefB.length?`<div class="plan-row"><span class="plan-lbl">Coverage</span><span class="plan-val">${reliefB.map(x=>`<span class="pill p-relief">${x}</span>`).join("")}</span></div>`:""}
    ${b.plan.coverageNotes?`<div class="plan-row"><span class="plan-lbl">Notes</span><span class="plan-val">${esc(b.plan.coverageNotes)}</span></div>`:""}
  </div>`:""}
  <span class="section-lbl">Route status</span>
  <div style="margin-bottom:16px">
    ${b.routes.filter(r=>!r.isAdHoc).map(r=>{
      const rs=r.routeStatus||"not_started";const t=r.totes||{};
      const coverBadge=r.driverType!=="assigned"&&r.driver?`<span class="r-cover">${TL[r.driverType]}</span>`:"";
      const meta=[];
      if(r.assets!==""&&r.assets!=null)meta.push(`${r.assets} assets`);if(r.locations!==""&&r.locations!=null)meta.push(`${r.locations} locs`);if((parseInt(r.missed)||0)>0)meta.push(`${r.missed} missed`);if(r.pushed==="yes")meta.push("pushed");
      if(r.safetyScore!==""&&r.safetyScore!=null){const sc=parseFloat(r.safetyScore);const scCls=sc>=95?"kv-s":sc>=85?"kv-w":"kv-d";meta.push(`<span class="${scCls}" style="font-weight:500">⚡${r.safetyScore}</span>`);}
      if((parseInt(r.missedRestocks)||0)>0)meta.push(`${r.missedRestocks} restocks`);
      if((parseInt(r.emptyCoils)||0)>0)meta.push(`${r.emptyCoils} empty coils`);
      if((parseFloat(r.spoils)||0)>0){const rv=parseMoney(r.revenue?.vending)+parseMoney(r.revenue?.market)+parseMoney(r.revenue?.ocs);const pct=rv>0?(parseFloat(r.spoils)/rv*100).toFixed(1)+"% rev":"$"+r.spoils;meta.push(`spoils ${pct}`);}
      if((parseFloat(r.shrink)||0)!==0){const rv=parseMoney(r.revenue?.vending)+parseMoney(r.revenue?.market)+parseMoney(r.revenue?.ocs);const sh=parseFloat(r.shrink);const pct=rv>0?(Math.abs(sh)/rv*100).toFixed(1)+"% rev":"$"+Math.abs(sh);meta.push(`shrink ${sh<0?"-":""}${pct}`);}
      const tor=calcTimeOnRoute(r.timeStarted,r.timeFinished);if(tor)meta.push(tor);
      const tpa=calcTimePerAsset(r.timeStarted,r.timeFinished,r.assets);if(tpa)meta.push(tpa);
      const tpl=calcTimePerLoc(r.timeStarted,r.timeFinished,r.locations);if(tpl)meta.push(tpl);
      const ts=[t.candy==="yes"?"🍬":"",t.freezer==="yes"?"🧊":"",t.cooler==="yes"?"❄️":"",t.dock==="yes"?"📦":""].filter(Boolean).join(" ");if(ts)meta.push(ts);
      return`<div class="rrow">
        <div class="sdot ${ATT_D[r.status]}" style="margin-top:5px"></div>
        <div class="rrow-left">
          <div class="rrow-id">${esc(r.id)}</div>
          <div class="rrow-driver">${esc(r.driver||"—")}${coverBadge}${(r.secondDriver&&r.secondDriver!=="__pending__")?` <span style="color:var(--text-2);font-size:12px;font-weight:400">+${esc(r.secondDriver)}</span>`:""}${(r.thirdDriver&&r.thirdDriver!=="__pending__")?` <span style="color:var(--text-2);font-size:12px;font-weight:400">+${esc(r.thirdDriver)}</span>`:""}</div>
          ${meta.length?`<div class="rrow-meta">${meta.join(" · ")}</div>`:""}
        </div>
        <div class="rrow-right">
          <span class="chip ${ATT_C[r.status]}">${ATT_L[r.status]}</span>
          <span class="rs-chip ${RSCHIP[rs]}"><i class="ti ${RSI[rs]}" style="font-size:10px"></i>${RSL[rs]}</span>
        </div>
      </div>`;
    }).join("")}
  </div>
  <button class="btn-primary" onclick="copyB('${b.date}')"><i class="ti ti-copy"></i> Copy Briefing for Teams</button>
  <div class="actions-row" style="margin-top:10px">
    ${opts.isToday?`<button class="btn-sec" onclick="goEdit()"><i class="ti ti-edit"></i> Edit</button><button class="btn-sec" onclick="newBriefing()"><i class="ti ti-refresh"></i> Reset</button>`:`<button class="btn-sec btn-danger" onclick="delDay('${b.date}')"><i class="ti ti-trash"></i> Delete</button>`}
  </div>
  ${pt?`<div class="saved-note">Published ${pt}${b.lastEditedBy?" by "+esc(b.lastEditedBy):""}</div>`:""}`;
}

// ---- Tabs ----
function renderToday(){const b=ensureToday();if(st.todayView==="summary"&&b.published)return renderSum(b,{isToday:true});return renderEntry();}

function renderHistory(){
  const dates=sortedDates();
  if(st.detailDate&&st.briefings[st.detailDate]){
    return`<button class="back-btn" onclick="backH()"><i class="ti ti-chevron-left"></i> All briefings</button>
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-2);font-weight:500;text-transform:uppercase;letter-spacing:.04em">${fmtL(st.detailDate)}</div>
    ${renderSum(st.briefings[st.detailDate],{showHeader:false,isToday:false})}`;
  }
  return`<div class="app-header"><div><div class="app-title">History</div><div class="app-sub">${activeBranch().label} · ${dates.length} day${dates.length===1?"":"s"} ${syncPill()}</div></div></div>
  ${!dates.length?`<div class="empty-state"><i class="ti ti-calendar-off"></i><div class="empty-state-title">No briefings yet</div><div class="empty-state-sub">Fill in your morning check-in on the Today tab and tap "Generate &amp; Publish Briefing" — it'll appear here.</div></div>`:
  dates.map(key=>{const b=st.briefings[key];const s=bStats(b);const cs=b.checkInStatus||"not_started";
    return`<div class="history-day" onclick="viewDay('${key}')">
      <div class="hd-date">
        <div class="hd-date-main">${fmtDN(key)}, ${fmtS(key)} <span class="status-badge ${BSBADGE[cs]}"><i class="ti ${RSI[cs]}" style="font-size:11px"></i>${RSL[cs]}</span></div>
        <div class="hd-date-sub">${s.late} late · ${s.out} out · ${s.totalMissed} missed · ${s.finished}/${s.runningCount} done${s.avgSafety!==null?" · safety "+s.avgSafety:""}${s.totalAssets?" · "+s.totalAssets+" assets":""}${s.totalLocs?" · "+s.totalLocs+" locs":""}</div>
      </div>
      <div class="hd-right">
        <span style="font-weight:500;font-size:13px" class="${s.otPct===null?"":(s.otPct>=95?"kv-s":s.otPct>=85?"kv-w":"kv-d")}">${s.otPct===null?"—":s.otPct+"%"}</span>
        <i class="ti ti-chevron-right" style="color:var(--text-3);font-size:16px"></i>
      </div>
    </div>`;}).join("")}`;
}

function renderTrends(){
  const dates=lastN(st.trendRange).sort();const briefings=dates.map(d=>st.briefings[d]);const empty=!dates.length;
  let aS=0,aC=0,sfS=0,sfC=0,tM=0,clean=0,tRev=0,tSpoils=0,tShrink=0;
  briefings.forEach(b=>{
    const s=bStats(b);
    if(s.otPct!==null){aS+=s.otPct;aC++;}
    if(s.avgSafety!==null){sfS+=s.avgSafety;sfC++;}
    tM+=s.totalMissed;
    if(s.late===0&&s.totalMissed===0)clean++;
    tRev+=getBranchDayRevenue(st.branch,b.date);
    tSpoils+=s.totalSpoils||0;
    tShrink+=s.totalShrink||0;
  });
  const avgOT=aC?Math.round(aS/aC):null;
  const avgSafety=sfC?Math.round(sfS/sfC*100)/100:null;
  const dL={},dM={};
  briefings.forEach(b=>{b.routes.forEach(r=>{if(!dL[r.id])dL[r.id]={id:r.id,name:r.assignedDriver,count:0};if(!dM[r.id])dM[r.id]={id:r.id,name:r.assignedDriver,count:0};if(r.status==="no")dL[r.id].count++;dM[r.id].count+=(parseInt(r.missed)||0);});});
  const tL=Object.values(dL).filter(x=>x.count>0).sort((a,b)=>b.count-a.count).slice(0,5);
  const tM2=Object.values(dM).filter(x=>x.count>0).sort((a,b)=>b.count-a.count).slice(0,5);
  const mL=tL[0]?.count||1;const mM=tM2[0]?.count||1;
  const hasRev=tRev>0;const hasSpoilsShrink=tSpoils>0||tShrink>0;
  const spoilsPct=tRev>0?Math.round(tSpoils/tRev*1000)/10:null;
  const shrinkPct=tRev>0?Math.round(Math.abs(tShrink)/tRev*1000)/10:null;
  const shrinkIsNeg=tShrink<0;
  return`<div class="app-header"><div><div class="app-title">Trends</div><div class="app-sub">${activeBranch().label} · ${empty?"No data":dates.length+" days"} ${syncPill()}</div></div></div>
  <div class="range-toggle">
    <button class="range-btn${st.trendRange===7?" on":""}" onclick="setRange(7)">7d</button>
    <button class="range-btn${st.trendRange===30?" on":""}" onclick="setRange(30)">30d</button>
    <button class="range-btn${st.trendRange===0?" on":""}" onclick="setRange(0)">All</button>
  </div>
  ${empty?`<div class="empty-state"><i class="ti ti-chart-line"></i><div class="empty-state-title">No data to chart yet</div><div class="empty-state-sub">Publish a few briefings on the Today tab and trends will appear here automatically.</div></div>`:`
  ${(()=>{
    // Last-7-day series for sparklines (oldest → newest)
    const last7=dates.slice(0,7).reverse();
    const otSeries=last7.map(d=>{const s2=bStats(st.briefings[d]);return s2.otPct;});
    const sfSeries=last7.map(d=>{const s2=bStats(st.briefings[d]);return s2.avgSafety;});
    const revSeries=last7.map(d=>getBranchDayRevenue(st.branch,d)||null);
    window._sparkOT=sparkline(otSeries);
    window._sparkSF=sparkline(sfSeries);
    window._sparkRev=sparkline(revSeries,"var(--brand)");
    return"";
  })()}
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-lbl">Avg On-Time</div><div class="kpi-val ${avgOT===null?"":(avgOT>=95?"kv-s":avgOT>=85?"kv-w":"kv-d")}">${avgOT===null?"—":avgOT+"%"}</div>${window._sparkOT||""}</div>
    <div class="kpi"><div class="kpi-lbl">Avg Safety</div><div class="kpi-val ${avgSafety===null?"":(avgSafety>=95?"kv-s":avgSafety>=85?"kv-w":"kv-d")}">${avgSafety===null?"—":avgSafety}</div>${window._sparkSF||""}</div>
    <div class="kpi"><div class="kpi-lbl">Days tracked</div><div class="kpi-val">${dates.length}</div></div>
    <div class="kpi"><div class="kpi-lbl">Total Missed</div><div class="kpi-val ${tM===0?"kv-s":"kv-d"}">${tM}</div></div>
    <div class="kpi"><div class="kpi-lbl">Clean Days</div><div class="kpi-val kv-s">${clean}</div></div>
    ${hasRev?`<div class="kpi"><div class="kpi-lbl">Total Revenue</div><div class="kpi-val" style="font-size:18px;color:var(--brand)">${fmtMoneyAbbr(tRev)}</div>${window._sparkRev||""}</div>`:""}
    ${hasSpoilsShrink&&hasRev?`<div class="kpi"><div class="kpi-lbl">Spoils % Rev</div><div class="kpi-val kv-d" style="font-size:18px">${spoilsPct!==null?spoilsPct+"%":"—"}</div><div style="font-size:10px;color:var(--text-2);margin-top:2px">${fmtMoneyAbbr(tSpoils)}</div></div>`:""}
    ${hasSpoilsShrink&&hasRev?`<div class="kpi"><div class="kpi-lbl">${shrinkIsNeg?"Neg Shrink":"Shrink"} % Rev</div><div class="kpi-val kv-d" style="font-size:18px">${shrinkPct!==null?shrinkPct+"%":"—"}</div><div style="font-size:10px;color:var(--text-2);margin-top:2px">${shrinkIsNeg?"-":""}${fmtMoneyAbbr(Math.abs(tShrink))}</div></div>`:""}
  </div>

function drawCharts(){
  const dates=lastN(st.trendRange).sort();if(!dates.length)return;
  const labels=dates.map(d=>{const[y,m,dd]=d.split("-");return`${parseInt(m)}/${parseInt(dd)}`;});
  const otData=dates.map(d=>bStats(st.briefings[d]).otPct);
  const missedData=dates.map(d=>bStats(st.briefings[d]).totalMissed);
  const safetyData=dates.map(d=>bStats(st.briefings[d]).avgSafety);
  const tc=getComputedStyle(document.documentElement).getPropertyValue("--text-2").trim()||"#888";
  const gc="rgba(128,128,128,.12)";
  const common={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#191917",titleColor:"#fff",bodyColor:"#fff",padding:8}},scales:{x:{ticks:{color:tc,maxTicksLimit:7,maxRotation:0,font:{size:10}},grid:{display:false}}}};
  const otCtx=document.getElementById("chart-ot");
  if(otCtx){const v=otData.filter(x=>x!==null);const mn=v.length?Math.max(0,Math.min(...v)-10):0;
    new Chart(otCtx,{type:"line",data:{labels,datasets:[{data:otData,borderColor:"#D63E0E",backgroundColor:"rgba(214,62,14,.08)",borderWidth:2,fill:true,tension:.35,spanGaps:true,pointRadius:d=>otData[d.dataIndex]!==null&&otData[d.dataIndex]<90?4:0,pointBackgroundColor:"#E24B4A"}]},options:{...common,scales:{...common.scales,y:{min:mn,max:105,ticks:{color:tc,callback:v=>v+"%",stepSize:10,font:{size:10}},grid:{color:gc}}}}});}
  const sfCtx=document.getElementById("chart-safety");
  if(sfCtx){const v=safetyData.filter(x=>x!==null);const mn=v.length?Math.max(0,Math.min(...v)-5):0;
    new Chart(sfCtx,{type:"line",data:{labels,datasets:[
      {data:safetyData,borderColor:"#E24B4A",backgroundColor:"rgba(226,75,74,.07)",borderWidth:2,fill:true,tension:.35,spanGaps:true,pointRadius:d=>safetyData[d.dataIndex]!==null&&safetyData[d.dataIndex]<90?4:0,pointBackgroundColor:"#E24B4A"},
      {data:Array(dates.length).fill(95),borderColor:"rgba(99,153,34,.4)",borderDash:[4,4],borderWidth:1.5,pointRadius:0,fill:false}
    ]},options:{...common,scales:{...common.scales,y:{min:mn,max:102,ticks:{color:tc,stepSize:5,font:{size:10}},grid:{color:gc}}}}});}
  const mCtx=document.getElementById("chart-missed");
  if(mCtx){new Chart(mCtx,{type:"bar",data:{labels,datasets:[{data:missedData,backgroundColor:missedData.map(v=>v===0?"#639922":v<=2?"#EF9F27":"#E24B4A"),borderRadius:4}]},options:{...common,scales:{...common.scales,y:{beginAtZero:true,ticks:{color:tc,stepSize:1,precision:0,font:{size:10}},grid:{color:gc}}}}});}

  // Revenue chart
  const revData=dates.map(d=>getBranchDayRevenue(st.branch,d));
  const revCtx=document.getElementById("chart-revenue");
  if(revCtx&&revData.some(v=>v>0)){
    new Chart(revCtx,{type:"bar",data:{labels,datasets:[{data:revData,backgroundColor:"rgba(214,62,14,.7)",borderRadius:4}]},
      options:{...common,scales:{...common.scales,y:{beginAtZero:true,ticks:{color:tc,callback:v=>"$"+(v>=1000?(v/1000).toFixed(0)+"K":v),font:{size:10}},grid:{color:gc}}}}});
  }

  // Spoils & shrink chart — as % of daily revenue
  const spoilsData=dates.map(d=>{
    const rev=getBranchDayRevenue(st.branch,d);
    const sp=bStats(st.briefings[d]).totalSpoils||0;
    return rev>0?Math.round(sp/rev*1000)/10:0;
  });
  const shrinkData=dates.map(d=>{
    const rev=getBranchDayRevenue(st.branch,d);
    const sh=bStats(st.briefings[d]).totalShrink||0;
    return rev>0?Math.round(Math.abs(sh)/rev*1000)/10:0;
  });
  const ssCtx=document.getElementById("chart-spoils-shrink");
  if(ssCtx&&(spoilsData.some(v=>v>0)||shrinkData.some(v=>v>0))){
    new Chart(ssCtx,{type:"bar",data:{labels,datasets:[
      {label:"Spoils %",data:spoilsData,backgroundColor:"rgba(226,75,74,.75)",borderRadius:4},
      {label:"Shrink %",data:shrinkData,backgroundColor:"rgba(239,159,39,.75)",borderRadius:4}
    ]},options:{...common,plugins:{...common.plugins,legend:{display:true,position:"top",labels:{color:tc,font:{size:11},boxWidth:12,padding:12}}},scales:{...common.scales,y:{beginAtZero:true,ticks:{color:tc,callback:v=>v+"%",font:{size:10}},grid:{color:gc}}}}});
  }
}

// ---- Rollup period helpers ----
function getRollupPeriodDates(period,refDate){
  const d=new Date(refDate+'T12:00:00');
  const tk=todayKey();
  if(period==='daily')return refDate<=tk?[refDate]:[];
  if(period==='weekly'){
    const dow=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-((dow+6)%7));
    const days=[];for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);const dk=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');if(dk<=tk)days.push(dk);}
    return days;
  }
  if(period==='monthly'){
    const y=d.getFullYear(),m=d.getMonth();const dim=new Date(y,m+1,0).getDate();
    const days=[];for(let i=1;i<=dim;i++){const dk=y+'-'+String(m+1).padStart(2,'0')+'-'+String(i).padStart(2,'0');if(dk<=tk)days.push(dk);}
    return days;
  }
  if(period==='all'){
    // All dates that have any briefing data across all branches
    const allDates=new Set();
    Object.values(st.branchBriefings).forEach(brf=>Object.keys(brf).forEach(dk=>{if(dk<=tk)allDates.add(dk);}));
    Object.keys(st.briefings).forEach(dk=>{if(dk<=tk)allDates.add(dk);});
    return Array.from(allDates).sort();
  }
  return[];
}
function rollupPeriodLabel(period,refDate){
  if(period==='daily'){return refDate===todayKey()?'Today':fmtDN(refDate)+', '+fmtS(refDate);}
  if(period==='weekly'){const dates=getRollupPeriodDates('weekly',refDate);return'Week of '+fmtS(dates[0]);}
  if(period==='monthly'){const[y,m]=refDate.split('-');return new Date(+y,+m-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});}
  if(period==='all')return'All time';
  return'';
}
window.setRollupPeriod=function(p){st.rollupPeriod=p;render();};
function adjRollupByPeriod(n){
  const period=st.rollupPeriod||'monthly';const ref=st.rollupDate||todayKey();
  const d=new Date(ref+'T12:00:00');
  if(period==='daily')d.setDate(d.getDate()+n);
  else if(period==='weekly')d.setDate(d.getDate()+n*7);
  else if(period==='monthly')d.setMonth(d.getMonth()+n);
  st.rollupDate=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  render();
}
function aggregatePeriodStats(bid,dates){
  const brf=bid===st.branch?st.briefings:st.branchBriefings[bid]||{};
  const tk=todayKey();
  // Exclude today — partial data skews everything
  const completedDates=dates.filter(d=>d<tk);
  let tA=0,tM=0,tLate=0,tOut=0,tFin=0,tRun=0,tLocs=0,tMR=0,sfVals=[],revTotal=0,daysWithData=0,tSpoils=0,tShrink=0;
  completedDates.forEach(dk=>{
    const b=brf[dk];if(!b||!b.routes)return;
    daysWithData++;const s=bStats(b);
    tA+=s.totalAssets;tM+=s.totalMissed;tLate+=s.late;tOut+=s.out;
    tFin+=s.finished;tRun+=s.runningCount;tLocs+=s.totalLocs;tMR+=s.totalMissedRestocks||0;
    tSpoils+=s.totalSpoils||0;tShrink+=s.totalShrink||0;
    if(s.avgSafety!==null)sfVals.push(s.avgSafety);
    if(b.revenue||b.routes)revTotal+=getBranchDayRevenue(bid,dk);
  });
  const otPct=tA>0?Math.round(((tA-tM)/tA)*1000)/10:null;
  const avgSafety=sfVals.length?Math.round(sfVals.reduce((a,b)=>a+b,0)/sfVals.length*100)/100:null;
  return{tA,tM,tLate,tOut,tFin,tRun,tLocs,tMR,otPct,avgSafety,revTotal,daysWithData,tSpoils,tShrink};
}

function getPrevPeriodDates(period,currentDates){
  // Returns previous period dates matching the same number of days as currentDates
  if(!currentDates.length)return[];
  const count=currentDates.length;

  if(period==='daily'){
    // Previous day
    const d=new Date(currentDates[0]+'T12:00:00');
    d.setDate(d.getDate()-1);
    return[d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')];
  }

  if(period==='weekly'){
    // Same days last week
    return currentDates.map(dk=>{
      const d=new Date(dk+'T12:00:00');d.setDate(d.getDate()-7);
      return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    });
  }

  if(period==='monthly'){
    // First N days of the previous month (where N = days elapsed in current month)
    const firstDate=currentDates[0]; // e.g. "2026-06-01"
    const[y,m]=firstDate.split('-');
    const pm=new Date(+y,+m-2,1); // first day of prev month
    const pmk=pm.getFullYear()+'-'+String(pm.getMonth()+1).padStart(2,'0');
    const prevDim=new Date(pm.getFullYear(),pm.getMonth()+1,0).getDate();
    const days=Math.min(count,prevDim);
    return Array.from({length:days},(_,i)=>pmk+'-'+String(i+1).padStart(2,'0'));
  }
  return[];
}

function renderRollup(){
  const period=st.rollupPeriod||'monthly';
  const dk=st.rollupDate||todayKey();
  const dates=getRollupPeriodDates(period,dk);
  const isCurrentPeriod=dates.includes(todayKey());

  // DM filter — "auto" means derive from active branch, null/"" means All, string means specific DM

  const filteredBIDs=activeDM?DM_GROUPS[activeDM]||BRANCH_IDS:BRANCH_IDS;
  // Always alphabetical by label
  const sortedBIDs=[...filteredBIDs].sort((a,b)=>BRANCHES[a].label.localeCompare(BRANCHES[b].label));

  const sort=st.rollupSort||'name';

  let branchStats=sortedBIDs.map(bid=>{
    const stats=aggregatePeriodStats(bid,dates);
    const prevDates=getPrevPeriodDates(period,dates);
    const prevStats=aggregatePeriodStats(bid,prevDates);
    const brf=bid===st.branch?st.briefings:st.branchBriefings[bid]||{};
    const todayB=brf[dk];
    return{bid,stats,prevStats,checkInStatus:todayB&&todayB.checkInStatus||'not_started',hasData:stats.daysWithData>0};
  });

  // Apply sort
  if(sort==='revenue')branchStats.sort((a,b)=>b.stats.revTotal-a.stats.revTotal);
  else if(sort==='ot')branchStats.sort((a,b)=>{if(a.stats.otPct===null)return 1;if(b.stats.otPct===null)return-1;return b.stats.otPct-a.stats.otPct;});
  else if(sort==='safety')branchStats.sort((a,b)=>{if(a.stats.avgSafety===null)return 1;if(b.stats.avgSafety===null)return-1;return b.stats.avgSafety-a.stats.avgSafety;});
  else if(sort==='missed')branchStats.sort((a,b)=>b.stats.tM-a.stats.tM);
  // default 'name' already alphabetical from sortedBIDs
  const hasAny=branchStats.some(x=>x.hasData);
  const act=branchStats.filter(x=>x.hasData);
  const cTA=act.reduce((a,x)=>a+x.stats.tA,0),cTM=act.reduce((a,x)=>a+x.stats.tM,0);
  const cOT=cTA>0?Math.round(((cTA-cTM)/cTA)*100):null;
  const sfAll=act.map(x=>x.stats.avgSafety).filter(v=>v!==null);
  const cSf=sfAll.length?Math.round(sfAll.reduce((a,b)=>a+b,0)/sfAll.length*10)/10:null;
  const cFin=act.reduce((a,x)=>a+x.stats.tFin,0),cRun=act.reduce((a,x)=>a+x.stats.tRun,0);
  const cLate=act.reduce((a,x)=>a+x.stats.tLate,0),cOut=act.reduce((a,x)=>a+x.stats.tOut,0);
  const cLocs=act.reduce((a,x)=>a+x.stats.tLocs,0),cMR=act.reduce((a,x)=>a+x.stats.tMR,0);
  const cRev=act.reduce((a,x)=>a+x.stats.revTotal,0);
  const sortToggle=`<div style="display:flex;gap:6px;margin-bottom:12px;font-size:11px">
    <span style="color:var(--text-2);padding:6px 4px;align-self:center;font-weight:600;flex-shrink:0">Sort:</span>

  const dmSelector=`<div style="margin-bottom:12px">

      <span style="margin-left:auto">${act.length}/${BRANCH_IDS.length} branches reporting</span>
    </div>
  </div>
  <span class="section-lbl">By Branch</span>
  ${branchStats.map(({bid,stats:s,prevStats:p,checkInStatus,hasData})=>{
    const isActive=bid===st.branch;
    const cardStyle='cursor:pointer;'+(isActive?'border-color:var(--brand);':'')+'margin-bottom:10px';
    if(!hasData)return`<div class="plan-card" style="${cardStyle}" onclick="switchBranch('${bid}');switchTab('today')"><div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:14px;font-weight:500;color:${isActive?'var(--brand)':'inherit'}">${BRANCHES[bid].label}</span><span style="font-size:11px;color:var(--text-3)">No data</span></div></div>`;
    const mk2=monthKey(dk);const budget=(st.budgets[bid]&&st.budgets[bid][mk2])||0;
    let budgetLine='';
    if(budget>0&&s.revTotal>0){
      const[y2,m2]=mk2.split('-');
      const twyd=new Date(dk+'T12:00:00');
      const wd=workDaysThroughDate(+y2,+m2,twyd.getDate());
      const dailyTgt=budget/workDaysInMonth(+y2,+m2);
      const wkDays=dates.filter(d2=>isWorkDay(+d2.split('-')[0],+d2.split('-')[1],+d2.split('-')[2])).length;
      const periodTgt=period==='daily'?dailyTgt:period==='weekly'?dailyTgt*wkDays:dailyTgt*wd;
      if(periodTgt>0){const vari=Math.round((s.revTotal-periodTgt)/periodTgt*100);budgetLine=`<div style="font-size:11px;margin-top:6px;color:${vari>=0?'var(--ok-text)':'var(--danger-text)'};font-weight:500">${vari>=0?'▲':'▼'} ${Math.abs(vari)}% vs budget target</div>`;}

    return`<div class="plan-card" style="${cardStyle}" onclick="switchBranch('${bid}');switchTab('today')">

        <div class="kpi"><div class="kpi-lbl">Revenue</div><div class="kpi-val" style="font-size:${s.revTotal>0?'16':'18'}px;color:${s.revTotal>0?'var(--brand)':'var(--text-2)'}"> ${s.revTotal>0?fmtMoneyAbbr(s.revTotal):'—'}</div></div>
        <div class="kpi"><div class="kpi-lbl">Missed</div><div class="kpi-val" style="font-size:18px;color:${s.tM===0?'var(--ok-text)':s.tM<=2?'var(--warn-text)':'var(--danger-text)'}"> ${s.tM}</div></div>
      </div>
      ${(()=>{
        // % variance vs previous period for revenue, spoils, shrink
        const varItems=[];
        // Revenue: % change in dollars (up = good)
        if(s.revTotal>0&&p.revTotal>0){
          const v=Math.round((s.revTotal-p.revTotal)/p.revTotal*1000)/10;
          varItems.push(`<span style="color:${v>=0?'var(--ok-text)':'var(--danger-text)'};font-weight:600">${v>=0?'▲':'▼'}${Math.abs(v)}% rev</span>`);

        if(s.revTotal>0&&p.revTotal>0){
          const cur=Math.round(s.tSpoils/s.revTotal*1000)/10;
          const prev=Math.round(p.tSpoils/p.revTotal*1000)/10;
          if(cur>0||prev>0){
            const diff=Math.round((cur-prev)*10)/10;
            const better=diff<=0;
            const arrow=diff>=0?'▲':'▼';
            varItems.push(`<span style="color:${better?'var(--ok-text)':'var(--warn-text)'};font-weight:600">${cur}% spoils <span style="font-size:10px;opacity:.85">(${arrow}${Math.abs(diff)}pp)</span></span>`);
          }
        }
        // Shrink: abs(%) of revenue — closer to 0 is better, show pp difference
        if(s.revTotal>0&&p.revTotal>0){
          const cur=Math.round(Math.abs(s.tShrink)/s.revTotal*1000)/10;
          const prev=Math.round(Math.abs(p.tShrink)/p.revTotal*1000)/10;
          if(cur>0||prev>0){
            const diff=Math.round((cur-prev)*10)/10;
            const better=diff<=0;
            const arrow=diff>=0?'▲':'▼';
            varItems.push(`<span style="color:${better?'var(--ok-text)':'var(--warn-text)'};font-weight:600">${cur}% shrink <span style="font-size:10px;opacity:.85">(${arrow}${Math.abs(diff)}pp)</span></span>`);
          }
        }
        if(!varItems.length||period==='all')return'';
        return`<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:11px;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)">${varItems.join('<span style="color:var(--text-3)"> · </span>')}<span style="margin-left:auto;font-size:10px;color:var(--text-3)">vs same ${period==='monthly'?'days last month':period==='weekly'?'days last week':'yesterday'}</span></div>`;
      })()}
      ${budgetLine}
    </div>`;
  }).join('')}
  `}
  <div class="info-box" style="margin-top:4px"><i class="ti ti-hand-click" style="vertical-align:-2px;margin-right:4px"></i>Tap any branch card to open its briefing.</div>`;
}

// ---- Budget helpers ----
const BUDGET_KEY="dfw_budgets_v1";
const BUDGET_COLLECTION="dfw_budgets";

function loadBudgets(){try{const r=localStorage.getItem(BUDGET_KEY);if(r)st.budgets=JSON.parse(r)||{};}catch(e){st.budgets={};}}
function persistBudgets(){try{localStorage.setItem(BUDGET_KEY,JSON.stringify(st.budgets));}catch(e){}}
async function writeBudget(bid,mk,cats){
  st.budgets[bid]=st.budgets[bid]||{};
  st.budgets[bid][mk]=typeof cats==='object'?cats:{vending:cats,market:0,ocs:0};
  persistBudgets();
  if(!fb.modules||!fb.db||st.syncStatus!=="live"){
    showToast("Budget saved locally — not synced (Firebase not connected)");
    return;
  }
  const{doc,setDoc}=fb.modules;
  try{
    await setDoc(doc(fb.db,BUDGET_COLLECTION,"all_budgets"),st.budgets,{merge:true});
    showToast("Budget saved & synced ✓");
  }catch(e){
    console.error("Budget write failed",e);
    showToast("Budget saved locally — sync error: "+e.code);
  }
}
function getBudgetCats(bid,mk){
  const raw=st.budgets[bid]&&st.budgets[bid][mk];
  if(!raw)return{vending:0,market:0,ocs:0,total:0};
  if(typeof raw==='number')return{vending:raw,market:0,ocs:0,total:raw};
  const v=Number(raw.vending)||0,m=Number(raw.market)||0,o=Number(raw.ocs)||0;
  return{vending:v,market:m,ocs:o,total:v+m+o};
}
function subBudgets(){
  if(!fb.modules||!fb.db)return;
  const{doc,onSnapshot}=fb.modules;
  if(fb.unsubBudgets)fb.unsubBudgets();
  fb.unsubBudgets=onSnapshot(doc(fb.db,BUDGET_COLLECTION,"all_budgets"),(snap)=>{
    if(snap.exists()){
      const data=snap.data();
      Object.entries(data).forEach(([bid,months])=>{
        if(typeof months==="object"){
          st.budgets[bid]=st.budgets[bid]||{};
          Object.assign(st.budgets[bid],months);
        }
      });
      persistBudgets();
      render();
    }
  },(err)=>{console.error("Budget sync error",err);});
}

function getHolidays(year){
  // Fixed holidays
  const fixed=[
    `${year}-01-01`, // New Year's Day
    `${year}-07-04`, // Independence Day
    `${year}-12-25`, // Christmas
  ];
  // Memorial Day — last Monday of May
  const memDay=new Date(year,4,31);while(memDay.getDay()!==1)memDay.setDate(memDay.getDate()-1);
  fixed.push(memDay.getFullYear()+"-"+String(memDay.getMonth()+1).padStart(2,"0")+"-"+String(memDay.getDate()).padStart(2,"0"));
  // Labor Day — first Monday of September
  const labDay=new Date(year,8,1);while(labDay.getDay()!==1)labDay.setDate(labDay.getDate()+1);
  fixed.push(labDay.getFullYear()+"-"+String(labDay.getMonth()+1).padStart(2,"0")+"-"+String(labDay.getDate()).padStart(2,"0"));
  // Thanksgiving — fourth Thursday of November
  let thCount=0;const tg=new Date(year,10,1);while(thCount<4){if(tg.getDay()===4)thCount++;if(thCount<4)tg.setDate(tg.getDate()+1);}
  const tgKey=tg.getFullYear()+"-"+String(tg.getMonth()+1).padStart(2,"0")+"-"+String(tg.getDate()).padStart(2,"0");
  fixed.push(tgKey);
  // Black Friday — day after Thanksgiving
  const bf=new Date(tg);bf.setDate(bf.getDate()+1);
  fixed.push(bf.getFullYear()+"-"+String(bf.getMonth()+1).padStart(2,"0")+"-"+String(bf.getDate()).padStart(2,"0"));
  return new Set(fixed);
}

function isWorkDay(year,month,day){
  const date=new Date(year,month-1,day);
  const dow=date.getDay();
  if(dow===0||dow===6)return false;
  const dk=year+"-"+String(month).padStart(2,"0")+"-"+String(day).padStart(2,"0");
  const holidays=getHolidays(year);
  return!holidays.has(dk);
}

function workDaysInMonth(year,month){
  let count=0;const days=new Date(year,month,0).getDate();
  for(let d=1;d<=days;d++){if(isWorkDay(year,month,d))count++;}
  return count;
}
function workDaysThroughDate(year,month,day){
  let count=0;
  for(let d=1;d<=day;d++){if(isWorkDay(year,month,d))count++;}
  return count;
}
function monthKey(dateKey){const[y,m]=dateKey.split("-");return`${y}-${m}`;}
function monthLabel(mk){const[y,m]=mk.split("-");return new Date(+y,+m-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});}

function getBranchMonthRevenue(bid,mk){
  const brf=bid===st.branch?st.briefings:st.branchBriefings[bid]||{};
  const tk=todayKey();
  let total=0;
  Object.entries(brf).forEach(([dk,b])=>{
    if(!dk.startsWith(mk)||dk>tk)return;
    total+=getBranchDayRevenue(bid,dk);
  });
  return total;
}
function getBranchDayRevenue(bid,dk){
  const brf=bid===st.branch?st.briefings:st.branchBriefings[bid]||{};
  const b=brf[dk];if(!b)return 0;
  // Sum per-route revenue
  const routeTotal=b.routes?b.routes.reduce((a,r)=>{
    if(!r.revenue)return a;
    return a+parseMoney(r.revenue.vending)+parseMoney(r.revenue.market)+parseMoney(r.revenue.ocs);
  },0):0;
  // Sum overflow routes (imported routes not in the daily list)
  const overflowTotal=b.revenueOverflow?Object.values(b.revenueOverflow).reduce((a,r)=>{
    return a+parseMoney(r.vending)+parseMoney(r.market)+parseMoney(r.ocs);
  },0):0;
  const combinedRouteTotal=routeTotal+overflowTotal;
  if(combinedRouteTotal>0)return combinedRouteTotal;
  // Fall back to briefing-level revenue for legacy data
  if(b.revenue)return parseMoney(b.revenue.vending)+parseMoney(b.revenue.market)+parseMoney(b.revenue.ocs);
  return 0;
}

window.saveBudget=async function(){
  const gv=id=>{const el=document.getElementById(id);return el?parseFloat(el.value.replace(/[^0-9.]/g,""))||0:0;};
  const v=gv("budget-vending"),m=gv("budget-market"),o=gv("budget-ocs");
  if(v===0&&m===0&&o===0){showToast("Enter at least one budget amount");return;}
  const mk=monthKey(todayKey());
  await writeBudget(st.branch,mk,{vending:v,market:m,ocs:o});
  render();
};

function renderAttendanceSection(){
  const mk=st.attendanceMonth||monthKey(todayKey());
  const[y,m]=mk.split("-");
  const daysInMonth=new Date(+y,+m,0).getDate();
  const tk=todayKey();

  function adjMonth(n){const d=new Date(+y,+m-1+n,1);st.attendanceMonth=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");st.attendanceDay=null;render();}
  window._attPrev=()=>{adjMonth(-1);};
  window._attNext=()=>{adjMonth(1);};

  // Gather all drivers for this branch
  const driverSet={};
  branchRoutes(st.branch).forEach(r=>{if(r.driver)driverSet[r.driver]=r.id;});

  // Build per-day attendance data
  const dayData={};
  for(let d=1;d<=daysInMonth;d++){
    const dk=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const b=st.briefings[dk];if(!b||!b.routes)continue;
    const pto=[],callout=[],ncns=[];
    b.routes.forEach(r=>{
      const name=r.assignedDriver||r.driver;
      if(r.status==="pto")pto.push(name);
      else if(r.status==="callout")callout.push(name);
      else if(r.status==="ncns")ncns.push(name);
    });
    if(pto.length||callout.length||ncns.length)dayData[dk]={pto,callout,ncns};
  }

  // MTD counts
  let totalPto=0,totalCallout=0,totalNcns=0;
  Object.values(dayData).forEach(d=>{totalPto+=d.pto.length;totalCallout+=d.callout.length;totalNcns+=d.ncns.length;});


  // Build calendar
  const isCurrentMonth=mk===monthKey(todayKey());
  const btnStyle="padding:6px 10px;border:0.5px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text);font-size:13px;font-weight:500;min-height:36px;display:flex;align-items:center;gap:3px";
  const selectedDay=st.attendanceDay||null;

  let calRows="";let weekCells=[];
  const startDow=new Date(+y,+m-1,1).getDay();
  for(let i=0;i<startDow;i++)weekCells.push(`<td></td>`);
  for(let d=1;d<=daysInMonth;d++){
    const dk=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dow=new Date(+y,+m-1,d).getDay();
    const isWknd=dow===0||dow===6;
    const isFuture=dk>tk;
    const isToday=dk===todayKey();
    const isSelected=selectedDay===dk;
    const data=dayData[dk];
    const hasData=!isWknd&&data;
    const ncnsCount=data?data.ncns.length:0;
    const calloutCount=data?data.callout.length:0;
    const ptoCount=data?data.pto.length:0;

    let cellBg=isSelected?"var(--brand)":"transparent";
    let numColor=isToday?"var(--brand)":isWknd?"var(--text-3)":"var(--text)";
    if(isSelected)numColor="#fff";

    const dots=hasData?[
      ncnsCount?`<span style="font-size:9px;font-weight:700;color:var(--danger-text);background:var(--danger-bg);border-radius:3px;padding:0 3px;display:block;line-height:14px">${ncnsCount}</span>`:"",
      calloutCount?`<span style="font-size:9px;font-weight:700;color:var(--warn-text);background:var(--warn-bg);border-radius:3px;padding:0 3px;display:block;line-height:14px">${calloutCount}</span>`:"",
      ptoCount?`<span style="font-size:9px;font-weight:700;color:var(--info-text);background:var(--info-bg);border-radius:3px;padding:0 3px;display:block;line-height:14px">${ptoCount}</span>`:""
    ].filter(Boolean).join(""):"";

    const clickable=hasData||isSelected;
    weekCells.push(`<td style="padding:2px;text-align:center;vertical-align:top">
      <div onclick="${clickable?`st.attendanceDay=st.attendanceDay==='${dk}'?null:'${dk}';render()`:""}" style="background:${cellBg};border-radius:6px;padding:3px 2px;min-height:38px;opacity:${isWknd?0.3:1};cursor:${clickable?"pointer":"default"};border:${isSelected?"1.5px solid var(--brand)":isToday?"1.5px solid var(--brand-muted, var(--border-2))":"1.5px solid transparent"}">
        <div style="font-size:11px;font-weight:${isToday||isSelected?"700":"400"};color:${numColor}">${d}</div>
        <div style="display:flex;flex-direction:column;gap:1px;margin-top:2px;align-items:center">${dots}</div>
      </div>
    </td>`);
    if(weekCells.length===7||(d===daysInMonth)){
      while(weekCells.length<7)weekCells.push(`<td></td>`);
      calRows+=`<tr>${weekCells.join("")}</tr>`;weekCells=[];
    }
  }

  // Selected day detail
  let dayDetail="";
  if(selectedDay&&dayData[selectedDay]){
    const data=dayData[selectedDay];
    const d=new Date(selectedDay+"T12:00:00");
    const dayLabel=d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
    const entries=[
      ...data.ncns.map(name=>({name,type:"ncns",label:"NCNS",style:"background:var(--danger-bg);color:var(--danger-text)"})),
      ...data.callout.map(name=>({name,type:"callout",label:"Call Out",style:"background:var(--warn-bg);color:var(--warn-text)"})),
      ...data.pto.map(name=>({name,type:"pto",label:"PTO",style:"background:var(--info-bg);color:var(--info-text)"}))
    ];
    dayDetail=`<div class="card" style="margin-bottom:12px;border-color:var(--brand)">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--brand)">${dayLabel}</div>
      ${entries.map(e=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border)">
        <div>
          <div style="font-size:13px;font-weight:500">${esc(e.name)}</div>
          <div style="font-size:11px;color:var(--text-2)">${(driverSet[e.name]||"")}</div>
        </div>
        <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;${e.style}">${e.label}</span>
      </div>`).join("")}
    </div>`;
  }

  return`<div style="border-top:0.5px solid var(--border);margin-top:20px;padding-top:20px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <span class="section-lbl" style="margin-bottom:0">Attendance — ${monthLabel(mk)}</span>
    <div style="display:flex;align-items:center;gap:4px">
      <button onclick="_attPrev()" style="${btnStyle}"><i class="ti ti-chevron-left" style="font-size:16px"></i></button>
      ${!isCurrentMonth?`<button onclick="st.attendanceMonth=monthKey(todayKey());st.attendanceDay=null;render()" style="padding:6px 8px;border:0.5px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text-2);font-size:11px;font-weight:500;min-height:36px">This month</button>`:`<span class="date-badge">${monthLabel(mk)}</span>`}
      <button onclick="_attNext()" style="${btnStyle}"><i class="ti ti-chevron-right" style="font-size:16px"></i></button>
    </div>
  </div>

  <div class="kpi-grid" style="grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:12px">
    <div class="kpi"><div class="kpi-lbl">PTO</div><div class="kpi-val" style="color:var(--info-text)">${totalPto}</div></div>
    <div class="kpi"><div class="kpi-lbl">Call Outs</div><div class="kpi-val kv-w">${totalCallout}</div></div>
    <div class="kpi"><div class="kpi-lbl">NCNS</div><div class="kpi-val kv-d">${totalNcns}</div></div>
  </div>

  <div style="overflow-x:auto;margin-bottom:8px">
    <table style="width:100%;border-collapse:collapse">
      <thead><tr>${["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>`<th style="font-size:10px;color:var(--text-2);padding:4px 2px;text-align:center;font-weight:500">${d}</th>`).join("")}</tr></thead>
      <tbody>${calRows}</tbody>
    </table>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:14px;font-size:10px;color:var(--text-2);flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:3px"><span style="background:var(--danger-bg);color:var(--danger-text);border-radius:3px;padding:0 4px;font-weight:700;font-size:10px">N</span>NCNS</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="background:var(--warn-bg);color:var(--warn-text);border-radius:3px;padding:0 4px;font-weight:700;font-size:10px">N</span>Call Out</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="background:var(--info-bg);color:var(--info-text);border-radius:3px;padding:0 4px;font-weight:700;font-size:10px">N</span>PTO</span>
    <span style="margin-left:auto;font-style:italic">Tap a day to see details</span>
  </div>
  ${dayDetail}
  </div>`;
}

function renderBudget(){
  const bid=st.branch;
  const mk=st.budgetMonth||monthKey(todayKey());
  const isCurrentMonth=mk===monthKey(todayKey());
  const[y,m]=mk.split("-");const today=new Date();
  // Yesterday's date key
  const yest=new Date(today);yest.setDate(yest.getDate()-1);
  const yesterdayKey=yest.getFullYear()+"-"+String(yest.getMonth()+1).padStart(2,"0")+"-"+String(yest.getDate()).padStart(2,"0");
  const yesterdayInMonth=yesterdayKey.startsWith(mk);

  const totalWorkDays=workDaysInMonth(+y,+m);
  const daysInMonth=new Date(+y,+m,0).getDate();
  const holidays=getHolidays(+y);
  // Count weekend+holiday days
  let totalOffDays=0;
  for(let d=1;d<=daysInMonth;d++){
    const dow=new Date(+y,+m-1,d).getDay();
    const dk2=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    if(dow===0||dow===6||holidays.has(dk2))totalOffDays++;
  }

  // Detect if the month is completely over
  const lastDayOfMonth=`${y}-${String(m).padStart(2,"0")}-${String(daysInMonth).padStart(2,"0")}`;
  const monthClosed=yesterdayKey>lastDayOfMonth;

  // For closed months use all days; for current month pace through yesterday
  const paceDay=monthClosed?daysInMonth:Math.min(yest.getDate(),daysInMonth);
  const workDaysThroughYesterday=monthClosed?totalWorkDays:(yesterdayInMonth?workDaysThroughDate(+y,+m,paceDay):totalWorkDays);
  // Count off days through paceDay
  let offDaysThroughYesterday=0;
  for(let d=1;d<=daysInMonth;d++){
    const dk2=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    if(!monthClosed&&dk2>yesterdayKey)break;
    const dow=new Date(+y,+m-1,d).getDay();
    if(dow===0||dow===6||holidays.has(dk2))offDaysThroughYesterday++;
  }

  const budgetCats=getBudgetCats(bid,mk);
  const monthlyBudget=budgetCats.total;

  // 92% of budget across work days, 8% across weekends/holidays
  const WORKDAY_SPLIT=0.92;const OFFDAY_SPLIT=0.08;
  const workdayBudget=monthlyBudget*WORKDAY_SPLIT;
  const offdayBudget=monthlyBudget*OFFDAY_SPLIT;
  const dailyWorkdayTarget=monthlyBudget>0&&totalWorkDays>0?workdayBudget/totalWorkDays:0;
  const dailyOffdayTarget=monthlyBudget>0&&totalOffDays>0?offdayBudget/totalOffDays:0;
  const dailyTarget=dailyWorkdayTarget; // shown in KPI tile (workday target)

  // MTD target = sum of per-day targets through yesterday
  const mtdTarget=dailyWorkdayTarget*workDaysThroughYesterday + dailyOffdayTarget*offDaysThroughYesterday;

  // MTD actual through yesterday
  const mtdActual=getBranchMonthRevenue(bid,mk);
  const pct=mtdTarget>0?Math.round(mtdActual/mtdTarget*100):null;
  const monthPct=monthlyBudget>0?Math.round(mtdActual/monthlyBudget*100):null;

  // Project month-end — for closed months trend = actual (final result)
  const totalTargetThroughYesterday=mtdTarget;
  const projected=monthClosed?mtdActual:(totalTargetThroughYesterday>0?(mtdActual/totalTargetThroughYesterday)*monthlyBudget:0);

  // Yesterday's revenue
  const yesterdayActual=getBranchDayRevenue(bid,yesterdayKey);
  const yesterdayIsWeekend=!isWorkDay(yest.getFullYear(),yest.getMonth()+1,yest.getDate());
  const yesterdayTarget=yesterdayIsWeekend?dailyOffdayTarget:dailyWorkdayTarget;
  const yesterdayCls=yesterdayTarget>0?(yesterdayActual>=yesterdayTarget*0.95?"kv-s":yesterdayActual>=yesterdayTarget*0.8?"kv-w":"kv-d"):"";
  const pctCls=pct===null?"":pct>=95?"kv-s":pct>=80?"kv-w":"kv-d";
  const projCls=monthlyBudget>0?(projected>=monthlyBudget?"kv-s":projected>=monthlyBudget*0.9?"kv-w":"kv-d"):"";
  const remainingWorkDays=totalWorkDays-workDaysThroughYesterday;
  // Count remaining off days after yesterday so we can subtract their expected contribution
  let remainingOffDays=0;
  for(let d=1;d<=daysInMonth;d++){
    const dk2=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    if(dk2<=yesterdayKey)continue;
    const dow=new Date(+y,+m-1,d).getDay();
    if(dow===0||dow===6||holidays.has(dk2))remainingOffDays++;
  }
  // Required workday rate = 91% of remaining budget / remaining workdays
  const requiredWorkdayRate=remainingWorkDays>0?(monthlyBudget-mtdActual)*WORKDAY_SPLIT/remainingWorkDays:0;

  // Build calendar — show revenue on ALL days, color vs appropriate target
  let calRows="";let weekCells=[];
  const startDow=new Date(+y,+m-1,1).getDay();
  for(let i=0;i<startDow;i++)weekCells.push(`<td></td>`);
  for(let d=1;d<=daysInMonth;d++){
    const dk=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dow=new Date(+y,+m-1,d).getDay();
    const isWknd=dow===0||dow===6;
    const isHoliday=holidays.has(dk);
    const isOff=isWknd||isHoliday;
    const isPast=dk<=yesterdayKey;const isToday2=dk===todayKey();
    const rev=getBranchDayRevenue(bid,dk);
    const dayTarget=isOff?dailyOffdayTarget:dailyWorkdayTarget;
    const hasBudget=monthlyBudget>0;
    let bg="";
    if(hasBudget&&isPast&&rev>0){
      if(rev>=dayTarget*0.95)bg="var(--ok-bg)";
      else if(rev>=dayTarget*0.8)bg="var(--warn-bg)";
      else bg="var(--danger-bg)";
    } else if(hasBudget&&isPast&&!isOff){
      bg="var(--bg-2)"; // workday with no revenue
    }
    const revTxt=isPast&&rev>0?`<div style="font-size:9px;color:var(--text-2);margin-top:1px">${fmtMoney(rev)}</div>`:"";
    const holidayDot=isHoliday&&!isWknd?`<div style="font-size:8px;color:var(--text-3);margin-top:1px">●</div>`:"";
    const border=isToday2?"2px solid var(--brand)":"0.5px solid var(--border)";
    weekCells.push(`<td style="padding:3px 2px;text-align:center;vertical-align:top">
      <div style="background:${bg||"transparent"};border:${border};border-radius:6px;padding:4px 2px;min-height:36px;opacity:${isOff?0.7:1}">
        <div style="font-size:11px;font-weight:${isToday2?"700":"400"};color:${isToday2?"var(--brand)":isOff?"var(--text-3)":"var(--text)"}">${d}</div>
        ${revTxt}${holidayDot}
      </div>
    </td>`);
    if(weekCells.length===7||(d===daysInMonth)){
      while(weekCells.length<7)weekCells.push(`<td></td>`);
      calRows+=`<tr>${weekCells.join("")}</tr>`;weekCells=[];
    }
  }

  return`<div class="app-header">
    <div style="display:flex;align-items:center;gap:10px"><img src="icon.png" class="app-logo" alt=""><div>
      <div class="app-title">Budget</div>
      <div class="app-sub">${activeBranch().label} · ${monthLabel(mk)} ${syncPill()}</div>
    </div></div>
    <div style="display:flex;align-items:center;gap:4px">
      <button onclick="(()=>{const d=new Date(${+y},${+m-2},1);st.budgetMonth=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');render();})()" style="padding:6px 10px;border:1px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text);font-size:16px;min-height:36px;display:flex;align-items:center;justify-content:center"><i class="ti ti-chevron-left"></i></button>
      ${!isCurrentMonth?`<button onclick="st.budgetMonth=null;render()" style="padding:6px 8px;border:1px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text-2);font-size:11px;font-weight:500;min-height:36px">This month</button>`:`<span class="date-badge">${monthLabel(mk)}</span>`}
      <button onclick="(()=>{const d=new Date(${+y},${+m},1);st.budgetMonth=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');render();})()" style="padding:6px 10px;border:1px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text);font-size:16px;min-height:36px;display:flex;align-items:center;justify-content:center"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>

  <div class="kpi-grid" style="grid-template-columns:repeat(2,minmax(0,1fr))">
    <div class="kpi"><div class="kpi-lbl">Monthly Target</div><div class="kpi-val" style="font-size:18px">${monthlyBudget>0?fmtMoneyAbbr(monthlyBudget):"Not set"}</div>
      ${monthlyBudget>0?`<div style="font-size:10px;color:var(--text-2);margin-top:3px;line-height:1.5">${budgetCats.vending>0?`V:${fmtMoney(budgetCats.vending)} `:""}${budgetCats.market>0?`M:${fmtMoney(budgetCats.market)} `:""}${budgetCats.ocs>0?`O:${fmtMoney(budgetCats.ocs)}`:""}`.trim()+`</div>`:""}
    </div>
    <div class="kpi"><div class="kpi-lbl">Daily Target</div><div class="kpi-val" style="font-size:18px">${dailyWorkdayTarget>0?fmtMoneyAbbr(dailyWorkdayTarget):"—"}</div><div style="font-size:10px;color:var(--text-2);margin-top:2px">${totalWorkDays} work days · 92/8 split</div></div>
    <div class="kpi"><div class="kpi-lbl">Yesterday's Revenue</div><div class="kpi-val ${yesterdayCls}">${yesterdayActual>0?fmtMoney(yesterdayActual):yesterdayIsWeekend?"Weekend":"—"}</div><div style="font-size:10px;color:var(--text-2);margin-top:2px">${fmtS(yesterdayKey)}</div></div>
    <div class="kpi"><div class="kpi-lbl">MTD Actual</div><div class="kpi-val ${pctCls}">${fmtMoneyAbbr(mtdActual)}</div>${mtdTarget>0?`<div style="font-size:10px;color:var(--text-2);margin-top:2px">vs ${fmtMoneyAbbr(mtdTarget)} target</div>`:""}</div>
  </div>

  ${monthlyBudget>0?`
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em">Month Progress</span>
      <div style="text-align:right;line-height:1.3">
        <span style="font-size:13px;font-weight:700;color:${(monthPct||0)>=100?"var(--ok-text)":(monthPct||0)>=90?"var(--warn-text)":"var(--danger-text)"}">${monthPct!==null?monthPct+"%":"—"}</span>
        <span style="font-size:11px;color:var(--text-3)"> actual</span>
        ${!monthClosed&&projected>0?`<span style="font-size:11px;color:var(--text-2)"> · </span><span style="font-size:13px;font-weight:700;color:${projCls==="kv-s"?"var(--ok-text)":projCls==="kv-w"?"var(--warn-text)":"var(--danger-text)"}">${Math.round(projected/monthlyBudget*100)}%</span><span style="font-size:11px;color:var(--text-3)"> trend</span>`:""}
      </div>
    </div>

    <!-- Dual progress bar -->
    <div style="position:relative;height:14px;background:var(--bg-2);border-radius:7px;overflow:hidden;margin-bottom:6px">
      <div style="position:absolute;top:0;left:0;height:100%;width:${Math.min(Math.round((projected/monthlyBudget)*100)||0,100)}%;background:${projCls==="kv-s"?"rgba(99,153,34,.25)":projCls==="kv-w"?"rgba(239,159,39,.25)":"rgba(226,75,74,.25)"};border-radius:7px;transition:width .5s"></div>
      <div style="position:absolute;top:0;left:0;height:100%;width:${Math.min(monthPct||0,100)}%;background:${(monthPct||0)>=100?"var(--ok-line)":(monthPct||0)>=90?"var(--warn-line)":"var(--danger-line)"};border-radius:7px;transition:width .4s"></div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="display:flex;gap:10px;font-size:10px;color:var(--text-2)">
        <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:10px;height:4px;border-radius:2px;background:${(monthPct||0)>=100?"var(--ok-line)":(monthPct||0)>=90?"var(--warn-line)":"var(--danger-line)"}"></span>Actual</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:10px;height:8px;border-radius:2px;background:${projCls==="kv-s"?"rgba(99,153,34,.3)":projCls==="kv-w"?"rgba(239,159,39,.3)":"rgba(226,75,74,.3)"}"></span>Trend</span>
      </div>
      <span style="font-size:10px;color:var(--text-2)">Work day ${workDaysThroughYesterday} of ${totalWorkDays}</span>
    </div>

    <!-- To hit target / final result -->
    <div style="background:var(--bg-2);border-radius:var(--radius-md);padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
      ${monthClosed
        ?`<div style="font-size:11px;color:var(--text-2)">Month closed — final result <span style="font-weight:700;color:var(--text)">${monthPct}% of target</span></div>`
        :`<div style="font-size:11px;color:var(--text-2)"><span style="font-weight:700;color:var(--text)">${remainingWorkDays>0?fmtMoneyAbbr(requiredWorkdayRate)+"/day":"—"}</span> needed to hit target</div>`}
      <div style="font-size:11px;color:var(--text-3)">${monthClosed?"":""+remainingWorkDays+" work days left"}</div>
    </div>

    ${!monthClosed&&pct!==null&&projected>0&&Math.round(projected/monthlyBudget*100)<100?`<div style="margin-top:10px;padding:8px;background:var(--danger-bg);border-radius:var(--radius-md);font-size:12px;color:var(--danger-text)"><i class="ti ti-trending-down" style="vertical-align:-2px;margin-right:4px"></i>Behind pace by ${fmtMoney(mtdTarget-mtdActual)}</div>`:""}
    ${!monthClosed&&projected>0&&Math.round(projected/monthlyBudget*100)>=100&&Math.round(projected/monthlyBudget*100)<110?`<div style="margin-top:10px;padding:8px;background:var(--ok-bg);border-radius:var(--radius-md);font-size:12px;color:var(--ok-text)"><i class="ti ti-trending-up" style="vertical-align:-2px;margin-right:4px"></i>On track — pacing to hit target</div>`:""}
    ${!monthClosed&&projected>0&&Math.round(projected/monthlyBudget*100)>=110?`<div style="margin-top:10px;padding:8px;background:var(--ok-bg);border-radius:var(--radius-md);font-size:12px;color:var(--ok-text)"><i class="ti ti-trophy" style="vertical-align:-2px;margin-right:4px"></i>Ahead of pace by ${fmtMoney(mtdActual-mtdTarget)}</div>`:""}
    ${monthClosed&&monthPct!==null&&monthPct>=100?`<div style="margin-top:10px;padding:8px;background:var(--ok-bg);border-radius:var(--radius-md);font-size:12px;color:var(--ok-text)"><i class="ti ti-trophy" style="vertical-align:-2px;margin-right:4px"></i>Target hit — finished at ${monthPct}% (${fmtMoney(mtdActual-monthlyBudget)} over)</div>`:""}
    ${monthClosed&&monthPct!==null&&monthPct<100?`<div style="margin-top:10px;padding:8px;background:var(--danger-bg);border-radius:var(--radius-md);font-size:12px;color:var(--danger-text)"><i class="ti ti-flag" style="vertical-align:-2px;margin-right:4px"></i>Missed target by ${fmtMoney(monthlyBudget-mtdActual)}</div>`:""}
  </div>

  <span class="section-lbl">${monthLabel(mk)}</span>

// Animated count-up for KPI values (runs once per tab visit)
let lastAnimatedTab=null;
function animateCounters(){
  if(lastAnimatedTab===st.tab)return; // only animate on tab change, not every keystroke render
  lastAnimatedTab=st.tab;
  document.querySelectorAll(".kpi-val").forEach(el=>{
    const txt=el.textContent.trim();
    // Match leading number with optional $ prefix, % suffix, K/M suffix, or x/y format
    const m=txt.match(/^(\$?)([\d,]+(?:\.\d+)?)(%|K|M)?$/);
    if(!m)return;
    const prefix=m[1],suffix=m[3]||"";
    const target=parseFloat(m[2].replace(/,/g,""));
    if(isNaN(target)||target===0)return;
    const decimals=(m[2].split(".")[1]||"").length;
    const dur=520;const start=performance.now();
    function tick(now){
      const p=Math.min((now-start)/dur,1);
      const eased=1-Math.pow(1-p,3); // ease-out cubic
      const val=target*eased;
      el.childNodes[0].textContent=prefix+val.toLocaleString("en-US",{minimumFractionDigits:decimals,maximumFractionDigits:decimals})+suffix;
      if(p<1)requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

function drawBudgetChart(){
  const bid=st.branch;const mk=st.budgetMonth||monthKey(todayKey());
  const[y,m]=mk.split("-");
  const budgetCats=getBudgetCats(bid,mk);
  const monthlyBudget=budgetCats.total;
  if(!monthlyBudget)return;
  const totalWorkDays=workDaysInMonth(+y,+m);
  const daysInMonth=new Date(+y,+m,0).getDate();
  const holidays=getHolidays(+y);
  // Count off days for 9% split
  let totalOffDays=0;
  for(let d=1;d<=daysInMonth;d++){const dow=new Date(+y,+m-1,d).getDay();const dk2=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;if(dow===0||dow===6||holidays.has(dk2))totalOffDays++;}
  const dailyWorkdayTarget=totalWorkDays>0?(monthlyBudget*0.92)/totalWorkDays:0;
  const dailyOffdayTarget=totalOffDays>0?(monthlyBudget*0.08)/totalOffDays:0;
  const yest=new Date();yest.setDate(yest.getDate()-1);
  const yesterdayKey=yest.getFullYear()+"-"+String(yest.getMonth()+1).padStart(2,"0")+"-"+String(yest.getDate()).padStart(2,"0");
  const tc=getComputedStyle(document.documentElement).getPropertyValue("--text-2").trim()||"#888";
  const gc="rgba(128,128,128,.12)";
  const commonOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#191917",titleColor:"#fff",bodyColor:"#fff",padding:8}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{display:false}}}};

  // Build per-day data arrays — ALL days, not just workdays
  const labels=[],revData=[],varData=[],varColors=[],targetLine=[];
  let cumVar=0;const cumData=[];
  for(let d=1;d<=daysInMonth;d++){
    const dk=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    if(dk>yesterdayKey)break;
    const dow=new Date(+y,+m-1,d).getDay();
    const isOff=dow===0||dow===6||holidays.has(dk);
    const dayTarget=isOff?dailyOffdayTarget:dailyWorkdayTarget;
    const rev=getBranchDayRevenue(bid,dk);
    const dollarVar=rev-dayTarget;
    const vari=dayTarget>0?Math.round(dollarVar/dayTarget*100):0;
    cumVar+=dollarVar;
    labels.push(String(d));
    revData.push(Math.round(rev));
    varData.push(vari);
    varColors.push(vari>=0?"rgba(99,153,34,.7)":"rgba(226,75,74,.7)");
    targetLine.push(Math.round(dayTarget));
    cumData.push(Math.round(cumVar));
  }
  if(!labels.length)return;

  // Chart 1 — Daily Revenue vs Target (bars + target line)
  const ctx1=document.getElementById("chart-budget-daily");
  if(ctx1){
    new Chart(ctx1,{
      type:"bar",
      data:{labels,datasets:[
        {type:"bar",data:revData,backgroundColor:varColors,borderRadius:3,order:2},
        {type:"line",data:targetLine,borderColor:"rgba(55,138,221,.8)",borderDash:[4,3],borderWidth:2,pointRadius:0,fill:false,order:1,stepped:true}
      ]},
      options:{...commonOpts,
        plugins:{...commonOpts.plugins,tooltip:{...commonOpts.plugins.tooltip,callbacks:{
          label:item=>item.datasetIndex===0?`Revenue: ${fmtMoney(item.parsed.y)}`:`Target: ${fmtMoney(item.parsed.y)}`
        }}},
        scales:{...commonOpts.scales,y:{ticks:{color:tc,callback:v=>"$"+(v>=1000?(v/1000).toFixed(0)+"K":v),font:{size:10}},grid:{color:gc}}}
      }
    });
  }

  // Chart 2 — Cumulative MTD Variance (single line, colored by sign)
  const ctx2=document.getElementById("chart-budget-cumulative");
  if(ctx2){
    new Chart(ctx2,{
      type:"line",
      data:{labels,datasets:[
        {
          data:cumData,
          borderColor:ctx=>ctx.raw>=0?"#639922":"#E24B4A",
          borderWidth:2,
          fill:{target:"origin",above:"rgba(99,153,34,.12)",below:"rgba(226,75,74,.12)"},
          tension:.3,
          pointRadius:0,
          segment:{
            borderColor:ctx=>ctx.p1.parsed.y>=0&&ctx.p0.parsed.y>=0?"#639922":"#E24B4A"
          }
        },
        {data:Array(labels.length).fill(0),borderColor:"rgba(128,128,128,.35)",borderWidth:1,pointRadius:0,fill:false}
      ]},
      options:{...commonOpts,
        plugins:{...commonOpts.plugins,tooltip:{...commonOpts.plugins.tooltip,callbacks:{
          label:item=>item.datasetIndex===1?null:`MTD: ${item.parsed.y>=0?"+":""}${fmtMoney(item.parsed.y)}`
        }}},
        scales:{...commonOpts.scales,y:{ticks:{color:tc,callback:v=>(v>=0?"+":"")+( Math.abs(v)>=1000?(v>=0?"$":"−$")+(Math.abs(v)/1000).toFixed(0)+"K":(v>=0?"$":"−$")+Math.abs(v)),font:{size:9}},grid:{color:gc}}}
      }
    });
  }

  // Chart 3 — Daily Variance %
  const ctx3=document.getElementById("chart-budget-variance");
  if(ctx3){
    new Chart(ctx3,{
      type:"bar",
      data:{labels,datasets:[{data:varData,backgroundColor:varColors,borderRadius:3}]},
      options:{...commonOpts,
        plugins:{...commonOpts.plugins,tooltip:{...commonOpts.plugins.tooltip,callbacks:{label:item=>`${item.parsed.y>=0?"+":""}${item.parsed.y}%`}}},
        scales:{...commonOpts.scales,y:{ticks:{color:tc,callback:v=>(v>=0?"+":"")+v+"%",font:{size:10}},grid:{color:gc}}}
      }

}
