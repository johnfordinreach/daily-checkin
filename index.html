<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#D63E0E">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Daily Check-in">
<title>Daily Check-in</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#fafaf8;--bg-2:#f2f1ec;--bg-3:#e8e7e0;
  --text:#141412;--text-2:#5a5956;--text-3:#96948e;
  --border:rgba(0,0,0,.06);--border-2:rgba(0,0,0,.13);
  --info-bg:#E8F2FC;--info-text:#0B4282;
  --ok-bg:#E6F4D8;--ok-text:#2E6010;--ok-border:#B5D988;--ok-line:#5A9A1A;
  --warn-bg:#FDF0DC;--warn-text:#7A450A;--warn-border:#F9C46A;--warn-line:#E09020;
  --danger-bg:#FDEAEA;--danger-text:#9B2424;--danger-border:#F5B8B8;--danger-line:#D94040;
  --purple-bg:#EEEDFE;--purple-text:#3C3489;
  --blue:#2B7DD4;
  --brand:#C73A0D;--brand-muted:rgba(199,58,13,.12);--brand-light:rgba(199,58,13,.07);
  --shadow-sm:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.05);
  --shadow-card:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --radius-md:12px;--radius-lg:18px;--radius-xl:22px;
  --font:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;
}
[data-theme="dark"]{
  --bg:#171715;--bg-2:#202020;--bg-3:#2a2a28;
  --text:#f0eee7;--text-2:#a0a09a;--text-3:#5e5e58;
  --border:rgba(255,255,255,.07);--border-2:rgba(255,255,255,.14);
  --shadow-sm:0 1px 3px rgba(0,0,0,.35);--shadow-md:0 4px 16px rgba(0,0,0,.5);
  --shadow-card:0 2px 8px rgba(0,0,0,.4);
  --info-bg:#0c2840;--info-text:#79b8f5;--ok-bg:#182e08;--ok-text:#8ed44a;
  --warn-bg:#321d00;--warn-text:#f4c06a;--danger-bg:#320a0a;--danger-text:#f47070;
  --purple-bg:#1c1840;--purple-text:#aea5f5;--brand-light:rgba(199,58,13,.18);
}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
  --bg:#171715;--bg-2:#202020;--bg-3:#2a2a28;
  --text:#f0eee7;--text-2:#a0a09a;--text-3:#5e5e58;
  --border:rgba(255,255,255,.07);--border-2:rgba(255,255,255,.14);
  --shadow-sm:0 1px 3px rgba(0,0,0,.35);--shadow-md:0 4px 16px rgba(0,0,0,.5);
  --shadow-card:0 2px 8px rgba(0,0,0,.4);
  --info-bg:#0c2840;--info-text:#79b8f5;--ok-bg:#182e08;--ok-text:#8ed44a;
  --warn-bg:#321d00;--warn-text:#f4c06a;--danger-bg:#320a0a;--danger-text:#f47070;
  --purple-bg:#1c1840;--purple-text:#aea5f5;--brand-light:rgba(199,58,13,.18);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;overflow-x:hidden;overscroll-behavior-x:none}
body{padding:max(env(safe-area-inset-top),20px) 16px calc(80px + max(env(safe-area-inset-bottom),8px));max-width:500px;margin:0 auto;min-height:100vh}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none;border:none;background:none;color:inherit;transition:opacity .12s}
input,select,textarea{font-family:inherit;width:100%;font-size:14px;padding:10px 13px;border:1.5px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(199,58,13,.1);background:var(--bg)}
textarea{height:64px;resize:none}

/* ── App header ── */
.app-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-top:4px;min-width:0;overflow:hidden}
.app-title{font-size:24px;font-weight:800;color:var(--brand);letter-spacing:-.5px}
.app-sub{font-size:12px;color:var(--text-2);margin-top:3px;display:flex;align-items:center;gap:6px}
.date-badge{font-size:11px;color:var(--text-2);background:var(--bg-2);padding:6px 11px;border-radius:var(--radius-md);border:1px solid var(--border-2);white-space:nowrap;font-weight:600}

/* ── Sync pill ── */
.sync-pill{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;display:inline-flex;align-items:center;gap:4px;letter-spacing:.03em}
.sync-live{background:var(--ok-bg);color:var(--ok-text)}.sync-local{background:var(--bg-2);color:var(--text-2)}.sync-error{background:var(--danger-bg);color:var(--danger-text)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.sync-live .sync-dot{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── Status stepper ── */
.status-stepper{display:flex;margin-bottom:18px;border-radius:var(--radius-lg);overflow:hidden;border:1.5px solid var(--border-2);box-shadow:var(--shadow-sm)}
.status-step{flex:1;padding:11px 4px;text-align:center;font-size:12px;color:var(--text-2);background:var(--bg-2);cursor:pointer;border-right:1.5px solid var(--border-2);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:56px;justify-content:center;font-weight:500}
.status-step:last-child{border-right:none}
.status-step i{font-size:20px}
.ss-ns{background:var(--danger-bg);color:var(--danger-text);font-weight:700}
.ss-ip{background:var(--warn-bg);color:var(--warn-text);font-weight:700}
.ss-fn{background:var(--ok-bg);color:var(--ok-text);font-weight:700}

/* ── Route status chips ── */
.rs-chip{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;white-space:nowrap;display:inline-flex;align-items:center;gap:3px;letter-spacing:.03em}
.rs-ns{background:var(--bg-3);color:var(--text-3)}.rs-ip{background:var(--warn-bg);color:var(--warn-text)}.rs-fn{background:var(--ok-bg);color:var(--ok-text)}
.sb-ns{background:var(--danger-bg);color:var(--danger-text)}.sb-ip{background:var(--warn-bg);color:var(--warn-text)}.sb-fn{background:var(--ok-bg);color:var(--ok-text)}
.status-badge{font-size:11px;padding:4px 11px;border-radius:20px;font-weight:700;display:inline-flex;align-items:center;gap:4px}

/* ── Sections ── */
.section{margin-bottom:22px}
.section-lbl{font-size:11px;font-weight:800;color:var(--text-2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;display:block;padding-left:10px;border-left:3px solid var(--brand)}

/* ── Cards ── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow-card)}
.field{margin-bottom:14px}.field:last-child{margin-bottom:0}
.field-lbl{font-size:11px;font-weight:700;color:var(--text-2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.05em}
.two-col{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.four-col{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px}

/* ── Route cards — data-forward ── */
.route-card{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-card);transition:box-shadow .15s,border-color .15s}
.route-card:has(.route-body.open){box-shadow:var(--shadow-md);border-color:var(--border-2)}
.route-head{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer;user-select:none;min-height:60px;transition:background .1s}
.route-head:active{background:var(--bg-2)}
.r-id{font-size:10px;font-weight:800;color:var(--text-3);min-width:0;flex-shrink:0;letter-spacing:.06em}
.r-driver{font-size:15px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.1px}
.r-cover{font-size:10px;font-weight:700;color:var(--purple-text);background:var(--purple-bg);padding:3px 7px;border-radius:20px;flex-shrink:0;letter-spacing:.02em}
.sdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sdot-yes{background:var(--ok-line)}.sdot-no{background:var(--danger-line)}.sdot-out{background:var(--warn-line)}.sdot-open{background:var(--text-3)}
.chev{font-size:16px;color:var(--text-3);transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.route-body{display:none;padding:0 15px 15px;border-top:1px solid var(--border)}
.route-body.open{display:block}
.divider{height:1px;background:var(--border);margin:14px 0}
.toggle-row{display:flex;gap:3px;background:var(--bg-2);border-radius:var(--radius-md);padding:3px;border:1px solid var(--border)}
.toggle-btn{flex:1;padding:9px 4px;font-size:12px;color:var(--text-2);border-radius:10px;transition:all .15s;min-height:36px;font-weight:600}
.t-on{background:var(--bg);color:var(--text);font-weight:700;box-shadow:var(--shadow-sm)}
.t-ns{background:var(--danger-bg);color:var(--danger-text);font-weight:700}
.t-ip{background:var(--warn-bg);color:var(--warn-text);font-weight:700}
.t-fn{background:var(--ok-bg);color:var(--ok-text);font-weight:700}

/* ── Buttons ── */
.btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--brand);color:#fff;border-radius:var(--radius-lg);padding:16px;font-size:15px;font-weight:800;min-height:54px;box-shadow:0 3px 12px rgba(199,58,13,.35),0 1px 3px rgba(0,0,0,.1);letter-spacing:.01em;transition:transform .1s,box-shadow .1s}
.btn-primary:active{transform:scale(.98);box-shadow:0 1px 6px rgba(199,58,13,.25)}
.btn-sec{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--bg-2);color:var(--text);border:1.5px solid var(--border-2);border-radius:var(--radius-md);padding:10px 15px;font-size:13px;min-height:42px;flex:1;font-weight:600;box-shadow:var(--shadow-sm)}
.btn-sec:active{opacity:.75}
.btn-danger{background:var(--danger-bg);color:var(--danger-text);border-color:var(--danger-border)}

/* ── KPI tiles ── */
.kpi-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--bg-2);border-radius:var(--radius-lg);padding:16px 12px;text-align:center;border:1px solid var(--border)}
.kpi-lbl{font-size:10px;font-weight:800;color:var(--text-3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em}
.kpi-val{font-size:28px;font-weight:800;letter-spacing:-.6px}
.kpi-delta{font-size:11px;margin-top:5px;font-weight:600}
.kv-s{color:var(--ok-text)}.kv-w{color:var(--warn-text)}.kv-d{color:var(--danger-text)}

/* ── Alert / info boxes ── */
.alert-box{background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--radius-md);padding:13px;margin-bottom:14px}
.alert-title{font-size:12px;font-weight:700;color:var(--danger-text);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.alert-item{font-size:13px;color:var(--danger-text);margin:3px 0}
.ok-box{background:var(--ok-bg);border:1px solid var(--ok-border);border-radius:var(--radius-md);padding:13px;margin-bottom:14px;font-size:13px;color:var(--ok-text);display:flex;align-items:center;gap:8px}
.info-box{background:var(--info-bg);border:1px solid rgba(11,66,130,.12);border-radius:var(--radius-md);padding:13px;margin-bottom:14px;font-size:12px;color:var(--info-text);line-height:1.5}
.warn-box{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-md);padding:13px;margin-bottom:14px;font-size:12px;color:var(--warn-text);line-height:1.5}
.plan-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px;box-shadow:var(--shadow-card)}
.plan-row{display:flex;gap:8px;margin-bottom:9px;font-size:13px;align-items:flex-start}
.plan-row:last-child{margin-bottom:0}
.plan-lbl{color:var(--text-2);min-width:68px;padding-top:2px;flex-shrink:0;font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.plan-val{line-height:1.55;flex:1;font-size:13px}
.pill{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;margin:2px 3px 2px 0;font-weight:700}
.p-pto{background:var(--info-bg);color:var(--info-text)}.p-ncns{background:var(--danger-bg);color:var(--danger-text)}.p-callout{background:var(--warn-bg);color:var(--warn-text)}.p-relief{background:var(--purple-bg);color:var(--purple-text)}
.totes-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px;box-shadow:var(--shadow-card)}
.totes-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;margin-top:10px}
.tote-cell{text-align:center;background:var(--bg-2);border-radius:var(--radius-md);padding:12px 4px;border:1px solid var(--border)}
.tote-val{font-size:20px;font-weight:800}
.tote-lbl{font-size:10px;color:var(--text-2);margin-top:2px;font-weight:700}

/* ── History route rows ── */
.rrow{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px;display:flex;align-items:flex-start;gap:10px;margin-bottom:7px;box-shadow:var(--shadow-card)}
.rrow-left{flex:1;min-width:0}
.rrow-id{font-size:10px;font-weight:800;color:var(--text-3);letter-spacing:.05em}
.rrow-driver{font-size:14px;font-weight:700;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.rrow-meta{font-size:11px;color:var(--text-2);margin-top:3px;line-height:1.7}
.rrow-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;padding-top:2px}
.chip{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700}
.c-yes{background:var(--ok-bg);color:var(--ok-text)}.c-no{background:var(--danger-bg);color:var(--danger-text)}.c-out{background:var(--warn-bg);color:var(--warn-text)}.c-open{background:var(--bg-2);color:var(--text-2)}
.absence-banner{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-md);padding:11px;margin-bottom:10px;font-size:12px;color:var(--warn-text)}
.actions-row{display:flex;gap:8px;margin-bottom:8px}
.saved-note{font-size:11px;color:var(--text-2);text-align:center;margin-top:6px}

/* ── Toast ── */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:var(--bg);padding:12px 22px;border-radius:24px;font-size:13px;font-weight:700;opacity:0;transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .25s ease;z-index:100;pointer-events:none;box-shadow:0 8px 28px rgba(0,0,0,.22);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.footer-note{font-size:11px;color:var(--text-3);text-align:center;margin-top:20px;padding-top:14px;border-top:1px solid var(--border);line-height:1.5}

/* ── Nav bar (mobile bottom / desktop sidebar) ── */
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1.5px solid var(--border);display:flex;justify-content:space-around;padding:6px 0 max(env(safe-area-inset-bottom),6px);z-index:50;max-width:500px;margin:0 auto}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;color:var(--text-3);font-size:10px;font-weight:600;background:none;border:none;min-height:50px;transition:color .15s}
.nav-btn i{font-size:22px;transition:transform .15s}
.nav-btn.active{color:var(--brand)}
.nav-btn.active i{color:var(--brand);transform:scale(1.1)}
.nav-brand{display:none}
.nav-content{padding-bottom:8px}
@media(min-width:768px){
  html,body{height:100%}
  body{padding:36px 52px 36px calc(280px + 52px);max-width:none;margin:0}
  .nav-bar{top:0;bottom:0;left:0;right:auto;width:280px;flex-direction:column;align-items:stretch;justify-content:flex-start;border-top:none;border-right:1.5px solid var(--border);padding:0 14px 24px;gap:2px;max-width:none;overflow-y:auto;background:var(--bg-2)}
  .nav-brand{display:flex;flex-direction:column;padding:0 10px 22px;border-bottom:1px solid var(--border);margin-bottom:14px;border-top:5px solid var(--brand);padding-top:22px}
  .nav-brand-logo{width:68px;height:68px;border-radius:14px;object-fit:cover;margin-bottom:12px;box-shadow:var(--shadow-md)}
  .nav-brand-title{font-size:15px;font-weight:800;color:var(--brand);line-height:1.3;letter-spacing:-.2px}
  .nav-brand-sub{font-size:11px;color:var(--text-2);margin-top:3px;font-weight:500}
  .nav-btn{flex-direction:row;justify-content:flex-start;padding:11px 13px;gap:13px;font-size:14px;border-radius:var(--radius-md);min-height:46px;flex:none;width:100%;font-weight:600}
  .nav-btn i{font-size:18px}
  .nav-btn.active{background:var(--brand-light);color:var(--brand);font-weight:800}
  .nav-btn.active i{transform:none}
  .nav-bar select{display:block;margin-top:auto;font-size:13px;font-weight:600;padding:10px 12px;border-radius:var(--radius-md)}
}
  .nav-btn.active i{color:var(--brand);transform:none}
  .nav-content{max-width:1100px;padding-bottom:0}
  .kpi-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
  .app-title{font-size:26px}
  .app-header{margin-bottom:22px;padding-top:0}
  .toast{bottom:32px}
  .status-stepper .status-step{min-height:56px;font-size:13px}
  .status-stepper .status-step i{font-size:20px}
  .route-head{padding:14px 16px;min-height:56px}
  .route-body{padding:0 16px 16px}
  .card{padding:18px}
  .history-day{padding:14px 16px}
  .chart-card{padding:18px}
  .btn-primary{font-size:16px;padding:16px}
  .plan-card{padding:16px}
  .section-lbl{font-size:12px}
  .totes-card{padding:16px}
}
@media(min-width:1200px){
  body{padding:40px 64px 40px calc(272px + 64px)}
  .nav-content{max-width:1280px}
  .kpi-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
  .two-col{grid-template-columns:repeat(2,minmax(0,1fr))}
}
.history-day{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-sm);transition:background .1s}
.history-day:active{background:var(--bg-2)}
.hd-date{flex:1;min-width:0}
.hd-date-main{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hd-date-sub{font-size:11px;color:var(--text-2);margin-top:2px}
.hd-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-2)}
.empty-state i{font-size:44px;margin-bottom:14px;color:var(--text-3);display:block;opacity:.7}
.empty-state-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-state-sub{font-size:13px;line-height:1.6;max-width:260px;margin:0 auto}
.range-toggle{display:flex;gap:3px;background:var(--bg-2);border-radius:var(--radius-md);padding:3px;margin-bottom:16px;border:1px solid var(--border)}
.range-btn{flex:1;padding:7px 4px;font-size:12px;color:var(--text-2);border-radius:8px;min-height:32px;font-weight:500}
.range-btn.on{background:var(--bg);color:var(--text);font-weight:700;box-shadow:var(--shadow-sm)}
.chart-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.chart-title{font-size:13px;font-weight:700;margin-bottom:3px}
.chart-sub{font-size:11px;color:var(--text-2);margin-bottom:12px}
.chart-wrap{position:relative;width:100%;height:180px}
.leader-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.leader-row:last-child{border-bottom:none}
.leader-rank{font-size:11px;font-weight:700;color:var(--text-3);min-width:18px}
.leader-name{flex:1;font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.leader-route{font-size:10px;font-weight:500;color:var(--text-3);margin-left:5px}
.leader-bar-wrap{flex:1;display:flex;align-items:center;gap:6px;max-width:140px}
.leader-bar-track{flex:1;height:5px;background:var(--bg-2);border-radius:3px;overflow:hidden}
.leader-bar-fill{height:100%;background:var(--brand);border-radius:3px}
.leader-val{font-size:12px;font-weight:700;min-width:24px;text-align:right}
.app-logo{width:42px;height:42px;border-radius:10px;object-fit:cover;flex-shrink:0;display:block;box-shadow:var(--shadow-sm)}
@media(min-width:768px){.app-logo{display:none}}
.back-btn i{font-size:18px}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
.setting-row:last-child{border-bottom:none}
.setting-info{flex:1;min-width:0}
.setting-title{font-size:14px;font-weight:600}
.setting-desc{font-size:12px;color:var(--text-2);margin-top:2px;line-height:1.4;word-break:break-word}
.setup-step{display:flex;gap:10px;margin-bottom:14px;align-items:flex-start}
.setup-num{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--brand);color:white;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px;box-shadow:0 2px 6px rgba(214,62,14,.3)}
.setup-text{flex:1;font-size:13px;line-height:1.5}
.setup-text strong{font-weight:700}
.setup-text code{font-family:ui-monospace,Menlo,Consolas,monospace;background:var(--bg-2);padding:2px 6px;border-radius:5px;font-size:12px;word-break:break-all;border:1px solid var(--border)}
.setup-text a{color:var(--blue);text-decoration:underline}
.status-bar{display:flex;gap:0;margin-bottom:14px;background:var(--bg-2);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-sm)}
.sb-item{flex:1;text-align:center;padding:10px 4px}
.sb-item+.sb-item{border-left:1px solid var(--border)}
.sb-num{font-size:20px;font-weight:800;line-height:1;letter-spacing:-.5px}
.sb-lbl{font-size:10px;font-weight:600;color:var(--text-3);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.pull-indicator{position:fixed;top:0;left:50%;transform:translateX(-50%);background:var(--brand);color:#fff;padding:9px 20px;border-radius:0 0 22px 22px;font-size:12px;font-weight:700;z-index:200;display:flex;align-items:center;gap:6px;transition:transform .2s;transform:translateX(-50%) translateY(-100%);box-shadow:0 4px 16px rgba(214,62,14,.4)}
.pull-indicator.visible{transform:translateX(-50%) translateY(0)}
.kbd-hint{font-size:10px;color:var(--text-3);background:var(--bg-2);border:1px solid var(--border-2);border-radius:5px;padding:1px 5px;font-family:ui-monospace,monospace;margin-left:4px;display:none}
@media(min-width:768px){.kbd-hint{display:inline}}
</style>

  if(custom&&custom.length){
    const defs=defaultRoutes(bid);
    if(defs.length){const order=new Map(defs.map((r,i)=>[r.id,i]));return [...custom].sort((a,b)=>(order.has(a.id)?order.get(a.id):1e9)-(order.has(b.id)?order.get(b.id):1e9));}

  }

  if(bid==="houston")return HOU_ROUTES;

}

function routePrefix(bid){
  const map={dallas:"DFW",sanantonio:"SAT",austin:"AUS",houston:"HOU",midland:"WTX",linthicum:"BAL"};
  return map[bid]||null;
}

function briefingIsContaminated(b,bid){
  const prefix=routePrefix(bid);
  if(!prefix||!b||!b.routes||!b.routes.length)return false;
  // Contaminated if ANY route has a prefix belonging to a DIFFERENT branch
  return b.routes.some(r=>{
    const id=String(r.id||"");
    const otherPrefixes=Object.entries({dallas:"DFW",sanantonio:"SAT",austin:"AUS",houston:"HOU",midland:"WTX",linthicum:"BAL"})
      .filter(([k])=>k!==bid).map(([,v])=>v);
    return otherPrefixes.some(p=>id.startsWith(p));
  });
}

function repairBriefing(b,bid){
  // Build a map of existing route data keyed by route ID
  const existingData={};
  (b.routes||[]).forEach(r=>{existingData[r.id]=r;});
  // Replace routes with correct branch defaults, merging in matching data
  const correctRoutes=branchRoutes(bid).map(def=>{
    const existing=existingData[def.id];
    if(existing){
      // Keep operational data but fix the driver to default if it was wrong branch's driver
      return{...freshRoute(def),...existing,id:def.id,assignedDriver:def.driver};
    }
    return freshRoute(def);
  });
  return{...b,routes:correctRoutes};
}

function repairAllBranchData(){
  let fixed=0;
  BRANCH_IDS.forEach(bid=>{
    const brf=st.branchBriefings[bid]||{};
    let branchFixed=0;
    Object.keys(brf).forEach(dk=>{
      if(briefingIsContaminated(brf[dk],bid)){
        brf[dk]=repairBriefing(brf[dk],bid);
        branchFixed++;fixed++;
      }
    });
    if(branchFixed>0){
      try{localStorage.setItem(BRANCHES[bid].storeKey,JSON.stringify(brf));}catch(e){}
      // Sync repaired data to Firebase
      if(st.syncStatus==="live"&&fb.modules){
        Object.values(brf).forEach(b=>writeB(b,bid).catch(()=>{}));
      }
    }
  });
  // Re-point st.briefings at the current branch
  st.briefings=st.branchBriefings[st.branch]||{};
  return fixed;
}

function subAllBranches(){
  const{collection,onSnapshot}=fb.modules;
  // Unsubscribe existing listeners
  if(fb.unsubAll){fb.unsubAll();fb.unsubAll=null;}
  if(fb.unsubBranches){fb.unsubBranches.forEach(u=>u());fb.unsubBranches=null;}
  // Subscribe to every branch collection simultaneously
  const unsubs=BRANCH_IDS.map(bid=>{
    return onSnapshot(
      collection(fb.db,BRANCHES[bid].collection),
      (snap)=>{
        const fc=bid===st.branch?capFocus():null;
        const u={};snap.forEach(d=>{u[d.id]=d.data();});
        // Repair contamination inline
        Object.keys(u).forEach(dk=>{
          if(briefingIsContaminated(u[dk],bid))u[dk]=repairBriefing(u[dk],bid);
        });
        st.branchBriefings[bid]=u;
        // Keep st.briefings in sync with active branch
        if(bid===st.branch)st.briefings=u;
        render();
        if(fc)resFocus(fc);
      },
      (err)=>{console.error(`Snapshot error for ${bid}:`,err.code,err.message);}
    );
  });
  fb.unsubBranches=unsubs;
}

// ---- Stats ----
function bStats(b){
  const running=b.routes.filter(r=>r.status!=="off");
  const offCount=b.routes.length-running.length;
  const tA=running.reduce((a,r)=>a+(parseInt(r.assets)||0),0);
  const tM=running.reduce((a,r)=>a+(parseInt(r.missed)||0),0);
  const otPct=tA>0?Math.round(((tA-tM)/tA)*1000)/10:null;
  const pushed=running.filter(r=>r.pushed==="yes").reduce((a,r)=>a+(parseInt(r.missed)||0),0);
  const tL=running.reduce((a,r)=>a+(parseInt(r.locations)||0),0);
  const active=running.length;
  const late=running.filter(r=>r.status==="no").length;
  const out=running.filter(r=>ABSENCE.includes(r.status)).length;
  const finished=running.filter(r=>r.routeStatus==="finished").length;
  const inProg=running.filter(r=>r.routeStatus==="in_progress").length;
  const totes={
    candy:running.filter(r=>r.totes&&r.totes.candy==="yes").length,
    freezer:running.filter(r=>r.totes&&r.totes.freezer==="yes").length,
    cooler:running.filter(r=>r.totes&&r.totes.cooler==="yes").length,
    dock:running.filter(r=>r.totes&&r.totes.dock==="yes").length,
  };
  const hasTotes=Object.values(totes).some(v=>v>0);
  const scores=running.map(r=>parseFloat(r.safetyScore)).filter(v=>!isNaN(v)&&v>0);
  const avgSafety=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*100)/100:null;
  const minSafety=scores.length?Math.min(...scores):null;
  const hasSafety=scores.length>0;
  const tMR=running.reduce((a,r)=>a+(parseInt(r.missedRestocks)||0),0);
  const tEC=running.reduce((a,r)=>a+(parseInt(r.emptyCoils)||0),0);
  const tSpoils=running.reduce((a,r)=>a+(parseFloat(r.spoils)||0),0)+(b.spoilsShrinkOverflow?Object.values(b.spoilsShrinkOverflow).reduce((a,r)=>a+(parseFloat(r.spoils)||0),0):0);
  const tShrink=running.reduce((a,r)=>a+(parseFloat(r.shrink)||0),0)+(b.spoilsShrinkOverflow?Object.values(b.spoilsShrinkOverflow).reduce((a,r)=>a+(parseFloat(r.shrink)||0),0):0);
  return{otPct,totalMissed:tM,totalMissedRestocks:tMR,totalEmptyCoils:tEC,totalSpoils:tSpoils,totalShrink:tShrink,pushed,totalAssets:tA,totalLocs:tL,active,late,out,finished,inProg,totes,hasTotes,avgSafety,minSafety,hasSafety,offCount,runningCount:running.length};
}
function isWeekend(dk){const[y,m,d]=dk.split("-");const w=new Date(+y,+m-1,+d).getDay();return w===0||w===6;}
function calcRouteMinutes(start,finish){
  if(!start||!finish)return null;
  const[sh,sm]=start.split(":").map(Number);
  const[fh,fm]=finish.split(":").map(Number);
  let mins=(fh*60+fm)-(sh*60+sm);
  if(mins<0)mins+=1440;
  return mins;
}
function calcTimeOnRoute(start,finish){
  const mins=calcRouteMinutes(start,finish);
  if(mins===null)return null;
  const h=Math.floor(mins/60),m=mins%60;
  return h>0?`${h}h ${m}m`:`${m}m`;
}
function calcTimePerAsset(start,finish,assets){
  const mins=calcRouteMinutes(start,finish);const a=parseInt(assets);
  if(mins===null||!a)return null;
  return Math.round(mins/a*10)/10+" min/asset";
}
function calcTimePerLoc(start,finish,locs){
  const mins=calcRouteMinutes(start,finish);const l=parseInt(locs);
  if(mins===null||!l)return null;
  return Math.round(mins/l*10)/10+" min/loc";
}
function parseMoney(s){const v=parseFloat(String(s||"").replace(/[^0-9.-]/g,""));return isNaN(v)?0:v;}
function fmtMoney(n){return"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmt2(n){if(n===null||n===undefined)return"—";return Math.round(n*100)/100;}
function fmtMoneyAbbr(n){
  if(!n||n===0)return"—";
  if(n>=1000000){const v=Math.round(n/100000)/10;return"$"+(v===Math.floor(v)?Math.floor(v):v)+"M";}
  if(n>=100000)return"$"+Math.round(n/1000)+"K";
  if(n>=1000){const v=Math.round(n/100)/10;return"$"+(v===Math.floor(v)?Math.floor(v):v)+"K";}
  return fmtMoney(n);
}

// Tiny inline sparkline SVG from an array of numbers (last 7 days)
function sparkline(values,color){
  const vals=values.filter(v=>v!==null&&v!==undefined&&!isNaN(v));
  if(vals.length<2)return"";
  const W=56,H=18,P=2;
  const min=Math.min(...vals),max=Math.max(...vals);
  const range=max-min||1;
  const pts=vals.map((v,i)=>{
    const x=P+(i/(vals.length-1))*(W-P*2);
    const y=H-P-((v-min)/range)*(H-P*2);
    return`${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const trend=vals[vals.length-1]>=vals[0];
  const c=color||(trend?"var(--ok-line)":"var(--danger-line)");
  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;margin:4px auto 0"><polyline points="${pts}" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity=".85"/></svg>`;
}

// ---- Field collection ----
function collectTo(b){
  const gv=id=>{const e=document.getElementById(id);return e?e.value:null;};
  const cn=gv("f-coverage");if(cn!==null)b.plan.coverageNotes=cn;
  document.querySelectorAll("[data-ri]").forEach(el=>{
    const i=parseInt(el.dataset.ri),k=el.dataset.field;
    if(!b.routes[i])return;
    if(el.tagName==="SELECT"&&(el.value==="__manual__"||el.value==="__manual2__"||el.value==="__clear__"))return;
    if(k==="missed"||k==="assets"||k==="locations"||k==="missedRestocks"||k==="emptyCoils"||k==="spoils"||k==="shrink")b.routes[i][k]=el.value===""?"":(parseInt(el.value)||0);
    else if(k==="secondDriver"&&el.tagName==="INPUT")b.routes[i].secondDriver=el.value;
    else if(k==="thirdDriver"&&el.tagName==="INPUT")b.routes[i].thirdDriver=el.value;
    else if(k!=="secondDriver"&&k!=="thirdDriver")b.routes[i][k]=el.value;
  });
  b.routes.forEach(r=>{if(!r.totes)r.totes={candy:"no",freezer:"no",cooler:"no",dock:"no"};});
  if(b.checkInStatus==="not_started")b.checkInStatus="in_progress";
}
function qW(b){
  persistLocal();
  if(st.syncStatus!=="live"||!fb.modules||!fb.db)return;
  const branchAtQueue=st.branch;
  clearTimeout(wt);
  wt=setTimeout(async()=>{
    if(!fb.modules||!fb.db)return;
    const{doc,setDoc}=fb.modules;
    try{await setDoc(doc(fb.db,BRANCHES[branchAtQueue].collection,b.date),{...b,lastEditedAt:new Date().toISOString(),lastEditedBy:st.managerName||""});}
    catch(e){console.error("qW write failed:",e.code,e.message);persistLocal();}
  },700);
}

window.copyB=async function(key){
  const b=st.briefings[key];if(!b)return;
  const s=bStats(b);const late=b.routes.filter(r=>r.status==="no");const relief=b.routes.filter(r=>r.driverType!=="assigned"&&r.driver);
  let txt=`${activeBranch().label.toUpperCase()} - MORNING BRIEFING\n${fmtL(key)}\nBriefing Status: ${RSL[b.checkInStatus]||""}\n${"━".repeat(32)}\n\n`;
  txt+=`KPIs\n• On-Time Delivery: ${s.otPct===null?"—":s.otPct+"%"}\n• Avg Safety Score: ${s.avgSafety===null?"—":s.avgSafety}\n• Missed Services: ${s.totalMissed}\n• Services Pushed: ${s.pushed}\n• Assets Scheduled: ${s.totalAssets||"—"}\n• Locations Scheduled: ${s.totalLocs||"—"}\n• Routes Finished: ${s.finished}/${b.routes.length}\n\n`;
  if(s.hasTotes)txt+=`TOTES TAKEN (# of routes)\n• Candy: ${s.totes.candy}  • Freezer: ${s.totes.freezer}  • Cooler: ${s.totes.cooler}  • Dock: ${s.totes.dock}\n\n`;
  if(late.length||s.totalMissed>0){
    txt+=`FLAGS\n`;late.forEach(r=>txt+=`• ${r.id} (${r.driver}) — late\n`);
    b.routes.filter(r=>(parseInt(r.missed)||0)>0).forEach(r=>txt+=`• ${r.id} (${r.driver}) — ${r.missed} missed\n`);
    txt+=`\n`;
  }
  const pto=b.routes.filter(r=>r.status==="pto").map(r=>r.assignedDriver);
  const co=b.routes.filter(r=>r.status==="callout").map(r=>r.assignedDriver);
  const nc=b.routes.filter(r=>r.status==="ncns").map(r=>r.assignedDriver);
  if(pto.length||co.length||nc.length||relief.length||b.plan.coverageNotes){
    txt+=`PLAN\n`;if(pto.length)txt+=`PTO: ${pto.join(", ")}\n`;if(co.length)txt+=`Call Out: ${co.join(", ")}\n`;if(nc.length)txt+=`NCNS: ${nc.join(", ")}\n`;
    if(relief.length)txt+=`Coverage:\n`+relief.map(r=>`  ${r.driver} → ${r.id} (${TL[r.driverType]})`).join("\n")+"\n";
    if(b.plan.coverageNotes)txt+=`Notes: ${b.plan.coverageNotes}\n`;txt+=`\n`;
  }
  txt+=`ROUTE STATUS\n`;
  b.routes.forEach(r=>{
    const t=r.totes||{};
    const meta=[];
    if(r.assets!==""&&r.assets!=null)meta.push(`${r.assets}a`);if(r.locations!==""&&r.locations!=null)meta.push(`${r.locations}l`);
    if((parseInt(r.missed)||0)>0)meta.push(`${r.missed}m`);if(r.pushed==="yes")meta.push("pushed");
    if((parseInt(r.missedRestocks)||0)>0)meta.push(`${r.missedRestocks}mr`);
    if((parseInt(r.emptyCoils)||0)>0)meta.push(`${r.emptyCoils}ec`);
    if((parseFloat(r.spoils)||0)>0){const rv=parseMoney(r.revenue?.vending)+parseMoney(r.revenue?.market)+parseMoney(r.revenue?.ocs);const pct=rv>0?(parseFloat(r.spoils)/rv*100).toFixed(1)+"% rev":"$"+r.spoils;meta.push(`spoils ${pct}`);}
    if((parseFloat(r.shrink)||0)!==0){const rv=parseMoney(r.revenue?.vending)+parseMoney(r.revenue?.market)+parseMoney(r.revenue?.ocs);const sh=parseFloat(r.shrink);const pct=rv>0?(Math.abs(sh)/rv*100).toFixed(1)+"% rev":"$"+Math.abs(sh);meta.push(`shrink ${sh<0?"-":""}${pct}`);}
    const tor=calcTimeOnRoute(r.timeStarted,r.timeFinished);if(tor)meta.push(tor);
    const tpa=calcTimePerAsset(r.timeStarted,r.timeFinished,r.assets);if(tpa)meta.push(tpa);
    const tpl=calcTimePerLoc(r.timeStarted,r.timeFinished,r.locations);if(tpl)meta.push(tpl);
    const ts=[t.candy==="yes"?"🍬":"",t.freezer==="yes"?"🧊":"",t.cooler==="yes"?"❄️":"",t.dock==="yes"?"📦":""].filter(Boolean).join(" ");
    if(ts)meta.push(ts);
    const m=meta.length?` [${meta.join(" ")}]`:"";const cov=r.driverType!=="assigned"?` (${TL[r.driverType]})`:"";
    const sd2=(r.secondDriver&&r.secondDriver!=="__pending__")?` +${r.secondDriver}`:"";
    txt+=`${r.id} ${r.driver||"—"}${sd2}${cov} — ${ATT_L[r.status]} · ${RSL[r.routeStatus||"not_started"]}${m}\n`;
  });
  try{await navigator.clipboard.writeText(txt);showToast("Copied — paste in Teams");}
  catch(e){const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");showToast("Copied");}catch(e2){alert(txt);}document.body.removeChild(ta);}
};

// ---- Excel time parser ----
function parseExcelTime(val){
  if(!val&&val!==0)return"";
  // Excel serial number (e.g. 0.3125 = 7:30 AM)
  if(typeof val==="number"){
    const totalMins=Math.round((val%1)*24*60);
    const h=Math.floor(totalMins/60)%24;
    const m=totalMins%60;
    return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
  }
  if(val instanceof Date){
    // Date object — extract hours/minutes only, ignore seconds
    return String(val.getHours()).padStart(2,"0")+":"+String(val.getMinutes()).padStart(2,"0");
  }
  const s=String(val).trim();
  // "7:30:00 AM" → "07:30" | "07:30:00" → "07:30" | "07:30" → "07:30"
  const ampm=s.match(/^(\d{1,2}):(\d{2})(?::\d{2})?\s*(AM|PM)$/i);
  if(ampm){
    let h=parseInt(ampm[1]);const m=ampm[2];const ap=ampm[3].toUpperCase();
    if(ap==="AM"&&h===12)h=0;if(ap==="PM"&&h!==12)h+=12;
    return String(h).padStart(2,"0")+":"+m;
  }
  const hms=s.match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
  if(hms)return String(parseInt(hms[1])).padStart(2,"0")+":"+hms[2];
  return s;
}

const ADMIN_PIN_COLLECTION="dfw_notif_subs";
const ADMIN_PIN_DOC="admin_pin";
let _cachedPinHash=null; // loaded from Firestore on init

async function loadPinHash(){
  if(!fb.modules||!fb.db)return;
  try{
    const{doc,getDoc}=fb.modules;
    const snap=await getDoc(doc(fb.db,ADMIN_PIN_COLLECTION,ADMIN_PIN_DOC));
    if(snap.exists())_cachedPinHash=snap.data().hash||null;
  }catch(e){console.warn("Could not load admin PIN:",e.message);}
}

async function savePinHash(hash){
  if(!fb.modules||!fb.db)return false;
  try{
    const{doc,setDoc}=fb.modules;
    await setDoc(doc(fb.db,ADMIN_PIN_COLLECTION,ADMIN_PIN_DOC),{hash});
    _cachedPinHash=hash;
    return true;
  }catch(e){console.warn("Could not save admin PIN:",e.message);return false;}
}

function hashPin(pin){
  let h=5381;for(let i=0;i<pin.length;i++)h=((h<<5)+h)+pin.charCodeAt(i)>>>0;
  return h.toString(36);
}

function requirePin(onSuccess){
  const existing=document.getElementById("pin-modal");
  if(existing)existing.remove();
  const hasPin=!!_cachedPinHash;
  const modal=document.createElement("div");
  modal.id="pin-modal";
  modal.style.cssText="position:fixed;inset:0;z-index:998;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)";

    <div style="background:var(--bg);border-radius:var(--radius-xl);padding:28px 24px;max-width:320px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.3);animation:popIn .3s cubic-bezier(.34,1.56,.64,1)">
      <div style="text-align:center;margin-bottom:20px">
        <div style="width:52px;height:52px;border-radius:50%;background:var(--brand-light);display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
          <i class="ti ti-lock" style="font-size:24px;color:var(--brand)"></i>
        </div>
        <div style="font-size:18px;font-weight:800;color:var(--text);margin-bottom:6px">${hasPin?"Admin PIN Required":"Set Admin PIN"}</div>
        <div style="font-size:13px;color:var(--text-2);line-height:1.5">${hasPin?"Revenue &amp; budget imports are restricted.":"Create a PIN — only you will know it."}</div>
      </div>
      <input id="pin-input" type="password" inputmode="numeric" maxlength="8" placeholder="${hasPin?"Enter PIN":"Choose a PIN (min 4 digits)"}" style="text-align:center;font-size:22px;letter-spacing:6px;margin-bottom:10px;border:2px solid var(--border-2);border-radius:var(--radius-md);padding:12px;background:var(--bg);color:var(--text);width:100%">
      <div id="pin-error" style="color:var(--danger-text);font-size:12px;text-align:center;min-height:18px;margin-bottom:10px"></div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button id="pin-submit" onclick="submitPin()" style="background:var(--brand);color:#fff;border:none;border-radius:var(--radius-lg);padding:14px;font-size:15px;font-weight:800;cursor:pointer;width:100%">${hasPin?"Unlock":"Set PIN &amp; Continue"}</button>
        <button onclick="document.getElementById('pin-modal').remove()" style="background:var(--bg-2);color:var(--text-2);border:1.5px solid var(--border-2);border-radius:var(--radius-lg);padding:13px;font-size:14px;font-weight:600;cursor:pointer;width:100%">Cancel</button>
      </div>
    </div>`;
  modal.addEventListener("keydown",e=>{if(e.key==="Enter")submitPin();});
  document.body.appendChild(modal);
  setTimeout(()=>document.getElementById("pin-input")?.focus(),100);
  window._pinSuccess=onSuccess;
}

window.submitPin=async function(){
  const inp=document.getElementById("pin-input");
  const err=document.getElementById("pin-error");
  const pin=(inp?.value||"").trim();
  if(!pin||pin.length<4){err.textContent="PIN must be at least 4 digits.";return;}
  const btn=document.getElementById("pin-submit");
  btn.textContent="Checking…";btn.disabled=true;
  if(!_cachedPinHash){
    // First time — save to Firestore
    const ok=await savePinHash(hashPin(pin));
    document.getElementById("pin-modal")?.remove();
    if(ok){showToast("Admin PIN set — imports unlocked");if(window._pinSuccess)window._pinSuccess();render();}
    else showToast("⚠ Could not save PIN — check Firebase connection");
  } else {
    if(hashPin(pin)===_cachedPinHash){
      document.getElementById("pin-modal")?.remove();
      if(window._pinSuccess)window._pinSuccess();
    } else {
      err.textContent="Incorrect PIN.";
      inp.value="";btn.textContent="Unlock";btn.disabled=false;
      inp.style.borderColor="var(--danger-text)";inp.focus();
      setTimeout(()=>{inp.style.borderColor="var(--border-2)";},800);
    }
  }
};

window.importRevenueXL=function(){requirePin(()=>{_importRevenueXL();});};
window._importRevenueXL=function(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".xlsx,.xls,.csv";
  inp.onchange=async(e)=>{
    const f=e.target.files[0];if(!f)return;
    try{
      const ab=await f.arrayBuffer();
      const wb=XLSX.read(ab,{type:"array",cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
      let updated=0,skipped=0,overflow=0,failedWrites=0;
      const skipReasons={noDate:0,noBranch:0};
      const affected=new Set();
      const affectedDates=new Map();
      function toDateKey(val){
        if(val instanceof Date){const d=new Date(val.getTime()+val.getTimezoneOffset()*60000);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
        const s=String(val||"").trim();
        if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
        const p=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
        if(p){const y=p[3].length===2?"20"+p[3]:p[3];return y+"-"+p[1].padStart(2,"0")+"-"+p[2].padStart(2,"0");}
        return null;
      }
      rows.forEach(row=>{
        const dk=toDateKey(row["Date"]);
        if(!dk){skipped++;skipReasons.noDate++;return;}
        const branchCol=String(row["Branch"]||"").trim();
        let bid=st.branch;
        if(branchCol){
          const found=Object.entries(BRANCHES).find(([id,b])=>b.label.toLowerCase()===branchCol.toLowerCase()||id===branchCol.toLowerCase());
          if(found)bid=found[0];
          else{skipped++;skipReasons.noBranch++;if(Object.keys(skipReasons).length<10)skipReasons[branchCol]=(skipReasons[branchCol]||0)+1;return;}
        }
        if(!st.branchBriefings[bid])st.branchBriefings[bid]={};
        const brf=st.branchBriefings[bid];
        // If no briefing exists for this date, create a minimal one to hold revenue
        // (safe because there's no existing route/operational data to overwrite)
        if(!brf[dk]){
          brf[dk]={date:dk,checkInStatus:"not_started",plan:{coverageNotes:""},routes:[],revenue:{vending:"",market:"",ocs:""},revenueOverflow:{},published:false,publishedAt:null,lastEditedAt:null,lastEditedBy:""};
        }
        const b=brf[dk];
        if(!b.revenue)b.revenue={vending:"",market:"",ocs:""};
        const pM=v=>{const n=parseFloat(String(v||"").replace(/[$,]/g,""));return isNaN(n)?"":n;};
        // Support both wide format (Vending/Market/OCS columns) and tall format (Line of Business + Revenue columns)
        const lob=String(row["Line of Business"]||row["LOB"]||row["Business Line"]||row["Category"]||"").trim().toLowerCase();
        const rawRev=pM(row["Revenue"]||row["Pretax Revenue"]||row["Net Revenue"]||row["Amount"]||row["Total"]||"");
        let v=pM(row["Vending"]||row["Vending Revenue"]||row["vending"]||row["VENDING"]||"");
        let m=pM(row["Market"]||row["Market Revenue"]||row["market"]||row["MARKET"]||"");
        let o=pM(row["OCS"]||row["OCS Revenue"]||row["ocs"]||row["OCS/Delivery"]||row["Delivery"]||row["delivery"]||row["DELIVERY"]||row["Office Coffee"]||"");
        // If tall format, map the single revenue value to the right category
        if(rawRev!==""&&lob){
          if(lob.includes("vend"))v=rawRev;
          else if(lob.includes("market")||lob.includes("fresh"))m=rawRev;
          else if(lob.includes("ocs")||lob.includes("deliver")||lob.includes("office")||lob.includes("coffee"))o=rawRev;
        }
        const routeId=String(row["Route"]||row["Route ID"]||row["route"]||row["ROUTE"]||"").trim();
        if(routeId){
          // Per-route revenue — find matching route
          // Clear legacy branch-level revenue to prevent double-counting
          b.revenue={vending:"",market:"",ocs:""};
          // Clear overflow for this date on first route processed (import is authoritative)
          if(!b._revImportCleared){b.revenueOverflow={};b._revImportCleared=true;}
          const rIdx=b.routes?b.routes.findIndex(r=>r.id===routeId):-1;
          if(rIdx>=0){
            // Reset all revenue fields first — import file is the source of truth
            b.routes[rIdx].revenue={vending:"",market:"",ocs:""};
            if(v!=="")b.routes[rIdx].revenue.vending=v;
            if(m!=="")b.routes[rIdx].revenue.market=m;
            if(o!=="")b.routes[rIdx].revenue.ocs=o;
          } else {
            // Route not in today's list — store in overflow so totals still count
            if(!b.revenueOverflow)b.revenueOverflow={};
            if(!b.revenueOverflow[routeId])b.revenueOverflow[routeId]={vending:"",market:"",ocs:""};
            if(v!=="")b.revenueOverflow[routeId].vending=v;
            if(m!=="")b.revenueOverflow[routeId].market=m;
            if(o!=="")b.revenueOverflow[routeId].ocs=o;
            overflow++;
          }
        } else {
          // No route specified — branch-level (legacy/aggregate)
          if(v!=="")b.revenue.vending=v;
          if(m!=="")b.revenue.market=m;
          if(o!=="")b.revenue.ocs=o;
        }
        if(bid===st.branch)st.briefings=st.branchBriefings[bid];
        if(!affectedDates.has(bid))affectedDates.set(bid,new Set());
        affectedDates.get(bid).add(dk);
        affected.add(bid);updated++;
      });
      // Pause listeners during import to prevent Firestore overwriting clean data
      const wasLive=st.syncStatus==="live";
      if(wasLive&&fb.unsubBranches){fb.unsubBranches.forEach(u=>u());fb.unsubBranches=null;}

      // Collect all write promises — only resubscribe AFTER every write has landed
      const allWrites=[];
      affected.forEach(bid=>{
        try{localStorage.setItem(BRANCHES[bid].storeKey,JSON.stringify(st.branchBriefings[bid]));}catch(ex){}
        if(wasLive&&fb.modules){
          const changedDates=affectedDates.get(bid)||new Set();
          changedDates.forEach(dk=>{
            const b=st.branchBriefings[bid][dk];
            if(b){delete b._revImportCleared;allWrites.push(writeB(b,bid).catch(e=>{failedWrites++;throw e;}));}
          });
        }
      });
      st.briefings=st.branchBriefings[st.branch]||{};
      const skipDetail=skipReasons.noDate>0?` (${skipReasons.noDate} bad date${skipReasons.noBranch>0?`, ${skipReasons.noBranch} unknown branch`:""})`
        :skipReasons.noBranch>0?` (${skipReasons.noBranch} unknown branch)`:"";
      render();showToast("Revenue imported for "+updated+" day"+(updated!==1?"s":"")+(overflow?" · "+overflow+" unlisted routes stored":"")+(skipped?" · "+skipped+" skipped"+skipDetail:"")+" · syncing…");
      if(skipReasons.noBranch>0){
        const unknowns=Object.entries(skipReasons).filter(([k])=>!["noDate","noBranch"].includes(k)).map(([k,v])=>`"${k}" (${v})`).join(", ");
        if(unknowns)console.warn("Unrecognized branch names in import:",unknowns);
      }

      // Resubscribe only after ALL writes have landed in Firestore
      if(wasLive){
        Promise.allSettled(allWrites).then(()=>{
          if(fb.modules&&fb.db){subAllBranches();}
          const msg=failedWrites>0
            ?`⚠ ${failedWrites} write${failedWrites!==1?"s":""} failed — check Firestore rules`
            :`Sync complete — ${allWrites.length} document${allWrites.length!==1?"s":""} written`;
          showToast(msg);
        });
      }
    }catch(err){console.error(err);alert("Revenue import failed: "+(err.message||err));}
  };
  inp.click();
};

      const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{defval:""});
      if(!rows.length){showToast("No data found");return;}

      // ---- PARSE PHASE — build preview, don't touch state ----
      const ATT_REV={};Object.entries(ATT_L).forEach(([k,v])=>{ATT_REV[v.toLowerCase()]=k;});
      const RS_REV={};Object.entries(RSL).forEach(([k,v])=>{RS_REV[v.toLowerCase()]=k;});

      function routeToBranch(id){
        if(!id)return null;
        if(id.startsWith("DFW"))return"dallas";
        if(id.startsWith("SAT"))return"sanantonio";
        if(id.startsWith("AUS"))return"austin";
        if(id.startsWith("HOU"))return"houston";
        if(id.startsWith("WTX"))return"midland";
        if(id.startsWith("BAL"))return"linthicum";
        return null;
      }
      function rowToBranch(row,routeId){
        const bc=String(row["Branch"]||"").trim();
        if(bc){const found=Object.entries(BRANCHES).find(([id,b])=>b.label.toLowerCase()===bc.toLowerCase()||id===bc.toLowerCase());if(found)return found[0];}
        return routeToBranch(routeId);
      }
      function toDateKey(val){
        if(val instanceof Date){const d=new Date(val.getTime()+val.getTimezoneOffset()*60000);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
        const s=String(val||"").trim();
        if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
        const p=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
        if(p){const y=p[3].length===2?"20"+p[3]:p[3];return y+"-"+p[1].padStart(2,"0")+"-"+p[2].padStart(2,"0");}
        return null;
      }

      // Build preview list without touching state
      const preview=[]; // [{bid,dk,routeId,driver,status,routeStatus,assets,locs,missed,safety,isNew}]
      let skippedPrev=0;
      rows.forEach(row=>{
        const routeId=String(row["Route"]||"").trim();
        const dk=toDateKey(row["Date"]);
        if(!routeId||!dk){skippedPrev++;return;}
        const bid=rowToBranch(row,routeId);
        if(!bid){skippedPrev++;return;}
        const brf=st.branchBriefings[bid]||{};
        const b=brf[dk];
        const existingRoute=b?.routes?.find(rt=>rt.id===routeId||rt.id.toLowerCase()===routeId.toLowerCase());
        const g=col=>{const v=row[col];return(v===undefined||v===null||v==="")?"":String(v).trim();};
        const numOr=col=>{const n=parseFloat(g(col));return isNaN(n)?null:n;};
        const fltOr=col=>{const n=parseFloat(g(col));return isNaN(n)?null:n;};
        const attRaw=g("Attendance")||g("Driver Attendance")||g("Status")||"";
        const rsRaw=g("Route Status")||"";
        const driver=g("Today's Driver")||g("Driver")||"";
        const assets=numOr("Assets Scheduled")||numOr("Assets")||null;
        const locs=numOr("Locations Scheduled")||numOr("Locations")||null;
        const missed=numOr("Missed Services")||numOr("Missed")||null;
        const safety=fltOr("Safety Score")||fltOr("Safety")||null;
        const status=ATT_REV[attRaw.toLowerCase()]||null;
        const routeStatus=RS_REV[rsRaw.toLowerCase()]||null;
        const hasData=driver||assets!==null||locs!==null||missed!==null||safety!==null||status||routeStatus;
        if(!hasData){skippedPrev++;return;}
        preview.push({bid,dk,routeId,driver,status,routeStatus,assets,locs,missed,safety,isNew:!existingRoute,branchLabel:BRANCHES[bid].label});
      });

      if(!preview.length){showToast("Nothing to import — all rows empty or unrecognized");return;}

      // ---- PREVIEW MODAL ----
      // Group by branch → date
      const grouped={};
      preview.forEach(p=>{
        const key=p.bid;
        if(!grouped[key])grouped[key]={label:p.branchLabel,dates:{}};
        if(!grouped[key].dates[p.dk])grouped[key].dates[p.dk]=[];
        grouped[key].dates[p.dk].push(p);
      });

      const totalRoutes=preview.length;
      const totalBranches=Object.keys(grouped).length;
      const totalDates=new Set(preview.map(p=>p.dk)).size;
      const MAX_ROWS=60;
      let rowsShown=0;

      let tableHTML="";
      for(const [bid,branch] of Object.entries(grouped)){
        tableHTML+=`<div style="margin-bottom:16px">
          <div style="font-size:11px;font-weight:800;color:var(--brand);text-transform:uppercase;letter-spacing:.07em;padding:6px 0 4px;border-bottom:1.5px solid var(--border);margin-bottom:6px">${esc(branch.label)}</div>`;
        for(const [dk,routes] of Object.entries(branch.dates).sort()){
          const d=new Date(dk+"T12:00:00");
          const dayLabel=d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
          tableHTML+=`<div style="font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin:8px 0 4px;padding-left:6px;border-left:2px solid var(--border-2)">${dayLabel}</div>`;
          routes.forEach(r=>{
            if(rowsShown>=MAX_ROWS)return;
            rowsShown++;
            const chips=[];
            if(r.status)chips.push(`<span style="font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;background:${r.status==="yes"?"var(--ok-bg)":r.status==="no"?"var(--danger-bg)":"var(--warn-bg)"};color:${r.status==="yes"?"var(--ok-text)":r.status==="no"?"var(--danger-text)":"var(--warn-text)"}">${ATT_L[r.status]||r.status}</span>`);
            if(r.routeStatus)chips.push(`<span style="font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;background:var(--bg-3);color:var(--text-2)">${RSL[r.routeStatus]||r.routeStatus}</span>`);
            if(r.assets!==null)chips.push(`<span style="font-size:10px;color:var(--text-3)">${r.assets}a</span>`);
            if(r.locs!==null)chips.push(`<span style="font-size:10px;color:var(--text-3)">${r.locs}l</span>`);
            if(r.missed!==null&&r.missed>0)chips.push(`<span style="font-size:10px;color:var(--danger-text);font-weight:700">${r.missed} missed</span>`);
            if(r.safety!==null)chips.push(`<span style="font-size:10px;color:var(--text-3)">safety ${r.safety}</span>`);
            tableHTML+=`<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 6px;border-bottom:0.5px solid var(--border);${r.isNew?"background:var(--ok-bg);border-radius:var(--radius-md);margin-bottom:2px":""}">
              ${r.isNew?`<span style="font-size:9px;font-weight:800;color:var(--ok-text);background:var(--ok-bg);padding:2px 5px;border-radius:8px;flex-shrink:0;margin-top:2px">NEW</span>`:`<span style="width:26px;flex-shrink:0"></span>`}
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                  <span style="color:var(--text-3);font-size:10px;letter-spacing:.04em">${esc(r.routeId)}</span>
                  ${r.driver?`<span style="color:var(--text)">${esc(r.driver)}</span>`:""}
                </div>
                ${chips.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px">${chips.join("")}</div>`:""}
              </div>
            </div>`;
          });
        }
        tableHTML+="</div>";
      }
      const overflow=totalRoutes-rowsShown;

      const modal=document.createElement("div");
      modal.id="bulk-preview-modal";
      modal.style.cssText="position:fixed;inset:0;z-index:998;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)";
      modal.innerHTML=`
        <div style="background:var(--bg);border-radius:var(--radius-xl) var(--radius-xl) 0 0;width:100%;max-width:540px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 -12px 48px rgba(0,0,0,.22);animation:slideUp .3s cubic-bezier(.2,.8,.3,1)">
          <!-- Header -->
          <div style="padding:20px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px">
              <div>
                <div style="font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.2px">Preview Import</div>
                <div style="font-size:12px;color:var(--text-2);margin-top:3px">Review changes before they're applied</div>
              </div>
              <button onclick="document.getElementById('bulk-preview-modal').remove()" style="padding:6px;border:none;background:var(--bg-2);border-radius:50%;color:var(--text-2);font-size:18px;flex-shrink:0;line-height:1;min-width:32px;height:32px;display:flex;align-items:center;justify-content:center"><i class="ti ti-x"></i></button>
            </div>
            <div style="display:flex;gap:8px">
              <div style="flex:1;background:var(--bg-2);border-radius:var(--radius-md);padding:8px;text-align:center;border:1px solid var(--border)">
                <div style="font-size:18px;font-weight:800;color:var(--brand)">${totalRoutes}</div>
                <div style="font-size:10px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.05em">Routes</div>
              </div>
              <div style="flex:1;background:var(--bg-2);border-radius:var(--radius-md);padding:8px;text-align:center;border:1px solid var(--border)">
                <div style="font-size:18px;font-weight:800;color:var(--text)">${totalDates}</div>
                <div style="font-size:10px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.05em">Days</div>
              </div>
              <div style="flex:1;background:var(--bg-2);border-radius:var(--radius-md);padding:8px;text-align:center;border:1px solid var(--border)">
                <div style="font-size:18px;font-weight:800;color:var(--text)">${totalBranches}</div>
                <div style="font-size:10px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.05em">Branches</div>
              </div>
              ${skippedPrev>0?`<div style="flex:1;background:var(--warn-bg);border-radius:var(--radius-md);padding:8px;text-align:center;border:1px solid var(--warn-border)">
                <div style="font-size:18px;font-weight:800;color:var(--warn-text)">${skippedPrev}</div>
                <div style="font-size:10px;color:var(--warn-text);font-weight:700;text-transform:uppercase;letter-spacing:.05em">Skipped</div>
              </div>`:""}
            </div>
          </div>
          <!-- Scrollable route list -->
          <div style="flex:1;overflow-y:auto;padding:14px 20px">
            <div style="font-size:10px;color:var(--text-3);margin-bottom:10px;display:flex;align-items:center;gap:6px">
              <span style="display:inline-flex;align-items:center;gap:3px;background:var(--ok-bg);color:var(--ok-text);padding:2px 7px;border-radius:8px;font-weight:800;font-size:9px">NEW</span>
              = route not currently in briefing
            </div>
            ${tableHTML}
            ${overflow>0?`<div style="text-align:center;padding:12px;font-size:12px;color:var(--text-3);font-weight:600">…and ${overflow} more route${overflow!==1?"s":""} not shown</div>`:""}
          </div>
          <!-- Action buttons -->
          <div style="padding:14px 20px calc(max(env(safe-area-inset-bottom),14px));border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0">
            <button onclick="document.getElementById('bulk-preview-modal').remove()" style="flex:1;background:var(--bg-2);color:var(--text);border:1.5px solid var(--border-2);border-radius:var(--radius-lg);padding:14px;font-size:14px;font-weight:700;cursor:pointer">Cancel</button>
            <button onclick="confirmBulkImport()" style="flex:2;background:var(--brand);color:#fff;border:none;border-radius:var(--radius-lg);padding:14px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 3px 12px rgba(199,58,13,.35)"><i class="ti ti-check" style="margin-right:6px"></i>Confirm — Import ${totalRoutes} Routes</button>
          </div>
        </div>`;
      document.body.appendChild(modal);

      // Store parsed rows for use after confirmation
      window._pendingBulkRows=rows;
      window._pendingBulkHelpers={ATT_REV,RS_REV,routeToBranch,rowToBranch,toDateKey};

    }catch(err){console.error(err);alert("Preview failed: "+(err.message||err));}
  };
  inp.click();
};

window.confirmBulkImport=async function(){
  const modal=document.getElementById("bulk-preview-modal");
  if(modal){
    // Swap buttons to loading state
    const btn=modal.querySelector("button:last-child");
    if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2" style="animation:spin .8s linear infinite"></i> Importing…';}
  }

  const rows=window._pendingBulkRows||[];
  const{ATT_REV,RS_REV,routeToBranch,rowToBranch,toDateKey}=window._pendingBulkHelpers||{};
  if(!rows.length){modal?.remove();return;}

  // ---- WRITE PHASE (same logic as before) ----
  try{
  const wasLiveBulk=st.syncStatus==="live";
  if(wasLiveBulk&&fb.unsubBranches){fb.unsubBranches.forEach(u=>u());fb.unsubBranches=null;}

  let updated=0,skipped=0;
  const affected=new Set();
  const affectedDates=new Map();

      rows.forEach(row=>{
        const routeId=String(row["Route"]||"").trim();
        const dk=toDateKey(row["Date"]);
        if(!routeId||!dk){skipped++;return;}
        const bid=rowToBranch(row,routeId);
        if(!bid){skipped++;return;}

        if(!st.branchBriefings[bid])st.branchBriefings[bid]={};
        const brf=st.branchBriefings[bid];
        if(!brf[dk])brf[dk]=freshBriefingForBranch(dk,bid);
        const b=brf[dk];
        if(!b.revenue)b.revenue={vending:"",market:"",ocs:""};
        b.routes.forEach(r=>{if(!r.totes)r.totes={candy:"no",freezer:"no",cooler:"no",dock:"no"};if(r.timeStarted===undefined)r.timeStarted="";if(r.timeFinished===undefined)r.timeFinished="";if(r.missedRestocks===undefined)r.missedRestocks=0;if(r.emptyCoils===undefined)r.emptyCoils=0;if(r.spoils===undefined)r.spoils=0;if(r.shrink===undefined)r.shrink=0;});
        if(bid===st.branch)st.briefings=st.branchBriefings[bid];

        // Case-insensitive route match first
        let r=b.routes.find(rt=>rt.id===routeId)||b.routes.find(rt=>rt.id.toLowerCase()===routeId.toLowerCase());
        if(!r){
          // Route not in daily list — create an ad-hoc entry so historical data is preserved
          const g2=col=>{const v=row[col];return(v===undefined||v===null)?null:String(v).trim();};
          const flt2=col=>{const v=parseFloat(g2(col));return isNaN(v)?null:v;};
          const sp2=flt2("Spoils"),sh2=flt2("Shrink");
          const hasAnyData=sp2!==null||sh2!==null||g2("Assets Scheduled")||g2("Locations Scheduled")||g2("Missed Services")||g2("Route Status")||g2("Safety Score");
          if(hasAnyData){
            // Create ad-hoc route entry on the briefing so this data isn't lost
            const adhoc={id:routeId,driver:g2("Today's Driver")||"",status:"yes",routeStatus:"finished",
              secondDriver:"",thirdDriver:"",totes:{candy:"no",freezer:"no",cooler:"no",dock:"no"},
              missed:0,missedRestocks:0,emptyCoils:0,spoils:0,shrink:0,pushed:"na",
              assets:g2("Assets Scheduled")||"",locations:g2("Locations Scheduled")||"",
              safetyScore:"",timeStarted:"",timeFinished:"",revenue:{vending:"",market:"",ocs:""},
              isAdHoc:true};
            b.routes.push(adhoc);
            r=adhoc;
          } else if(sp2!==null||sh2!==null){
            if(!b.spoilsShrinkOverflow)b.spoilsShrinkOverflow={};
            if(!b.spoilsShrinkOverflow[routeId])b.spoilsShrinkOverflow[routeId]={spoils:0,shrink:0};
            if(sp2!==null)b.spoilsShrinkOverflow[routeId].spoils=sp2;
            if(sh2!==null)b.spoilsShrinkOverflow[routeId].shrink=sh2;
          } else {
            skipped++;
          }
          if(!r){
            if(!affectedDates.has(bid))affectedDates.set(bid,new Set());
            affectedDates.get(bid).add(dk);
            affected.add(bid);updated++;
            return;
          }
        }

        const g=col=>{const v=row[col];return(v===undefined||v===null)?null:String(v).trim();};
        const numOr=col=>{const v=parseInt(g(col));return isNaN(v)?null:v;};
        const fltOr=col=>{const v=parseFloat(g(col));return isNaN(v)?null:v;};

        const att=g("Attendance");if(att){const k=ATT_REV[att.toLowerCase()];if(k)r.status=k;}
        const rs=g("Route Status");if(rs){const k=RS_REV[rs.toLowerCase()];if(k)r.routeStatus=k;}
        const td=g("Today's Driver");if(td)r.driver=td;
        const sd=g("2nd Driver");if(sd)r.secondDriver=sd;
        const dt=g("Driver Type");if(dt)r.driverType=dt.toLowerCase();
        const a=numOr("Assets Scheduled");if(a!==null)r.assets=a;
        const l=numOr("Locations Scheduled");if(l!==null)r.locations=l;
        const m=numOr("Missed Services");if(m!==null)r.missed=m;
        const mr=numOr("Missed Restocks");if(mr!==null)r.missedRestocks=mr;
        const ec=numOr("Empty Coils");if(ec!==null)r.emptyCoils=ec;
        const sp=fltOr("Spoils");if(sp!==null)r.spoils=sp;
        const sh=fltOr("Shrink");if(sh!==null)r.shrink=sh;
        const sf=fltOr("Safety Score");if(sf!==null)r.safetyScore=String(sf);
        const ts=row["Time Started"];if(ts!=null&&ts!=="")r.timeStarted=parseExcelTime(ts);
        const tf=row["Time Finished"];if(tf!=null&&tf!=="")r.timeFinished=parseExcelTime(tf);
        const pu=g("Pushed");if(pu)r.pushed=pu.toLowerCase();

        if(!affectedDates.has(bid))affectedDates.set(bid,new Set());
        affectedDates.get(bid).add(dk);
        affected.add(bid);updated++;
      });

      const bulkWrites=[];
      affected.forEach(bid=>{
        try{localStorage.setItem(BRANCHES[bid].storeKey,JSON.stringify(st.branchBriefings[bid]));}catch(e){}
        if(wasLiveBulk&&fb.modules){
          const changedDates=affectedDates.get(bid)||new Set();
          changedDates.forEach(dk=>{
            const b=st.branchBriefings[bid][dk];
            if(b)bulkWrites.push(writeB(b,bid));
          });
        }
      });
      st.briefings=st.branchBriefings[st.branch]||{};
      document.getElementById("bulk-preview-modal")?.remove();
      window._pendingBulkRows=null;window._pendingBulkHelpers=null;
      render();
      showToast("Imported "+updated+" route"+(updated!==1?"s":"")+" across "+affected.size+" branch"+(affected.size!==1?"es":"")+(skipped?" · "+skipped+" skipped":"")+" · syncing…");
      if(wasLiveBulk&&bulkWrites.length){
        Promise.allSettled(bulkWrites).then(()=>{
          if(fb.modules&&fb.db)subAllBranches();
          showToast("Sync complete — "+bulkWrites.length+" document"+(bulkWrites.length!==1?"s":"")+" written");
        });
      }
    }catch(err){console.error(err);document.getElementById("bulk-preview-modal")?.remove();alert("Import failed: "+(err.message||err));}
};

function renderRoute(r,i){

  const allTotes=t.candy==="yes"&&t.freezer==="yes"&&t.cooler==="yes"&&t.dock==="yes";const staff=branchStaff(st.branch);
  const isAbsent=ABSENCE.includes(r.status);
  const coverBadge=r.driverType!=="assigned"?`<span class="r-cover">${TL[r.driverType]}</span>`:"";
  // Collapsed summary chips
  const missedN=parseInt(r.missed)||0;
  const safetyN=r.safetyScore!==""&&r.safetyScore!=null?parseFloat(r.safetyScore):null;
  const summaryChips=!isOpen&&rs!=="not_started"?[
    missedN>0?`<span style="font-size:10px;background:var(--danger-bg);color:var(--danger-text);border-radius:4px;padding:1px 5px;font-weight:500">${missedN}m</span>`:"",
    safetyN!==null?`<span style="font-size:10px;background:var(--bg-2);color:var(--text-2);border-radius:4px;padding:1px 5px">${safetyN}</span>`:"",

    r.locations?`<span style="font-size:10px;color:var(--text-3)">${r.locations}l</span>`:""
