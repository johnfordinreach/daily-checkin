<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#D63E0E">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Daily Check-in">
<title>Daily Check-in</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#ffffff;--bg-2:#f5f4ef;--bg-3:#ecebe4;
  --text:#191917;--text-2:#5f5e5a;--text-3:#888780;
  --border:rgba(0,0,0,.07);--border-2:rgba(0,0,0,.15);
  --info-bg:#E6F1FB;--info-text:#0C447C;
  --ok-bg:#EAF3DE;--ok-text:#3B6D11;--ok-border:#C0DD97;--ok-line:#639922;
  --warn-bg:#FAEEDA;--warn-text:#854F0B;--warn-border:#FAC775;--warn-line:#EF9F27;
  --danger-bg:#FCEBEB;--danger-text:#A32D2D;--danger-border:#F7C1C1;--danger-line:#E24B4A;
  --purple-bg:#EEEDFE;--purple-text:#3C3489;
  --blue:#378ADD;
  --brand:#D63E0E;--brand-light:rgba(214,62,14,.08);
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05);
  --radius-md:10px;--radius-lg:14px;
  --font:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;
}
[data-theme="dark"]{
  --bg:#1a1a18;--bg-2:#242422;--bg-3:#2e2e2c;
  --text:#f0eee7;--text-2:#a8a69f;--text-3:#666460;
  --border:rgba(255,255,255,.08);--border-2:rgba(255,255,255,.16);
  --shadow-sm:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 12px rgba(0,0,0,.4);
  --info-bg:#0d2a47;--info-text:#7bbdf7;--ok-bg:#1a3009;--ok-text:#8fcf4e;
  --warn-bg:#3a2000;--warn-text:#f5c57a;--danger-bg:#3a0a0a;--danger-text:#f78080;
  --purple-bg:#1e1a40;--purple-text:#b0a9f5;--brand-light:rgba(214,62,14,.15);
}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
  --bg:#1a1a18;--bg-2:#242422;--bg-3:#2e2e2c;
  --text:#f0eee7;--text-2:#a8a69f;--text-3:#666460;
  --border:rgba(255,255,255,.08);--border-2:rgba(255,255,255,.16);
  --shadow-sm:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 12px rgba(0,0,0,.4);
  --info-bg:#0d2a47;--info-text:#7bbdf7;--ok-bg:#1a3009;--ok-text:#8fcf4e;
  --warn-bg:#3a2000;--warn-text:#f5c57a;--danger-bg:#3a0a0a;--danger-text:#f78080;
  --purple-bg:#1e1a40;--purple-text:#b0a9f5;--brand-light:rgba(214,62,14,.15);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;overflow-x:hidden;overscroll-behavior-x:none}
body{padding:max(env(safe-area-inset-top),16px) 16px calc(76px + max(env(safe-area-inset-bottom),8px));max-width:480px;margin:0 auto;min-height:100vh}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none;border:none;background:none;color:inherit;transition:opacity .12s}
input,select,textarea{font-family:inherit;width:100%;font-size:14px;padding:9px 12px;border:1px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(214,62,14,.12);background:var(--bg)}
textarea{height:60px;resize:none}
.app-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-top:4px;min-width:0;overflow:hidden}
.app-title{font-size:22px;font-weight:700;color:var(--brand);letter-spacing:-.3px}
.app-sub{font-size:12px;color:var(--text-2);margin-top:3px;display:flex;align-items:center;gap:6px}
.date-badge{font-size:11px;color:var(--text-2);background:var(--bg-2);padding:5px 10px;border-radius:var(--radius-md);border:1px solid var(--border);white-space:nowrap;font-weight:500}
.sync-pill{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;display:inline-flex;align-items:center;gap:4px;letter-spacing:.02em}
.sync-live{background:var(--ok-bg);color:var(--ok-text)}.sync-local{background:var(--bg-2);color:var(--text-2)}.sync-error{background:var(--danger-bg);color:var(--danger-text)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.sync-live .sync-dot{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.status-stepper{display:flex;margin-bottom:16px;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border-2);box-shadow:var(--shadow-sm)}
.status-step{flex:1;padding:10px 4px;text-align:center;font-size:12px;color:var(--text-2);background:var(--bg-2);cursor:pointer;border-right:1px solid var(--border-2);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:52px;justify-content:center}
.status-step:last-child{border-right:none}
.status-step i{font-size:18px}
.ss-ns{background:var(--danger-bg);color:var(--danger-text);font-weight:600}
.ss-ip{background:var(--warn-bg);color:var(--warn-text);font-weight:600}
.ss-fn{background:var(--ok-bg);color:var(--ok-text);font-weight:600}
.rs-chip{font-size:10px;padding:3px 7px;border-radius:20px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:3px;letter-spacing:.02em}
.rs-ns{background:var(--bg-3);color:var(--text-3)}.rs-ip{background:var(--warn-bg);color:var(--warn-text)}.rs-fn{background:var(--ok-bg);color:var(--ok-text)}
.sb-ns{background:var(--danger-bg);color:var(--danger-text)}.sb-ip{background:var(--warn-bg);color:var(--warn-text)}.sb-fn{background:var(--ok-bg);color:var(--ok-text)}
.status-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.section{margin-bottom:18px}
.section-lbl{font-size:11px;font-weight:700;color:var(--text-2);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;display:block;padding-left:10px;border-left:3px solid var(--brand)}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;box-shadow:var(--shadow-sm)}
.field{margin-bottom:12px}.field:last-child{margin-bottom:0}
.field-lbl{font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
.two-col{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.four-col{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}
.route-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .15s,border-color .15s}
.route-card:has(.route-body.open){box-shadow:var(--shadow-md);border-color:var(--border-2)}
.route-head{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;user-select:none;min-height:52px;transition:background .1s}
.route-head:active{background:var(--bg-2)}
.r-id{font-size:10px;font-weight:700;color:var(--text-3);min-width:48px;flex-shrink:0;letter-spacing:.04em}
.r-driver{font-size:14px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.r-cover{font-size:10px;font-weight:700;color:var(--purple-text);background:var(--purple-bg);padding:2px 6px;border-radius:20px;flex-shrink:0;letter-spacing:.02em}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sdot-yes{background:var(--ok-line)}.sdot-no{background:var(--danger-line)}.sdot-out{background:var(--warn-line)}.sdot-open{background:var(--text-3)}
.chev{font-size:16px;color:var(--text-3);transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.route-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.route-body.open{display:block}
.divider{height:1px;background:var(--border);margin:12px 0}
.toggle-row{display:flex;gap:3px;background:var(--bg-2);border-radius:var(--radius-md);padding:3px;border:1px solid var(--border)}
.toggle-btn{flex:1;padding:8px 4px;font-size:12px;color:var(--text-2);border-radius:8px;transition:all .15s;min-height:32px;font-weight:500}
.t-on{background:var(--bg);color:var(--text);font-weight:700;box-shadow:var(--shadow-sm)}
.t-ns{background:var(--danger-bg);color:var(--danger-text);font-weight:700}
.t-ip{background:var(--warn-bg);color:var(--warn-text);font-weight:700}
.t-fn{background:var(--ok-bg);color:var(--ok-text);font-weight:700}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--brand);color:#fff;border-radius:var(--radius-lg);padding:15px;font-size:15px;font-weight:700;min-height:52px;box-shadow:0 2px 8px rgba(214,62,14,.3),0 1px 2px rgba(0,0,0,.1);letter-spacing:.01em;transition:transform .1s,box-shadow .1s}
.btn-primary:active{transform:scale(.98);box-shadow:0 1px 4px rgba(214,62,14,.25)}
.btn-sec{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--bg-2);color:var(--text);border:1px solid var(--border-2);border-radius:var(--radius-md);padding:10px 14px;font-size:13px;min-height:40px;flex:1;font-weight:500;box-shadow:var(--shadow-sm)}
.btn-sec:active{opacity:.8}
.btn-danger{background:var(--danger-bg);color:var(--danger-text);border-color:var(--danger-border)}
.kpi-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:18px}
.kpi{background:var(--bg-2);border-radius:var(--radius-lg);padding:14px 12px;text-align:center;border:1px solid var(--border)}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--text-3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.kpi-val{font-size:26px;font-weight:700;letter-spacing:-.5px}
.kpi-delta{font-size:11px;margin-top:4px;font-weight:500}
.kv-s{color:var(--ok-text)}.kv-w{color:var(--warn-text)}.kv-d{color:var(--danger-text)}
.alert-box{background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--radius-md);padding:12px;margin-bottom:14px}
.alert-title{font-size:12px;font-weight:700;color:var(--danger-text);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.alert-item{font-size:13px;color:var(--danger-text);margin:3px 0}
.ok-box{background:var(--ok-bg);border:1px solid var(--ok-border);border-radius:var(--radius-md);padding:12px;margin-bottom:14px;font-size:13px;color:var(--ok-text);display:flex;align-items:center;gap:8px}
.info-box{background:var(--info-bg);border:1px solid rgba(12,68,124,.15);border-radius:var(--radius-md);padding:12px;margin-bottom:14px;font-size:12px;color:var(--info-text);line-height:1.5}
.warn-box{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-md);padding:12px;margin-bottom:14px;font-size:12px;color:var(--warn-text);line-height:1.5}
.plan-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.plan-row{display:flex;gap:8px;margin-bottom:8px;font-size:13px;align-items:flex-start}
.plan-row:last-child{margin-bottom:0}
.plan-lbl{color:var(--text-2);min-width:66px;padding-top:2px;flex-shrink:0;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.plan-val{line-height:1.55;flex:1;font-size:13px}
.pill{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;margin:2px 3px 2px 0;font-weight:600}
.p-pto{background:var(--info-bg);color:var(--info-text)}.p-ncns{background:var(--danger-bg);color:var(--danger-text)}.p-callout{background:var(--warn-bg);color:var(--warn-text)}.p-relief{background:var(--purple-bg);color:var(--purple-text)}
.totes-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.totes-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-top:10px}
.tote-cell{text-align:center;background:var(--bg-2);border-radius:var(--radius-md);padding:10px 4px;border:1px solid var(--border)}
.tote-val{font-size:20px;font-weight:700}
.tote-lbl{font-size:10px;color:var(--text-2);margin-top:2px;font-weight:600}
.rrow{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;box-shadow:var(--shadow-sm)}
.rrow-left{flex:1;min-width:0}
.rrow-id{font-size:10px;font-weight:700;color:var(--text-3);letter-spacing:.04em}
.rrow-driver{font-size:14px;font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.rrow-meta{font-size:11px;color:var(--text-2);margin-top:3px;line-height:1.7}
.rrow-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;padding-top:2px}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.c-yes{background:var(--ok-bg);color:var(--ok-text)}.c-no{background:var(--danger-bg);color:var(--danger-text)}.c-out{background:var(--warn-bg);color:var(--warn-text)}.c-open{background:var(--bg-2);color:var(--text-2)}
.absence-banner{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-md);padding:10px;margin-bottom:10px;font-size:12px;color:var(--warn-text)}
.actions-row{display:flex;gap:8px;margin-bottom:8px}
.saved-note{font-size:11px;color:var(--text-2);text-align:center;margin-top:6px}
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:var(--bg);padding:11px 20px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .25s ease;z-index:100;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,.2);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.footer-note{font-size:11px;color:var(--text-3);text-align:center;margin-top:20px;padding-top:14px;border-top:1px solid var(--border);line-height:1.5}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 0 max(env(safe-area-inset-bottom),6px);z-index:50;max-width:480px;margin:0 auto}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;color:var(--text-3);font-size:10px;font-weight:500;background:none;border:none;min-height:48px;transition:color .15s}
.nav-btn i{font-size:22px;transition:transform .15s}
.nav-btn.active{color:var(--brand)}
.nav-btn.active i{color:var(--brand);transform:scale(1.1)}
.nav-brand{display:none}
.nav-content{padding-bottom:8px}
@media(min-width:768px){
  html,body{height:100%}
  body{padding:36px 52px 36px calc(272px + 52px);max-width:none;margin:0}
  .nav-bar{top:0;bottom:0;left:0;right:auto;width:272px;flex-direction:column;align-items:stretch;justify-content:flex-start;border-top:none;border-right:1px solid var(--border);padding:0 12px 24px;gap:2px;max-width:none;overflow-y:auto;background:var(--bg-2)}
  .nav-brand{display:flex;flex-direction:column;padding:0 10px 20px;border-bottom:1px solid var(--border);margin-bottom:12px;border-top:4px solid var(--brand);padding-top:20px}
  .nav-brand-logo{width:72px;height:72px;border-radius:14px;object-fit:cover;margin-bottom:12px;box-shadow:var(--shadow-md)}
  .nav-brand-title{font-size:15px;font-weight:800;color:var(--brand);line-height:1.3;letter-spacing:-.2px}
  .nav-brand-sub{font-size:11px;color:var(--text-2);margin-top:3px}
  .nav-btn{flex-direction:row;justify-content:flex-start;padding:10px 12px;gap:12px;font-size:14px;border-radius:var(--radius-md);min-height:44px;flex:none;width:100%;font-weight:500}
  .nav-btn i{font-size:18px}
  .nav-btn.active{background:var(--brand-light);color:var(--brand);font-weight:700}
  .nav-btn.active i{color:var(--brand);transform:none}
  .nav-content{max-width:1100px;padding-bottom:0}
  .kpi-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
  .app-title{font-size:26px}
  .app-header{margin-bottom:22px;padding-top:0}
  .toast{bottom:32px}
  .status-stepper .status-step{min-height:56px;font-size:13px}
  .status-stepper .status-step i{font-size:20px}
  .route-head{padding:14px 16px;min-height:56px}
  .route-body{padding:0 16px 16px}
  .card{padding:18px}
  .history-day{padding:14px 16px}
  .chart-card{padding:18px}
  .btn-primary{font-size:16px;padding:16px}
  .plan-card{padding:16px}
  .section-lbl{font-size:12px}
  .totes-card{padding:16px}
}
@media(min-width:1200px){
  body{padding:40px 64px 40px calc(272px + 64px)}
  .nav-content{max-width:1280px}
  .kpi-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
  .two-col{grid-template-columns:repeat(2,minmax(0,1fr))}
}
.history-day{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-sm);transition:background .1s}
.history-day:active{background:var(--bg-2)}
.hd-date{flex:1;min-width:0}
.hd-date-main{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hd-date-sub{font-size:11px;color:var(--text-2);margin-top:2px}
.hd-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-2)}
.empty-state i{font-size:44px;margin-bottom:14px;color:var(--text-3);display:block;opacity:.7}
.empty-state-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-state-sub{font-size:13px;line-height:1.6;max-width:260px;margin:0 auto}
.range-toggle{display:flex;gap:3px;background:var(--bg-2);border-radius:var(--radius-md);padding:3px;margin-bottom:16px;border:1px solid var(--border)}
.range-btn{flex:1;padding:7px 4px;font-size:12px;color:var(--text-2);border-radius:8px;min-height:32px;font-weight:500}
.range-btn.on{background:var(--bg);color:var(--text);font-weight:700;box-shadow:var(--shadow-sm)}
.chart-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.chart-title{font-size:13px;font-weight:700;margin-bottom:3px}
.chart-sub{font-size:11px;color:var(--text-2);margin-bottom:12px}
.chart-wrap{position:relative;width:100%;height:180px}
.leader-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.leader-row:last-child{border-bottom:none}
.leader-rank{font-size:11px;font-weight:700;color:var(--text-3);min-width:18px}
.leader-name{flex:1;font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.leader-route{font-size:10px;font-weight:500;color:var(--text-3);margin-left:5px}
.leader-bar-wrap{flex:1;display:flex;align-items:center;gap:6px;max-width:140px}
.leader-bar-track{flex:1;height:5px;background:var(--bg-2);border-radius:3px;overflow:hidden}
.leader-bar-fill{height:100%;background:var(--brand);border-radius:3px}
.leader-val{font-size:12px;font-weight:700;min-width:24px;text-align:right}
.app-logo{width:42px;height:42px;border-radius:10px;object-fit:cover;flex-shrink:0;display:block;box-shadow:var(--shadow-sm)}
@media(min-width:768px){.app-logo{display:none}}
.back-btn i{font-size:18px}

/* ============ VISUAL POLISH LAYER ============ */
:root{
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
  --shadow-brand:0 2px 8px rgba(214,62,14,.28),0 1px 2px rgba(0,0,0,.08);
}

/* Tab content fades+rises in on each render for a calmer transition between views */
.nav-content{animation:viewIn .32s var(--ease-out)}
@keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Route card: animate the body open instead of hard snap, and add a brand accent edge when expanded */
.route-card{position:relative}
.route-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brand);border-radius:var(--radius-lg) 0 0 var(--radius-lg);opacity:0;transform:scaleY(.4);transition:opacity .2s,transform .25s var(--ease-out);pointer-events:none}
.route-card:has(.route-body.open)::before{opacity:1;transform:scaleY(1)}
.route-body.open{animation:bodyIn .26s var(--ease-out)}
@keyframes bodyIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* Status dot on route head gets a soft halo so it reads at a glance */
.sdot{box-shadow:0 0 0 3px color-mix(in srgb,currentColor 0%,transparent)}
.sdot-yes{box-shadow:0 0 0 3px rgba(99,153,34,.16)}
.sdot-no{box-shadow:0 0 0 3px rgba(226,75,74,.16)}
.sdot-out{box-shadow:0 0 0 3px rgba(239,159,39,.16)}

/* KPI cards: subtle lift + value count feels more alive on hover (desktop) */
.kpi{transition:transform .18s var(--ease-out),box-shadow .18s,border-color .18s}
@media(hover:hover){.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--border-2)}}
.kpi-val{font-variant-numeric:tabular-nums}
.sb-num,.tote-val,.kpi-delta{font-variant-numeric:tabular-nums}

/* Primary button gets a quiet sheen and warmer resting shadow */
.btn-primary{box-shadow:var(--shadow-brand);position:relative;overflow:hidden}
.btn-primary::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.14),transparent 60%);pointer-events:none}
@media(hover:hover){.btn-primary:hover{box-shadow:0 4px 14px rgba(214,62,14,.36),0 1px 3px rgba(0,0,0,.12)}}

/* Secondary buttons + toggles: gentler press feedback on touch */
.btn-sec{transition:transform .1s var(--ease-out),opacity .12s,box-shadow .15s}
.btn-sec:active{transform:scale(.97)}
.toggle-btn:active{transform:scale(.96)}

/* Nav: active indicator bar on desktop sidebar, smoother icon pop on mobile */
.nav-btn{transition:color .15s,background .15s}
.nav-btn.active i{animation:navPop .3s var(--ease-spring)}
@keyframes navPop{0%{transform:scale(1)}50%{transform:scale(1.22)}100%{transform:scale(1.1)}}
@media(min-width:768px){.nav-btn.active i{animation:none}}

/* Section labels: the accent bar gets a soft gradient instead of flat */
.section-lbl{border-left:none;position:relative;padding-left:11px}
.section-lbl::before{content:"";position:absolute;left:0;top:1px;bottom:1px;width:3px;border-radius:2px;background:var(--brand);background:linear-gradient(180deg,var(--brand),color-mix(in srgb,var(--brand) 55%,transparent))}

/* Cards lift very slightly on press for tactile feel where they're tappable */
.history-day{transition:background .12s,transform .12s var(--ease-out),box-shadow .15s}
.history-day:active{transform:scale(.99)}
@media(hover:hover){.history-day:hover{box-shadow:var(--shadow-md)}}

/* Pull-to-refresh icon actually spins while active */
.pull-indicator.visible i{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast: a touch more depth */
.toast{box-shadow:0 8px 28px rgba(0,0,0,.24),0 2px 6px rgba(0,0,0,.12)}

/* Inputs settle into focus a little more smoothly */
input,select,textarea{transition:border-color .18s var(--ease-out),box-shadow .18s var(--ease-out),background .15s}

/* Respect users who don't want motion */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
  .sync-live .sync-dot{animation:none}
}
/* ============ END POLISH LAYER ============ */

function destroyCharts(){chartRegistry.forEach(c=>{try{c.destroy();}catch(e){}});chartRegistry=[];}

function activeBranch(){return BRANCHES[st.branch]||BRANCHES.dallas;}
function branchRoutes(bid){
  const custom=st.branchRoutes[bid]&&st.branchRoutes[bid].routes;
  if(custom&&custom.length){
    const defs=defaultRoutes(bid);
    if(defs.length){const order=new Map(defs.map((r,i)=>[r.id,i]));return [...custom].sort((a,b)=>(order.has(a.id)?order.get(a.id):1e9)-(order.has(b.id)?order.get(b.id):1e9));}
    return custom;
  }
  if(bid==="dallas")return DEFAULT_ROUTES;

function routePrefix(bid){
  const map={dallas:"DFW",sanantonio:"SAT",austin:"AUS",houston:"HOU",midland:"WTX",linthicum:"BAL"};
  return map[bid]||null;
}

function briefingIsContaminated(b,bid){
  const prefix=routePrefix(bid);
  if(!prefix||!b||!b.routes||!b.routes.length)return false;
  // Contaminated if ANY route has a prefix belonging to a DIFFERENT branch
  return b.routes.some(r=>{
    const id=String(r.id||"");
    const otherPrefixes=Object.entries({dallas:"DFW",sanantonio:"SAT",austin:"AUS",houston:"HOU",midland:"WTX",linthicum:"BAL"})
      .filter(([k])=>k!==bid).map(([,v])=>v);
    return otherPrefixes.some(p=>id.startsWith(p));
  });
}

function repairBriefing(b,bid){
  // Build a map of existing route data keyed by route ID
  const existingData={};
  (b.routes||[]).forEach(r=>{existingData[r.id]=r;});
  // Replace routes with correct branch defaults, merging in matching data
  const correctRoutes=branchRoutes(bid).map(def=>{
    const existing=existingData[def.id];
    if(existing){
      // Keep operational data but fix the driver to default if it was wrong branch's driver
      return{...freshRoute(def),...existing,id:def.id,assignedDriver:def.driver};
    }
    return freshRoute(def);
  });
  return{...b,routes:correctRoutes};
}

function repairAllBranchData(){
  let fixed=0;
  BRANCH_IDS.forEach(bid=>{
    const brf=st.branchBriefings[bid]||{};
    let branchFixed=0;
    Object.keys(brf).forEach(dk=>{
      if(briefingIsContaminated(brf[dk],bid)){
        brf[dk]=repairBriefing(brf[dk],bid);
        branchFixed++;fixed++;
      }
    });
    if(branchFixed>0){
      try{localStorage.setItem(BRANCHES[bid].storeKey,JSON.stringify(brf));}catch(e){}
      // Sync repaired data to Firebase
      if(st.syncStatus==="live"&&fb.modules){
        Object.values(brf).forEach(b=>writeB(b,bid).catch(()=>{}));
      }
    }
  });
  // Re-point st.briefings at the current branch
  st.briefings=st.branchBriefings[st.branch]||{};
  return fixed;
}

async function initFirebase(){

    fb.modules={...am,...fm};fb.app=am.initializeApp(cfg);fb.db=fm.getFirestore(fb.app);

function subAllBranches(){
  const{collection,onSnapshot}=fb.modules;
  // Unsubscribe existing listeners
  if(fb.unsubAll){fb.unsubAll();fb.unsubAll=null;}
  if(fb.unsubBranches){fb.unsubBranches.forEach(u=>u());fb.unsubBranches=null;}
  // Subscribe to every branch collection simultaneously
  const unsubs=BRANCH_IDS.map(bid=>{
    return onSnapshot(
      collection(fb.db,BRANCHES[bid].collection),
      (snap)=>{
        const fc=bid===st.branch?capFocus():null;
        const u={};snap.forEach(d=>{u[d.id]=d.data();});
        // Repair contamination inline
        Object.keys(u).forEach(dk=>{
          if(briefingIsContaminated(u[dk],bid))u[dk]=repairBriefing(u[dk],bid);
        });
        st.branchBriefings[bid]=u;
        // Keep st.briefings in sync with active branch
        if(bid===st.branch)st.briefings=u;
        render();
        if(fc)resFocus(fc);
      },
      (err)=>{console.error(`Snapshot error for ${bid}:`,err.code,err.message);}
    );
  });
  fb.unsubBranches=unsubs;
}

// ---- Stats ----
function bStats(b){
  const running=b.routes.filter(r=>r.status!=="off");
  const offCount=b.routes.length-running.length;
  const tA=running.reduce((a,r)=>a+(parseInt(r.assets)||0),0);
  const tM=running.reduce((a,r)=>a+(parseInt(r.missed)||0),0);
  const otPct=tA>0?Math.round(((tA-tM)/tA)*1000)/10:null;
  const pushed=running.filter(r=>r.pushed==="yes").reduce((a,r)=>a+(parseInt(r.missed)||0),0);
  const tL=running.reduce((a,r)=>a+(parseInt(r.locations)||0),0);
  const active=running.length;
  const late=running.filter(r=>r.status==="no").length;
  const out=running.filter(r=>ABSENCE.includes(r.status)).length;
  const finished=running.filter(r=>r.routeStatus==="finished").length;
  const inProg=running.filter(r=>r.routeStatus==="in_progress").length;
  const totes={
    candy:running.filter(r=>r.totes&&r.totes.candy==="yes").length,
    freezer:running.filter(r=>r.totes&&r.totes.freezer==="yes").length,
    cooler:running.filter(r=>r.totes&&r.totes.cooler==="yes").length,
    dock:running.filter(r=>r.totes&&r.totes.dock==="yes").length,
  };
  const hasTotes=Object.values(totes).some(v=>v>0);
  const scores=running.map(r=>parseFloat(r.safetyScore)).filter(v=>!isNaN(v)&&v>0);
  const avgSafety=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*100)/100:null;
  const minSafety=scores.length?Math.min(...scores):null;
  const hasSafety=scores.length>0;
  const tMR=running.reduce((a,r)=>a+(parseInt(r.missedRestocks)||0),0);
  const tEC=running.reduce((a,r)=>a+(parseInt(r.emptyCoils)||0),0);
  const tSpoils=running.reduce((a,r)=>a+(parseFloat(r.spoils)||0),0)+(b.spoilsShrinkOverflow?Object.values(b.spoilsShrinkOverflow).reduce((a,r)=>a+(parseFloat(r.spoils)||0),0):0);
  const tShrink=running.reduce((a,r)=>a+(parseFloat(r.shrink)||0),0)+(b.spoilsShrinkOverflow?Object.values(b.spoilsShrinkOverflow).reduce((a,r)=>a+(parseFloat(r.shrink)||0),0):0);
  return{otPct,totalMissed:tM,totalMissedRestocks:tMR,totalEmptyCoils:tEC,totalSpoils:tSpoils,totalShrink:tShrink,pushed,totalAssets:tA,totalLocs:tL,active,late,out,finished,inProg,totes,hasTotes,avgSafety,minSafety,hasSafety,offCount,runningCount:running.length};
}
function isWeekend(dk){const[y,m,d]=dk.split("-");const w=new Date(+y,+m-1,+d).getDay();return w===0||w===6;}
function calcRouteMinutes(start,finish){
  if(!start||!finish)return null;
  const[sh,sm]=start.split(":").map(Number);
  const[fh,fm]=finish.split(":").map(Number);
  let mins=(fh*60+fm)-(sh*60+sm);
  if(mins<0)mins+=1440;
  return mins;
}
function calcTimeOnRoute(start,finish){
  const mins=calcRouteMinutes(start,finish);
  if(mins===null)return null;
  const h=Math.floor(mins/60),m=mins%60;
  return h>0?`${h}h ${m}m`:`${m}m`;
}
function calcTimePerAsset(start,finish,assets){
  const mins=calcRouteMinutes(start,finish);const a=parseInt(assets);
  if(mins===null||!a)return null;
  return Math.round(mins/a*10)/10+" min/asset";
}
function calcTimePerLoc(start,finish,locs){
  const mins=calcRouteMinutes(start,finish);const l=parseInt(locs);
  if(mins===null||!l)return null;
  return Math.round(mins/l*10)/10+" min/loc";
}
function parseMoney(s){const v=parseFloat(String(s||"").replace(/[^0-9.-]/g,""));return isNaN(v)?0:v;}
function fmtMoney(n){return"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmt2(n){if(n===null||n===undefined)return"—";return Math.round(n*100)/100;}
function fmtMoneyAbbr(n){
  if(!n||n===0)return"—";
  if(n>=1000000){const v=Math.round(n/100000)/10;return"$"+(v===Math.floor(v)?Math.floor(v):v)+"M";}
  if(n>=100000)return"$"+Math.round(n/1000)+"K";
  if(n>=1000){const v=Math.round(n/100)/10;return"$"+(v===Math.floor(v)?Math.floor(v):v)+"K";}
  return fmtMoney(n);
}

function collectTo(b){
  const gv=id=>{const e=document.getElementById(id);return e?e.value:null;};
  const cn=gv("f-coverage");if(cn!==null)b.plan.coverageNotes=cn;
  document.querySelectorAll("[data-ri]").forEach(el=>{
    const i=parseInt(el.dataset.ri),k=el.dataset.field;
    if(!b.routes[i])return;
    if(el.tagName==="SELECT"&&(el.value==="__manual__"||el.value==="__manual2__"||el.value==="__clear__"))return;
    if(k==="missed"||k==="assets"||k==="locations"||k==="missedRestocks"||k==="emptyCoils"||k==="spoils"||k==="shrink")b.routes[i][k]=el.value===""?"":(parseInt(el.value)||0);
    else if(k==="secondDriver"&&el.tagName==="INPUT")b.routes[i].secondDriver=el.value;
    else if(k==="thirdDriver"&&el.tagName==="INPUT")b.routes[i].thirdDriver=el.value;
    else if(k!=="secondDriver"&&k!=="thirdDriver")b.routes[i][k]=el.value;
  });
  b.routes.forEach(r=>{if(!r.totes)r.totes={candy:"no",freezer:"no",cooler:"no",dock:"no"};});
  if(b.checkInStatus==="not_started")b.checkInStatus="in_progress";
}

  if(pto.length||co.length||nc.length||relief.length||b.plan.coverageNotes){

// ---- Excel time parser ----
function parseExcelTime(val){
  if(!val&&val!==0)return"";
  // Excel serial number (e.g. 0.3125 = 7:30 AM)
  if(typeof val==="number"){
    const totalMins=Math.round((val%1)*24*60);
    const h=Math.floor(totalMins/60)%24;
    const m=totalMins%60;
    return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
  }
  if(val instanceof Date){
    // Date object — extract hours/minutes only, ignore seconds
    return String(val.getHours()).padStart(2,"0")+":"+String(val.getMinutes()).padStart(2,"0");
  }
  const s=String(val).trim();
  // "7:30:00 AM" → "07:30" | "07:30:00" → "07:30" | "07:30" → "07:30"
  const ampm=s.match(/^(\d{1,2}):(\d{2})(?::\d{2})?\s*(AM|PM)$/i);
  if(ampm){
    let h=parseInt(ampm[1]);const m=ampm[2];const ap=ampm[3].toUpperCase();
    if(ap==="AM"&&h===12)h=0;if(ap==="PM"&&h!==12)h+=12;
    return String(h).padStart(2,"0")+":"+m;
  }
  const hms=s.match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
  if(hms)return String(parseInt(hms[1])).padStart(2,"0")+":"+hms[2];
  return s;
}

// ---- Revenue Excel import ----
window.importRevenueXL=function(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".xlsx,.xls,.csv";
  inp.onchange=async(e)=>{
    const f=e.target.files[0];if(!f)return;
    try{
      const ab=await f.arrayBuffer();
      const wb=XLSX.read(ab,{type:"array",cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
      let updated=0,skipped=0,overflow=0;
      const affected=new Set();
      const affectedDates=new Map();
      function toDateKey(val){
        if(val instanceof Date){const d=new Date(val.getTime()+val.getTimezoneOffset()*60000);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
        const s=String(val||"").trim();
        if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
        const p=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
        if(p){const y=p[3].length===2?"20"+p[3]:p[3];return y+"-"+p[1].padStart(2,"0")+"-"+p[2].padStart(2,"0");}
        return null;
      }
      rows.forEach(row=>{
        const dk=toDateKey(row["Date"]);
        if(!dk){skipped++;return;}
        const branchCol=String(row["Branch"]||"").trim();
        let bid=st.branch;
        if(branchCol){const found=Object.entries(BRANCHES).find(([id,b])=>b.label.toLowerCase()===branchCol.toLowerCase()||id===branchCol.toLowerCase());if(found)bid=found[0];}
        if(!st.branchBriefings[bid])st.branchBriefings[bid]={};
        const brf=st.branchBriefings[bid];
        // If no briefing exists for this date, create a minimal one to hold revenue
        // (safe because there's no existing route/operational data to overwrite)
        if(!brf[dk]){
          brf[dk]={date:dk,checkInStatus:"not_started",plan:{coverageNotes:""},routes:[],revenue:{vending:"",market:"",ocs:""},revenueOverflow:{},published:false,publishedAt:null,lastEditedAt:null,lastEditedBy:""};
        }
        const b=brf[dk];
        if(!b.revenue)b.revenue={vending:"",market:"",ocs:""};
        const pM=v=>{const n=parseFloat(String(v||"").replace(/[$,]/g,""));return isNaN(n)?"":n;};
        // Support both wide format (Vending/Market/OCS columns) and tall format (Line of Business + Revenue columns)
        const lob=String(row["Line of Business"]||row["LOB"]||row["Business Line"]||row["Category"]||"").trim().toLowerCase();
        const rawRev=pM(row["Revenue"]||row["Pretax Revenue"]||row["Net Revenue"]||row["Amount"]||row["Total"]||"");
        let v=pM(row["Vending"]||row["Vending Revenue"]||row["vending"]||row["VENDING"]||"");
        let m=pM(row["Market"]||row["Market Revenue"]||row["market"]||row["MARKET"]||"");
        let o=pM(row["OCS"]||row["OCS Revenue"]||row["ocs"]||row["OCS/Delivery"]||row["Delivery"]||row["delivery"]||row["DELIVERY"]||row["Office Coffee"]||"");
        // If tall format, map the single revenue value to the right category
        if(rawRev!==""&&lob){
          if(lob.includes("vend"))v=rawRev;
          else if(lob.includes("market")||lob.includes("fresh"))m=rawRev;
          else if(lob.includes("ocs")||lob.includes("deliver")||lob.includes("office")||lob.includes("coffee"))o=rawRev;
        }
        const routeId=String(row["Route"]||row["Route ID"]||row["route"]||row["ROUTE"]||"").trim();
        if(routeId){
          // Per-route revenue — find matching route
          // Clear legacy branch-level revenue to prevent double-counting
          b.revenue={vending:"",market:"",ocs:""};
          // Clear overflow for this date on first route processed (import is authoritative)
          if(!b._revImportCleared){b.revenueOverflow={};b._revImportCleared=true;}
          const rIdx=b.routes?b.routes.findIndex(r=>r.id===routeId):-1;
          if(rIdx>=0){
            // Reset all revenue fields first — import file is the source of truth
            b.routes[rIdx].revenue={vending:"",market:"",ocs:""};
            if(v!=="")b.routes[rIdx].revenue.vending=v;
            if(m!=="")b.routes[rIdx].revenue.market=m;
            if(o!=="")b.routes[rIdx].revenue.ocs=o;
          } else {
            // Route not in today's list — store in overflow so totals still count
            if(!b.revenueOverflow)b.revenueOverflow={};
            if(!b.revenueOverflow[routeId])b.revenueOverflow[routeId]={vending:"",market:"",ocs:""};
            if(v!=="")b.revenueOverflow[routeId].vending=v;
            if(m!=="")b.revenueOverflow[routeId].market=m;
            if(o!=="")b.revenueOverflow[routeId].ocs=o;
            overflow++;
          }
        } else {
          // No route specified — branch-level (legacy/aggregate)
          if(v!=="")b.revenue.vending=v;
          if(m!=="")b.revenue.market=m;
          if(o!=="")b.revenue.ocs=o;
        }
        if(bid===st.branch)st.briefings=st.branchBriefings[bid];
        if(!affectedDates.has(bid))affectedDates.set(bid,new Set());
        affectedDates.get(bid).add(dk);
        affected.add(bid);updated++;
      });
      // Pause listeners during import to prevent Firestore overwriting clean data
      const wasLive=st.syncStatus==="live";
      if(wasLive&&fb.unsubBranches){fb.unsubBranches.forEach(u=>u());fb.unsubBranches=null;}

      affected.forEach(bid=>{
        try{localStorage.setItem(BRANCHES[bid].storeKey,JSON.stringify(st.branchBriefings[bid]));}catch(ex){}
        if(wasLive&&fb.modules){
          const changedDates=affectedDates.get(bid)||new Set();
          changedDates.forEach(dk=>{
            const b=st.branchBriefings[bid][dk];
            if(b){delete b._revImportCleared;writeB(b,bid).catch(()=>{});}
          });
        }
      });
      st.briefings=st.branchBriefings[st.branch]||{};
      render();showToast("Revenue imported for "+updated+" day"+(updated!==1?"s":"")+(overflow?" · "+overflow+" unlisted routes stored":" ")+(skipped?" · "+skipped+" skipped":""));

      // Re-subscribe listeners after writes have had time to land
      if(wasLive)setTimeout(()=>{if(fb.modules&&fb.db)subAllBranches();},3000);
    }catch(err){console.error(err);alert("Revenue import failed: "+(err.message||err));}
  };
  inp.click();
};

        const dk=toDateKey(row["Date"]);
        if(!routeId||!dk){skipped++;return;}
        const bid=rowToBranch(row,routeId);
        if(!bid){skipped++;return;}

        if(!st.branchBriefings[bid])st.branchBriefings[bid]={};
        const brf=st.branchBriefings[bid];
        if(!brf[dk])brf[dk]=freshBriefingForBranch(dk,bid);
        const b=brf[dk];
        if(!b.revenue)b.revenue={vending:"",market:"",ocs:""};
        b.routes.forEach(r=>{if(!r.totes)r.totes={candy:"no",freezer:"no",cooler:"no",dock:"no"};if(r.timeStarted===undefined)r.timeStarted="";if(r.timeFinished===undefined)r.timeFinished="";if(r.missedRestocks===undefined)r.missedRestocks=0;if(r.emptyCoils===undefined)r.emptyCoils=0;if(r.spoils===undefined)r.spoils=0;if(r.shrink===undefined)r.shrink=0;});
        if(bid===st.branch)st.briefings=st.branchBriefings[bid];

        const r=b.routes.find(rt=>rt.id===routeId);
        if(!r){
          // Route not in daily list — store spoils/shrink in overflow so totals still count
          const g2=col=>{const v=row[col];return(v===undefined||v===null)?null:String(v).trim();};
          const flt2=col=>{const v=parseFloat(g2(col));return isNaN(v)?null:v;};
          const sp2=flt2("Spoils"),sh2=flt2("Shrink");
          if(sp2!==null||sh2!==null){
            if(!b.spoilsShrinkOverflow)b.spoilsShrinkOverflow={};
            if(!b.spoilsShrinkOverflow[routeId])b.spoilsShrinkOverflow[routeId]={spoils:0,shrink:0};
            if(sp2!==null)b.spoilsShrinkOverflow[routeId].spoils=sp2;
            if(sh2!==null)b.spoilsShrinkOverflow[routeId].shrink=sh2;
          } else {
            skipped++;
          }
          if(!affectedDates.has(bid))affectedDates.set(bid,new Set());
          affectedDates.get(bid).add(dk);
          affected.add(bid);updated++;
          return;
        }

        const g=col=>{const v=row[col];return(v===undefined||v===null)?null:String(v).trim();};
        const numOr=col=>{const v=parseInt(g(col));return isNaN(v)?null:v;};
        const fltOr=col=>{const v=parseFloat(g(col));return isNaN(v)?null:v;};

        const att=g("Attendance");if(att){const k=ATT_REV[att.toLowerCase()];if(k)r.status=k;}
        const rs=g("Route Status");if(rs){const k=RS_REV[rs.toLowerCase()];if(k)r.routeStatus=k;}
        const td=g("Today's Driver");if(td)r.driver=td;
        const sd=g("2nd Driver");if(sd)r.secondDriver=sd;
        const dt=g("Driver Type");if(dt)r.driverType=dt.toLowerCase();
        const a=numOr("Assets Scheduled");if(a!==null)r.assets=a;
        const l=numOr("Locations Scheduled");if(l!==null)r.locations=l;
        const m=numOr("Missed Services");if(m!==null)r.missed=m;
        const mr=numOr("Missed Restocks");if(mr!==null)r.missedRestocks=mr;
        const ec=numOr("Empty Coils");if(ec!==null)r.emptyCoils=ec;
        const sp=fltOr("Spoils");if(sp!==null)r.spoils=sp;
        const sh=fltOr("Shrink");if(sh!==null)r.shrink=sh;
        const sf=fltOr("Safety Score");if(sf!==null)r.safetyScore=String(sf);
        const ts=row["Time Started"];if(ts!=null&&ts!=="")r.timeStarted=parseExcelTime(ts);
        const tf=row["Time Finished"];if(tf!=null&&tf!=="")r.timeFinished=parseExcelTime(tf);
        const pu=g("Pushed");if(pu)r.pushed=pu.toLowerCase();

        if(!affectedDates.has(bid))affectedDates.set(bid,new Set());
        affectedDates.get(bid).add(dk);
        affected.add(bid);updated++;
      });

      affected.forEach(bid=>{
        try{localStorage.setItem(BRANCHES[bid].storeKey,JSON.stringify(st.branchBriefings[bid]));}catch(e){}
        if(st.syncStatus==="live"&&fb.modules){
          const changedDates=affectedDates.get(bid)||new Set();
          changedDates.forEach(dk=>{
            const b=st.branchBriefings[bid][dk];
            if(b)writeB(b,bid).catch(()=>{});
          });
        }
      });
      st.briefings=st.branchBriefings[st.branch]||{};
      render();
      showToast("Imported "+updated+" route"+(updated!==1?"s":"")+" across "+affected.size+" branch"+(affected.size!==1?"es":"")+(skipped?" · "+skipped+" skipped":""));
    }catch(err){console.error(err);alert("Import failed: "+(err.message||err));}
  };
  inp.click();
};

window.dismissRecap=function(){st.recapDismissed=todayKey();try{localStorage.setItem(RECAP_KEY,st.recapDismissed);}catch(e){}render();};

function renderRecapCard(){
  // Don't show if dismissed today
  if(st.recapDismissed===todayKey())return"";

  // Get yesterday's briefing
  const yest=new Date();yest.setDate(yest.getDate()-1);
  const yk=yest.getFullYear()+"-"+String(yest.getMonth()+1).padStart(2,"0")+"-"+String(yest.getDate()).padStart(2,"0");
  const yb=st.briefings[yk];
  if(!yb||!yb.routes)return"";

  // Thresholds
  const SPOILS_THRESH=350;
  const SHRINK_THRESH=1500;
  const RESTOCKS_THRESH=3;
  const SAFETY_THRESH=85;

  const flags=[];

  yb.routes.forEach(r=>{
    if(r.status==="off")return;
    const name=r.driver||r.assignedDriver||r.id;
    const route=r.id;

    // Spoils
    const spoils=parseFloat(r.spoils)||0;
    if(spoils>SPOILS_THRESH){
      flags.push({level:"warn",icon:"ti-trash",label:"High Spoils",detail:`${esc(name)} (${route})`,value:`$${spoils.toFixed(2)}`,sub:"exceeds $"+SPOILS_THRESH+" threshold"});
    }

    // Shrink — flag both directions
    const shrink=parseFloat(r.shrink)||0;
    if(Math.abs(shrink)>SHRINK_THRESH){
      const isNeg=shrink<0;
      flags.push({level:"danger",icon:"ti-alert-triangle",label:isNeg?"Negative Shrink ⚠":"High Shrink",detail:`${esc(name)} (${route})`,value:(isNeg?"-":"")+"$"+Math.abs(shrink).toFixed(2),sub:isNeg?"Possible data error or return — verify immediately":"exceeds $"+SHRINK_THRESH+" threshold"});
    }

    // Safety
    const safety=r.safetyScore!==""&&r.safetyScore!=null?parseFloat(r.safetyScore):null;
    if(safety!==null&&safety<SAFETY_THRESH){
      flags.push({level:"danger",icon:"ti-shield-off",label:"Low Safety Score",detail:`${esc(name)} (${route})`,value:String(safety),sub:"below "+SAFETY_THRESH+" threshold"});
    }

    // Missed restocks
    const restocks=parseInt(r.missedRestocks)||0;
    if(restocks>=RESTOCKS_THRESH){
      flags.push({level:"warn",icon:"ti-package-off",label:"Missed Restocks",detail:`${esc(name)} (${route})`,value:restocks+" restocks",sub:"meets or exceeds "+RESTOCKS_THRESH+" threshold"});
    }
  });

  // Also check overflow spoils/shrink
  if(yb.spoilsShrinkOverflow){
    Object.entries(yb.spoilsShrinkOverflow).forEach(([routeId,data])=>{
      const spoils=parseFloat(data.spoils)||0;
      const shrink=parseFloat(data.shrink)||0;
      if(spoils>SPOILS_THRESH)flags.push({level:"warn",icon:"ti-trash",label:"High Spoils",detail:`${routeId} (unlisted route)`,value:`$${spoils.toFixed(2)}`,sub:"exceeds $"+SPOILS_THRESH+" threshold"});
      if(Math.abs(shrink)>SHRINK_THRESH){
        const isNeg=shrink<0;
        flags.push({level:"danger",icon:"ti-alert-triangle",label:isNeg?"Negative Shrink ⚠":"High Shrink",detail:`${routeId} (unlisted route)`,value:(isNeg?"-":"")+"$"+Math.abs(shrink).toFixed(2),sub:isNeg?"Possible data error or return — verify immediately":"exceeds $"+SHRINK_THRESH+" threshold"});
      }
    });
  }

  if(!flags.length)return"";

  const dayLabel=yest.toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});

  return`<div style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:6px">
        <i class="ti ti-clipboard-list" style="color:var(--warn-text);font-size:16px"></i>
        <span style="font-size:12px;font-weight:700;color:var(--warn-text);text-transform:uppercase;letter-spacing:.06em">Yesterday's Recap</span>
        <span style="font-size:11px;color:var(--text-2)">${dayLabel}</span>
      </div>
      <button onclick="dismissRecap()" style="font-size:11px;color:var(--text-3);padding:3px 8px;border:1px solid var(--border);border-radius:20px;background:var(--bg-2);font-weight:500">Dismiss</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${flags.map(f=>`<div style="background:${f.level==="danger"?"var(--danger-bg)":"var(--warn-bg)"};border:1px solid ${f.level==="danger"?"var(--danger-border)":"var(--warn-border)"};border-radius:var(--radius-lg);padding:11px 14px;display:flex;align-items:center;gap:12px">
        <i class="ti ${f.icon}" style="font-size:20px;color:${f.level==="danger"?"var(--danger-text)":"var(--warn-text)"};flex-shrink:0"></i>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:700;color:${f.level==="danger"?"var(--danger-text)":"var(--warn-text)"};text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">${f.label}</div>
          <div style="font-size:13px;font-weight:600;color:var(--text)">${f.detail}</div>
          <div style="font-size:11px;color:var(--text-2);margin-top:2px">${f.sub}</div>
        </div>
        <div style="font-size:16px;font-weight:800;color:${f.level==="danger"?"var(--danger-text)":"var(--warn-text)"};flex-shrink:0;text-align:right">${f.value}</div>
      </div>`).join("")}
    </div>
  </div>`;
}

// ---- Render summary ----
function renderSum(b,opts={}){
  const s=bStats(b);const showH=opts.showHeader!==false;
  const dates=sortedDates();const idx=dates.indexOf(b.date);
  const prevKey=idx>=0&&idx<dates.length-1?dates[idx+1]:null;
  const prev=prevKey?bStats(st.briefings[prevKey]):null;
  function delta(cur,p,inv){if(p==null||cur==null)return"";const d=Math.round((cur-p)*100)/100;if(d===0)return"";const g=inv?d<0:d>0;return`<div class="kpi-delta ${g?"kv-s":"kv-d"}">${d>0?"▲":"▼"} ${Math.abs(d)} vs prev</div>`;}
  const flagBits=[];
  b.routes.filter(r=>r.status==="no").forEach(r=>flagBits.push(`${esc(r.id)} (${esc(r.driver)}) — late`));
  b.routes.filter(r=>(parseInt(r.missed)||0)>0).forEach(r=>flagBits.push(`${esc(r.id)} (${esc(r.driver)}) — ${r.missed} missed`));
  const ptoN=b.routes.filter(r=>r.status==="pto").map(r=>esc(r.assignedDriver));
  const coN=b.routes.filter(r=>r.status==="callout").map(r=>esc(r.assignedDriver));
  const ncN=b.routes.filter(r=>r.status==="ncns").map(r=>esc(r.assignedDriver));
  const reliefB=b.routes.filter(r=>r.driverType!=="assigned"&&r.driver).map(r=>`${esc(r.driver)} → ${esc(r.id)} (${TL[r.driverType]})`);
  const pt=b.publishedAt?new Date(b.publishedAt).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}):"";

  return`${showH?`<div class="app-header"><div style="display:flex;align-items:center;gap:10px"><img src="icon.png" class="app-logo" alt=""><div><div class="app-title">${activeBranch().label} Daily Check-in</div><div class="app-sub">${opts.isToday?(selKey()===todayKey()?"Today":fmtDN(selKey())+", "+fmtS(selKey()))+" ":fmtS(b.date)+" "}${opts.isToday?syncPill():""}</div></div></div>
  ${opts.isToday?`<div style="display:flex;align-items:center;gap:4px">
    <button onclick="prevDay()" style="padding:6px 10px;border:0.5px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text);font-size:16px;min-height:36px;display:flex;align-items:center;justify-content:center"><i class="ti ti-chevron-left" style="font-size:16px"></i></button>
    <span class="date-badge" style="font-weight:500;cursor:${selKey()!==todayKey()?'pointer':''}" onclick="${selKey()!==todayKey()?'jumpToday()':''}">${fmtS(selKey())}${selKey()===todayKey()?' · Today':''}</span>
    <button onclick="nextDay()" style="padding:6px 10px;border:0.5px solid var(--border-2);border-radius:var(--radius-md);background:var(--bg-2);color:var(--text);font-size:16px;min-height:36px;display:flex;align-items:center;justify-content:center"><i class="ti ti-chevron-right" style="font-size:16px"></i></button>
  </div>`:`<span class="date-badge">${fmtS(b.date)}</span>`}
  </div>`:""}
  ${opts.isToday?`<div style="margin-bottom:14px"><select style="font-family:inherit;font-size:14px;font-weight:600;color:var(--brand);background:var(--bg-2);border:0.5px solid var(--border-2);border-radius:var(--radius-md);padding:7px 12px;cursor:pointer;width:100%" onchange="switchBranch(this.value)">${BRANCH_IDS.map(bid=>`<option value="${bid}"${bid===st.branch?" selected":""}>${BRANCHES[bid].label}</option>`).join("")}</select></div>`:""}
  ${stepperHTML(b.checkInStatus,!!opts.isToday)}
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-lbl">On-Time Delivery</div><div class="kpi-val ${s.otPct===null?"":(s.otPct>=95?"kv-s":s.otPct>=85?"kv-w":"kv-d")}">${s.otPct===null?"—":s.otPct+"%"}</div>${prev?delta(s.otPct,prev.otPct,false):""}</div>
    <div class="kpi"><div class="kpi-lbl">Avg Safety Score</div><div class="kpi-val ${s.avgSafety===null?"":(s.avgSafety>=95?"kv-s":s.avgSafety>=85?"kv-w":"kv-d")}">${s.avgSafety===null?"—":s.avgSafety}</div>${prev?delta(s.avgSafety,prev.avgSafety,false):""}</div>
    <div class="kpi"><div class="kpi-lbl">Routes Finished</div><div class="kpi-val ${s.finished===s.runningCount?"kv-s":s.finished>0?"kv-w":"kv-d"}">${s.finished}/${s.runningCount}</div></div>
    <div class="kpi"><div class="kpi-lbl">Missed Services</div><div class="kpi-val ${s.totalMissed===0?"kv-s":s.totalMissed<=2?"kv-w":"kv-d"}">${s.totalMissed}</div>${prev?delta(s.totalMissed,prev.totalMissed,true):""}</div>
    <div class="kpi"><div class="kpi-lbl">Services Pushed</div><div class="kpi-val ${s.pushed===0?"kv-s":"kv-w"}">${s.pushed}</div>${prev?delta(s.pushed,prev.pushed,true):""}</div>
    <div class="kpi"><div class="kpi-lbl">Assets Scheduled</div><div class="kpi-val">${s.totalAssets||"—"}</div></div>
    <div class="kpi"><div class="kpi-lbl">Locations Scheduled</div><div class="kpi-val">${s.totalLocs||"—"}</div></div>
    <div class="kpi"><div class="kpi-lbl">Active Routes</div><div class="kpi-val">${s.active}</div></div>
  </div>
  ${flagBits.length?`<div class="alert-box"><div class="alert-title"><i class="ti ti-alert-triangle"></i> Flags</div>${flagBits.map(f=>`<div class="alert-item">• ${f}</div>`).join("")}</div>`:`<div class="ok-box"><i class="ti ti-circle-check"></i> No flags — clean day</div>`}
  ${s.hasTotes?`<div class="totes-card"><span class="section-lbl">Totes taken (routes)</span><div class="totes-grid">
    <div class="tote-cell"><div class="tote-val">${s.totes.candy}</div><div class="tote-lbl">🍬 Candy</div></div>
    <div class="tote-cell"><div class="tote-val">${s.totes.freezer}</div><div class="tote-lbl">🧊 Freezer</div></div>
    <div class="tote-cell"><div class="tote-val">${s.totes.cooler}</div><div class="tote-lbl">❄️ Cooler</div></div>
    <div class="tote-cell"><div class="tote-val">${s.totes.dock}</div><div class="tote-lbl">📦 Dock</div></div>
  </div></div>`:""}
  ${(ptoN.length||coN.length||ncN.length||reliefB.length||b.plan.coverageNotes)?`<div class="plan-card"><span class="section-lbl" style="margin-bottom:10px">Plan</span>
    ${ptoN.length?`<div class="plan-row"><span class="plan-lbl">PTO</span><span class="plan-val">${ptoN.map(n=>`<span class="pill p-pto">${n}</span>`).join("")}</span></div>`:""}
    ${coN.length?`<div class="plan-row"><span class="plan-lbl">Call Out</span><span class="plan-val">${coN.map(n=>`<span class="pill p-callout">${n}</span>`).join("")}</span></div>`:""}
    ${ncN.length?`<div class="plan-row"><span class="plan-lbl">NCNS</span><span class="plan-val">${ncN.map(n=>`<span class="pill p-ncns">${n}</span>`).join("")}</span></div>`:""}
    ${reliefB.length?`<div class="plan-row"><span class="plan-lbl">Coverage</span><span class="plan-val">${reliefB.map(x=>`<span class="pill p-relief">${x}</span>`).join("")}</span></div>`:""}
    ${b.plan.coverageNotes?`<div class="plan-row"><span class="plan-lbl">Notes</span><span class="plan-val">${esc(b.plan.coverageNotes)}</span></div>`:""}
  </div>`:""}
  <span class="section-lbl">Route status</span>
  <div style="margin-bottom:16px">
    ${b.routes.map(r=>{
      const rs=r.routeStatus||"not_started";const t=r.totes||{};
      const coverBadge=r.driverType!=="assigned"&&r.driver?`<span class="r-cover">${TL[r.driverType]}</span>`:"";
      const meta=[];
      if(r.assets!==""&&r.assets!=null)meta.push(`${r.assets} assets`);if(r.locations!==""&&r.locations!=null)meta.push(`${r.locations} locs`);if((parseInt(r.missed)||0)>0)meta.push(`${r.missed} missed`);if(r.pushed==="yes")meta.push("pushed");
      if(r.safetyScore!==""&&r.safetyScore!=null){const sc=parseFloat(r.safetyScore);const scCls=sc>=95?"kv-s":sc>=85?"kv-w":"kv-d";meta.push(`<span class="${scCls}" style="font-weight:500">⚡${r.safetyScore}</span>`);}
      if((parseInt(r.missedRestocks)||0)>0)meta.push(`${r.missedRestocks} restocks`);
      if((parseInt(r.emptyCoils)||0)>0)meta.push(`${r.emptyCoils} empty coils`);
      if((parseFloat(r.spoils)||0)>0){const rv=parseMoney(r.revenue?.vending)+parseMoney(r.revenue?.market)+parseMoney(r.revenue?.ocs);const pct=rv>0?(parseFloat(r.spoils)/rv*100).toFixed(1)+"% rev":"$"+r.spoils;meta.push(`spoils ${pct}`);}
      if((parseFloat(r.shrink)||0)!==0){const rv=parseMoney(r.revenue?.vending)+parseMoney(r.revenue?.market)+parseMoney(r.revenue?.ocs);const sh=parseFloat(r.shrink);const pct=rv>0?(Math.abs(sh)/rv*100).toFixed(1)+"% rev":"$"+Math.abs(sh);meta.push(`shrink ${sh<0?"-":""}${pct}`);}
      const tor=calcTimeOnRoute(r.timeStarted,r.timeFinished);if(tor)meta.push(tor);
      const tpa=calcTimePerAsset(r.timeStarted,r.timeFinished,r.assets);if(tpa)meta.push(tpa);
      const tpl=calcTimePerLoc(r.timeStarted,r.timeFinished,r.locations);if(tpl)meta.push(tpl);
      const ts=[t.candy==="yes"?"🍬":"",t.freezer==="yes"?"🧊":"",t.cooler==="yes"?"❄️":"",t.dock==="yes"?"📦":""].filter(Boolean).join(" ");if(ts)meta.push(ts);
      return`<div class="rrow">
        <div class="sdot ${ATT_D[r.status]}" style="margin-top:5px"></div>
        <div class="rrow-left">
          <div class="rrow-id">${esc(r.id)}</div>
          <div class="rrow-driver">${esc(r.driver||"—")}${coverBadge}${(r.secondDriver&&r.secondDriver!=="__pending__")?` <span style="color:var(--text-2);font-size:12px;font-weight:400">+${esc(r.secondDriver)}</span>`:""}${(r.thirdDriver&&r.thirdDriver!=="__pending__")?` <span style="color:var(--text-2);font-size:12px;font-weight:400">+${esc(r.thirdDriver)}</span>`:""}</div>
          ${meta.length?`<div class="rrow-meta">${meta.join(" · ")}</div>`:""}
        </div>
        <div class="rrow-right">
          <span class="chip ${ATT_C[r.status]}">${ATT_L[r.status]}</span>
          <span class="rs-chip ${RSCHIP[rs]}"><i class="ti ${RSI[rs]}" style="font-size:10px"></i>${RSL[rs]}</span>
        </div>
      </div>`;
    }).join("")}
  </div>
  <button class="btn-primary" onclick="copyB('${b.date}')"><i class="ti ti-copy"></i> Copy Briefing for Teams</button>
  <div class="actions-row" style="margin-top:10px">
    ${opts.isToday?`<button class="btn-sec" onclick="goEdit()"><i class="ti ti-edit"></i> Edit</button><button class="btn-sec" onclick="newBriefing()"><i class="ti ti-refresh"></i> Reset</button>`:`<button class="btn-sec btn-danger" onclick="delDay('${b.date}')"><i class="ti ti-trash"></i> Delete</button>`}
  </div>
  ${pt?`<div class="saved-note">Published ${pt}${b.lastEditedBy?" by "+esc(b.lastEditedBy):""}</div>`:""}`;
}

// ---- Tabs ----
function renderToday(){const b=ensureToday();if(st.todayView==="summary"&&b.published)return renderSum(b,{isToday:true});return renderEntry();}

function renderHistory(){
  const dates=sortedDates();
  if(st.detailDate&&st.briefings[st.detailDate]){
    return`<button class="back-btn" onclick="backH()"><i class="ti ti-chevron-left"></i> All briefings</button>
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-2);font-weight:500;text-transform:uppercase;letter-spacing:.04em">${fmtL(st.detailDate)}</div>
    ${renderSum(st.briefings[st.detailDate],{showHeader:false,isToday:false})}`;
  }
  return`<div class="app-header"><div><div class="app-title">History</div><div class="app-sub">${activeBranch().label} · ${dates.length} day${dates.length===1?"":"s"} ${syncPill()}</div></div></div>
  ${!dates.length?`<div class="empty-state"><i class="ti ti-calendar-off"></i><div class="empty-state-title">No briefings yet</div><div class="empty-state-sub">Fill in your morning check-in on the Today tab and tap "Generate &amp; Publish Briefing" — it'll appear here.</div></div>`:
  dates.map(key=>{const b=st.briefings[key];const s=bStats(b);const cs=b.checkInStatus||"not_started";
    return`<div class="history-day" onclick="viewDay('${key}')">
      <div class="hd-date">
        <div class="hd-date-main">${fmtDN(key)}, ${fmtS(key)} <span class="status-badge ${BSBADGE[cs]}"><i class="ti ${RSI[cs]}" style="font-size:11px"></i>${RSL[cs]}</span></div>

function renderTrends(){
  const dates=lastN(st.trendRange).sort();const briefings=dates.map(d=>st.briefings[d]);const empty=!dates.length;
  let aS=0,aC=0,sfS=0,sfC=0,tM=0,clean=0,tRev=0,tSpoils=0,tShrink=0;
  briefings.forEach(b=>{
    const s=bStats(b);
    if(s.otPct!==null){aS+=s.otPct;aC++;}
    if(s.avgSafety!==null){sfS+=s.avgSafety;sfC++;}
    tM+=s.totalMissed;
    if(s.late===0&&s.totalMissed===0)clean++;
    tRev+=getBranchDayRevenue(st.branch,b.date);
    tSpoils+=s.totalSpoils||0;
    tShrink+=s.totalShrink||0;
  });
  const avgOT=aC?Math.round(aS/aC):null;
  const avgSafety=sfC?Math.round(sfS/sfC*100)/100:null;
  const dL={},dM={};
  briefings.forEach(b=>{b.routes.forEach(r=>{if(!dL[r.id])dL[r.id]={id:r.id,name:r.assignedDriver,count:0};if(!dM[r.id])dM[r.id]={id:r.id,name:r.assignedDriver,count:0};if(r.status==="no")dL[r.id].count++;dM[r.id].count+=(parseInt(r.missed)||0);});});
  const tL=Object.values(dL).filter(x=>x.count>0).sort((a,b)=>b.count-a.count).slice(0,5);
  const tM2=Object.values(dM).filter(x=>x.count>0).sort((a,b)=>b.count-a.count).slice(0,5);
  const mL=tL[0]?.count||1;const mM=tM2[0]?.count||1;
  const hasRev=tRev>0;const hasSpoilsShrink=tSpoils>0||tShrink>0;
  const spoilsPct=tRev>0?Math.round(tSpoils/tRev*1000)/10:null;
  const shrinkPct=tRev>0?Math.round(Math.abs(tShrink)/tRev*1000)/10:null;
  const shrinkIsNeg=tShrink<0;
  return`<div class="app-header"><div><div class="app-title">Trends</div><div class="app-sub">${activeBranch().label} · ${empty?"No data":dates.length+" days"} ${syncPill()}</div></div></div>
  <div class="range-toggle">
    <button class="range-btn${st.trendRange===7?" on":""}" onclick="setRange(7)">7d</button>
    <button class="range-btn${st.trendRange===30?" on":""}" onclick="setRange(30)">30d</button>
    <button class="range-btn${st.trendRange===0?" on":""}" onclick="setRange(0)">All</button>
  </div>
  ${empty?`<div class="empty-state"><i class="ti ti-chart-line"></i><div class="empty-state-title">No data to chart yet</div><div class="empty-state-sub">Publish a few briefings on the Today tab and trends will appear here automatically.</div></div>`:`
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-lbl">Avg On-Time</div><div class="kpi-val ${avgOT===null?"":(avgOT>=95?"kv-s":avgOT>=85?"kv-w":"kv-d")}">${avgOT===null?"—":avgOT+"%"}</div></div>
    <div class="kpi"><div class="kpi-lbl">Avg Safety</div><div class="kpi-val ${avgSafety===null?"":(avgSafety>=95?"kv-s":avgSafety>=85?"kv-w":"kv-d")}">${avgSafety===null?"—":avgSafety}</div></div>
    <div class="kpi"><div class="kpi-lbl">Days tracked</div><div class="kpi-val">${dates.length}</div></div>
    <div class="kpi"><div class="kpi-lbl">Total Missed</div><div class="kpi-val ${tM===0?"kv-s":"kv-d"}">${tM}</div></div>
    <div class="kpi"><div class="kpi-lbl">Clean Days</div><div class="kpi-val kv-s">${clean}</div></div>
    ${hasRev?`<div class="kpi"><div class="kpi-lbl">Total Revenue</div><div class="kpi-val" style="font-size:18px;color:var(--brand)">${fmtMoneyAbbr(tRev)}</div></div>`:""}
    ${hasSpoilsShrink&&hasRev?`<div class="kpi"><div class="kpi-lbl">Spoils % Rev</div><div class="kpi-val kv-d" style="font-size:18px">${spoilsPct!==null?spoilsPct+"%":"—"}</div><div style="font-size:10px;color:var(--text-2);margin-top:2px">${fmtMoneyAbbr(tSpoils)}</div></div>`:""}
    ${hasSpoilsShrink&&hasRev?`<div class="kpi"><div class="kpi-lbl">${shrinkIsNeg?"Neg Shrink":"Shrink"} % Rev</div><div class="kpi-val kv-d" style="font-size:18px">${shrinkPct!==null?shrinkPct+"%":"—"}</div><div style="font-size:10px;color:var(--text-2);margin-top:2px">${shrinkIsNeg?"-":""}${fmtMoneyAbbr(Math.abs(tShrink))}</div></div>`:""}
  </div>
  <div class="chart-card"><div class="chart-title">On-Time Delivery</div><div class="chart-sub">(assets − missed) ÷ assets</div><div class="chart-wrap"><canvas id="chart-ot"></canvas></div></div>
  <div class="chart-card"><div class="chart-title">Safety Score</div><div class="chart-sub">Daily branch avg · target 95</div><div class="chart-wrap"><canvas id="chart-safety"></canvas></div></div>
  <div class="chart-card"><div class="chart-title">Missed Services</div><div class="chart-sub">Per-day count</div><div class="chart-wrap"><canvas id="chart-missed"></canvas></div></div>
  ${hasRev?`<div class="chart-card"><div class="chart-title">Daily Revenue</div><div class="chart-sub">Per-day branch total</div><div class="chart-wrap"><canvas id="chart-revenue"></canvas></div></div>`:""}
  ${hasSpoilsShrink?`<div class="chart-card"><div class="chart-title">Spoils &amp; Shrink</div><div class="chart-sub">As % of daily revenue</div><div class="chart-wrap"><canvas id="chart-spoils-shrink"></canvas></div></div>`:""}
  ${tL.length?`<div class="chart-card"><div class="chart-title">Late Days Leaderboard</div><div class="chart-sub">Most late arrivals</div><div style="margin-top:10px">${tL.map((d,i)=>`<div class="leader-row"><span class="leader-rank">${i+1}</span><span class="leader-name">${esc(d.name)}<span class="leader-route">${d.id}</span></span><div class="leader-bar-wrap"><div class="leader-bar-track"><div class="leader-bar-fill" style="width:${d.count/mL*100}%"></div></div><span class="leader-val">${d.count}</span></div></div>`).join("")}</div></div>`:""}
  ${tM2.length?`<div class="chart-card"><div class="chart-title">Missed Services Leaderboard</div><div class="chart-sub">Most missed services</div><div style="margin-top:10px">${tM2.map((d,i)=>`<div class="leader-row"><span class="leader-rank">${i+1}</span><span class="leader-name">${esc(d.name)}<span class="leader-route">${d.id}</span></span><div class="leader-bar-wrap"><div class="leader-bar-track"><div class="leader-bar-fill" style="width:${d.count/mM*100}%"></div></div><span class="leader-val">${d.count}</span></div></div>`).join("")}</div></div>`:""}
  `}`;
}

function drawCharts(){
  destroyCharts();
  const dates=lastN(st.trendRange).sort();if(!dates.length)return;
  const labels=dates.map(d=>{const[y,m,dd]=d.split("-");return`${parseInt(m)}/${parseInt(dd)}`;});
  const otData=dates.map(d=>bStats(st.briefings[d]).otPct);
  const missedData=dates.map(d=>bStats(st.briefings[d]).totalMissed);
  const safetyData=dates.map(d=>bStats(st.briefings[d]).avgSafety);
  const tc=getComputedStyle(document.documentElement).getPropertyValue("--text-2").trim()||"#888";
  const gc="rgba(128,128,128,.12)";
  const common={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#191917",titleColor:"#fff",bodyColor:"#fff",padding:8}},scales:{x:{ticks:{color:tc,maxTicksLimit:7,maxRotation:0,font:{size:10}},grid:{display:false}}}};
  const otCtx=document.getElementById("chart-ot");
  if(otCtx){const v=otData.filter(x=>x!==null);const mn=v.length?Math.max(0,Math.min(...v)-10):0;
    mkChart(otCtx,{type:"line",data:{labels,datasets:[{data:otData,borderColor:"#D63E0E",backgroundColor:"rgba(214,62,14,.08)",borderWidth:2,fill:true,tension:.35,spanGaps:true,pointRadius:d=>otData[d.dataIndex]!==null&&otData[d.dataIndex]<90?4:0,pointBackgroundColor:"#E24B4A"}]},options:{...common,scales:{...common.scales,y:{min:mn,max:105,ticks:{color:tc,callback:v=>v+"%",stepSize:10,font:{size:10}},grid:{color:gc}}}}});}
  const sfCtx=document.getElementById("chart-safety");
  if(sfCtx){const v=safetyData.filter(x=>x!==null);const mn=v.length?Math.max(0,Math.min(...v)-5):0;
    mkChart(sfCtx,{type:"line",data:{labels,datasets:[
      {data:safetyData,borderColor:"#E24B4A",backgroundColor:"rgba(226,75,74,.07)",borderWidth:2,fill:true,tension:.35,spanGaps:true,pointRadius:d=>safetyData[d.dataIndex]!==null&&safetyData[d.dataIndex]<90?4:0,pointBackgroundColor:"#E24B4A"},
      {data:Array(dates.length).fill(95),borderColor:"rgba(99,153,34,.4)",borderDash:[4,4],borderWidth:1.5,pointRadius:0,fill:false}
    ]},options:{...common,scales:{...common.scales,y:{min:mn,max:102,ticks:{color:tc,stepSize:5,font:{size:10}},grid:{color:gc}}}}});}
  const mCtx=document.getElementById("chart-missed");
  if(mCtx){mkChart(mCtx,{type:"bar",data:{labels,datasets:[{data:missedData,backgroundColor:missedData.map(v=>v===0?"#639922":v<=2?"#EF9F27":"#E24B4A"),borderRadius:4}]},options:{...common,scales:{...common.scales,y:{beginAtZero:true,ticks:{color:tc,stepSize:1,precision:0,font:{size:10}},grid:{color:gc}}}}});}

  // Revenue chart
  const revData=dates.map(d=>getBranchDayRevenue(st.branch,d));
  const revCtx=document.getElementById("chart-revenue");
  if(revCtx&&revData.some(v=>v>0)){
    mkChart(revCtx,{type:"bar",data:{labels,datasets:[{data:revData,backgroundColor:"rgba(214,62,14,.7)",borderRadius:4}]},
      options:{...common,scales:{...common.scales,y:{beginAtZero:true,ticks:{color:tc,callback:v=>"$"+(v>=1000?(v/1000).toFixed(0)+"K":v),font:{size:10}},grid:{color:gc}}}}});
  }

  // Spoils & shrink chart — as % of daily revenue
  const spoilsData=dates.map(d=>{
    const rev=getBranchDayRevenue(st.branch,d);
    const sp=bStats(st.briefings[d]).totalSpoils||0;
    return rev>0?Math.round(sp/rev*1000)/10:0;
  });
  const shrinkData=dates.map(d=>{
    const rev=getBranchDayRevenue(st.branch,d);
    const sh=bStats(st.briefings[d]).totalShrink||0;
    return rev>0?Math.round(Math.abs(sh)/rev*1000)/10:0;
  });
  const ssCtx=document.getElementById("chart-spoils-shrink");
  if(ssCtx&&(spoilsData.some(v=>v>0)||shrinkData.some(v=>v>0))){
    mkChart(ssCtx,{type:"bar",data:{labels,datasets:[
      {label:"Spoils %",data:spoilsData,backgroundColor:"rgba(226,75,74,.75)",borderRadius:4},
      {label:"Shrink %",data:shrinkData,backgroundColor:"rgba(239,159,39,.75)",borderRadius:4}
    ]},options:{...common,plugins:{...common.plugins,legend:{display:true,position:"top",labels:{color:tc,font:{size:11},boxWidth:12,padding:12}}},scales:{...common.scales,y:{beginAtZero:true,ticks:{color:tc,callback:v=>v+"%",font:{size:10}},grid:{color:gc}}}}});
  }
}
